<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#F6F0E3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<title>K-Fortune Story | 잠시만요</title>
<style>
:root{
  color-scheme:light dark;
  --hanji:#F6F0E3;
  --meok:#2B2620;
  --noeurok:#2E6B5E;
  --noeurok-deep:#1E4634;
  --samcheong:#2C4E8A;
  --jinsa:#C23B22;
  --hwang:#E8A93D;
  --bunhong:#D9738C;
  --seokganju:#8A4A34;
  --seokganju-dark:#6E3A28;
  --stone:#B9B2A4;
  --stone-dark:#8F887B;
  --gold-line:#C9A85C;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{
  font-family:'Gowun Batang',serif;
  background:#F6F0E3;
  background:var(--hanji);
  color:var(--meok);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow-x:hidden;
}

/* ── 좌우 기둥 ── */
body::before, body::after{
  content:"";
  position:fixed; top:0; bottom:0;
  width:clamp(10px, 3vw, 34px);
  background:linear-gradient(90deg,
    var(--seokganju-dark) 0%, var(--seokganju) 30%,
    #A05A40 50%, var(--seokganju) 70%, var(--seokganju-dark) 100%);
  box-shadow:inset 0 0 18px rgba(0,0,0,.25);
  z-index:5;
}
body::before{left:0}
body::after{right:0}

/* ── 지붕(단청 처마) ── */
.roof{position:relative; z-index:4;}
.roof svg{display:block; width:100%; height:auto;}

/* ── 호랑이 ── */
.tiger{
  position:absolute;
  top:100px;
  top:8.5vw;
  right:30px;
  right:clamp(14px, 4vw, 52px);
  height:150px;
  height:clamp(64px, 13.5vw, 240px);
  width:auto;
  z-index:6;
  pointer-events:none;
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.3));
  image-rendering:auto;
}
@media (max-width:560px){
  .tiger{top:6vw; height:64px; height:clamp(48px, 15vw, 84px);}
}

/* ── 상단 바 (언어 토글: 좌측 상단) ── */
.topbar{position:absolute; top:10px; left:clamp(20px,5vw,50px); z-index:10;}
.lang-toggle{
  display:inline-flex; border:2px solid var(--gold-line);
  border-radius:999px; overflow:hidden; background:rgba(43,38,32,.55);
  backdrop-filter:blur(2px);
  font-family:'Noto Sans KR',sans-serif; font-size:.8rem; font-weight:700;
}
.lang-toggle button{
  border:none; background:transparent; color:#EFE6D0;
  padding:.35rem .85rem; cursor:pointer; transition:.2s;
}
.lang-toggle button.active{background:var(--gold-line); color:var(--meok);}

/* ── 본문 ── */
main{
  flex:1; width:100%; max-width:920px;
  margin:0 auto;
  padding:2.2rem clamp(28px,7vw,60px) 3rem;
  text-align:center;
}
.eyebrow{
  font-family:'Noto Sans KR',sans-serif;
  letter-spacing:.35em; font-size:.72rem; font-weight:500;
  color:var(--seokganju); text-transform:uppercase;
  margin-bottom:.7rem;
}
h1{
  font-family:'Song Myung',serif;
  font-size:clamp(1.9rem, 6vw, 3.1rem);
  line-height:1.25; color:var(--meok);
}
h1 .accent{color:var(--jinsa);}
.subtitle{
  margin-top:.9rem;
  font-size:clamp(.95rem, 2.6vw, 1.08rem);
  color:#5A5245; line-height:1.7;
}
.visitor{
  margin:1.6rem auto 0; display:inline-block;
  font-family:'Noto Sans KR',sans-serif;
  font-size:.85rem; color:#6B6353;
  border-top:1px solid var(--gold-line);
  border-bottom:1px solid var(--gold-line);
  padding:.5rem 1.4rem;
}
.visitor b{color:var(--jinsa); font-weight:700;}

/* ── 운세 메뉴: PC 3열 고정 ── */
.menu-title{
  margin:2.6rem 0 1.3rem;
  font-family:'Song Myung',serif;
  font-size:1.15rem; color:var(--noeurok);
  display:flex; align-items:center; gap:14px; justify-content:center;
}
.menu-title::before, .menu-title::after{
  content:""; height:1px; width:56px; background:var(--gold-line);
}
.menu-grid{
  display:flex; flex-direction:column;
  gap:12px; max-width:540px; margin:0 auto;
}
.menu-btn{
  border:1.5px solid #E4D9BF; background:#FFFDF7;
  border-radius:16px; padding:.95rem 1.15rem;
  cursor:pointer;
  display:flex; align-items:center; justify-content:space-between; gap:1rem;
  transition:transform .15s, box-shadow .15s, border-color .15s;
  font-family:'Gowun Batang',serif;
  text-align:left;
}
.menu-btn:hover, .menu-btn:focus-visible{
  transform:translateY(-2px);
  border-color:var(--hwang);
  box-shadow:0 6px 16px rgba(138,74,52,.15);
  outline:none;
}
.menu-btn .mtext{display:flex; flex-direction:column; gap:.28rem; flex:1; min-width:0;}
.menu-btn .emblem{width:54px; height:54px; flex:0 0 54px;}
.menu-btn .name{font-size:1.15rem; font-weight:700; color:var(--meok); line-height:1.3;}
.menu-btn .desc{
  font-family:'Noto Sans KR',sans-serif;
  font-size:.9rem; color:#6E6656; line-height:1.45;
}

/* ── 토스트 ── */
.toast{
  position:fixed; left:50%; bottom:90px;
  transform:translateX(-50%) translateY(20px);
  background:var(--meok); color:#F3EBD9;
  font-family:'Noto Sans KR',sans-serif; font-size:.85rem;
  padding:.65rem 1.3rem; border-radius:999px;
  opacity:0; pointer-events:none; transition:.3s; z-index:50;
  white-space:nowrap;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ── 하단 돌기단 ── */
footer{
  position:relative; z-index:4;
  background:linear-gradient(180deg, var(--stone) 0%, var(--stone-dark) 100%);
  padding:1.1rem 0 .9rem; text-align:center;
}
footer::before{
  content:""; display:block;
  position:absolute; top:-8px; left:0; right:0; height:8px;
  background:repeating-linear-gradient(90deg,
    var(--stone-dark) 0 46px, #A39C8E 46px 48px);
}
footer p{
  font-family:'Noto Sans KR',sans-serif;
  font-size:.72rem; color:#3E3A32; letter-spacing:.05em;
}

/* ── 모바일 보정 ── */
@media (max-width:560px){
  .menu-btn{padding:.85rem 1rem;}
  .menu-btn .emblem{width:48px; height:48px; flex-basis:48px;}
  .menu-btn .name{font-size:1.08rem;}
  .menu-btn .desc{font-size:.86rem;}
}
@media (prefers-reduced-motion: reduce){
  *{transition:none !important;}
}
</style>
<style>
.ad-wrap{max-width:540px; margin:0 auto; text-align:center;}
.ad-box{
  background:#FFFDF7; border:1.5px solid #E4D9BF; border-radius:18px;
  padding:2.2rem 1.4rem; margin-top:1rem;
}
.ad-slot{
  background:#EFE8D6; border:2px dashed #C9A85C; border-radius:12px;
  min-height:250px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:.6rem;
  font-family:'Noto Sans KR',sans-serif; color:#8A8171;
}
.ad-slot b{color:#6B5B3E;}
.count{
  margin-top:1.3rem; font-family:'Noto Sans KR',sans-serif;
  font-size:.95rem; color:#6E6656;
}
.count b{color:var(--jinsa); font-size:1.2rem;}
.btn-go{
  display:none; margin:1.3rem auto 0;
  background:var(--jinsa); color:#FFF7EA;
  border:2px solid var(--gold-line); border-radius:12px;
  padding:.95rem 2.6rem; font-size:1.12rem; font-weight:700;
  font-family:'Gowun Batang',serif; cursor:pointer;
}
.btn-go.on{display:inline-block;}
.btn-go:hover{transform:translateY(-2px); box-shadow:0 6px 14px rgba(194,59,34,.3);}
</style>

<style>
/* ══ 다크모드 대응: 강제/자동 다크모드 기기에서 자동 적용 ══ */
@media (prefers-color-scheme: dark){
  :root{ color-scheme:light dark; }
  body{ background:#221D16 !important; color:#EFE6D0; }
  h1, .menu-btn .name, .sum-card .line{ color:#F0E7D4 !important; }
  h1 .accent{ color:#E8785E !important; }
  .eyebrow{ color:#D8A374 !important; }
  .subtitle, .visitor, .count, .res-visitor{ color:#C9BFA9 !important; }
  .visitor b, .res-visitor b, .count b, .score-ring .num{ color:#E8785E !important; }
  .menu-title, .sec h3, .person-block h3{ color:#7FBFA5 !important; }
  .menu-btn, .form-card, .sec, .sum-card, .ad-box, .homelink, .btn-reset, .lang-toggle{
    background:#2A251E !important; border-color:#4A4336 !important;
  }
  .menu-btn .desc{ color:#A99F8C !important; }
  .sec p, .month-table td, .radiorow label{ color:#D8CFBB !important; }
  .field > label{ color:#C9B48A !important; }
  .field input, .field select, .field textarea{
    background:#332D25 !important; border-color:#5A4F3E !important; color:#EFE6D0 !important;
  }
  .radiorow label{ background:#332D25 !important; border-color:#5A4F3E !important; }
  .radiorow label.sel{ background:#4A2A20 !important; border-color:#E8785E !important; color:#F0A28F !important; }
  .hanja-table{ background:#2A251E !important; border-color:#4A4336 !important; }
  .hanja-table th{ background:#3A332A !important; color:#D8C9A4 !important; border-color:#4A4336 !important; }
  .hanja-table td{ border-color:#3A332A !important; color:#D8CFBB !important; }
  .hanja-table .big{ color:#8FB3E8 !important; }
  .month-table td{ border-color:#3A332A !important; }
  .month-table td.m{ color:#E8785E !important; }
  .note{ color:#A99F8C !important; }
  .homelink{ color:#D8A374 !important; }
  .btn-reset{ color:#C9BFA9 !important; }
  .ad-slot{ background:#332D25 !important; border-color:#8A7A4E !important; color:#A99F8C !important; }
  .ad-slot b{ color:#D8C9A4 !important; }
  .ftitle p, #fsub, .res-head .who{ color:#C9BFA9 !important; }
  .dream-sym{ background:#3A332A !important; color:#D8C9A4 !important; }
}
</style>
</head>
<body>
<div class="roof" aria-hidden="true">
<svg viewBox="0 0 1200 222" preserveAspectRatio="none">
  <defs>
    <!-- 기와 -->
    <pattern id="giwa" width="46" height="26" patternUnits="userSpaceOnUse">
      <rect width="46" height="26" fill="#3E4247"/>
      <path d="M0,26 A23,23 0 0 1 46,26" fill="none" stroke="#565B61" stroke-width="3"/>
      <path d="M-23,26 A23,23 0 0 1 23,26" fill="none" stroke="#2A2D31" stroke-width="2"/>
    </pattern>

    <!-- 서까래 연화 매듭 -->
    <pattern id="rafter" width="60" height="36" patternUnits="userSpaceOnUse" patternTransform="translate(0,66)">
      <rect width="60" height="36" fill="#2E6B5E"/>
      <circle cx="30" cy="18" r="15.5" fill="#1E4634"/>
      <circle cx="30" cy="18" r="14" fill="none" stroke="#EFE6D0" stroke-width="2.6" stroke-dasharray="3.6 3.4"/>
      <circle cx="30" cy="18" r="10.5" fill="#C23B22"/>
      <circle cx="30" cy="18" r="7" fill="#E8A93D"/>
      <circle cx="30" cy="18" r="4" fill="#2C4E8A"/>
      <circle cx="30" cy="18" r="1.6" fill="#EFE6D0"/>
      <circle cx="0" cy="18" r="3.2" fill="#D9738C"/>
      <circle cx="60" cy="18" r="3.2" fill="#D9738C"/>
    </pattern>

    <!-- 머리초: 겹겹 색동 반원 (사진2 스타일) -->
    <pattern id="meoricho" width="150" height="74" patternUnits="userSpaceOnUse" patternTransform="translate(0,107.5)">
      <rect width="150" height="74" fill="#2E6B5E"/>
      <!-- 상단에서 내려오는 색동 아치 -->
      <circle cx="75" cy="0" r="64" fill="#1E4634"/>
      <circle cx="75" cy="0" r="61" fill="none" stroke="#EFE6D0" stroke-width="2.4" stroke-dasharray="4.6 4"/>
      <circle cx="75" cy="0" r="57" fill="#3FA57A"/>
      <circle cx="75" cy="0" r="51" fill="#EFE6D0"/>
      <circle cx="75" cy="0" r="46" fill="#E8A93D"/>
      <circle cx="75" cy="0" r="40" fill="#C23B22"/>
      <circle cx="75" cy="0" r="34" fill="none" stroke="#EFE6D0" stroke-width="2" stroke-dasharray="3.4 3"/>
      <circle cx="75" cy="0" r="31" fill="#2C4E8A"/>
      <circle cx="75" cy="0" r="24" fill="#D9738C"/>
      <circle cx="75" cy="0" r="17" fill="#EFE6D0"/>
      <circle cx="75" cy="0" r="11" fill="#C23B22"/>
      <circle cx="75" cy="0" r="5" fill="#E8A93D"/>
      <!-- 아치 사이 하단 연꽃 봉오리 (타일 경계에서 합쳐짐) -->
      <circle cx="0" cy="74" r="26" fill="#1E4634"/>
      <circle cx="0" cy="74" r="22" fill="#3FA57A"/>
      <circle cx="0" cy="74" r="17" fill="#D9738C"/>
      <circle cx="0" cy="74" r="12" fill="#E8A93D"/>
      <circle cx="0" cy="74" r="7" fill="#C23B22"/>
      <circle cx="150" cy="74" r="26" fill="#1E4634"/>
      <circle cx="150" cy="74" r="22" fill="#3FA57A"/>
      <circle cx="150" cy="74" r="17" fill="#D9738C"/>
      <circle cx="150" cy="74" r="12" fill="#E8A93D"/>
      <circle cx="150" cy="74" r="7" fill="#C23B22"/>
      <!-- 점 장식 -->
      <circle cx="37" cy="58" r="2.4" fill="#EFE6D0"/>
      <circle cx="113" cy="58" r="2.4" fill="#EFE6D0"/>
    </pattern>

    <!-- 꽃살 격자 (사진3 스타일) -->
    <pattern id="lattice" width="84" height="48" patternUnits="userSpaceOnUse" patternTransform="translate(0,184)">
      <rect width="84" height="48" fill="#14301F"/>
      <g stroke="#3FA57A" stroke-width="6.5">
        <line x1="0" y1="0" x2="84" y2="48"/>
        <line x1="0" y1="48" x2="84" y2="0"/>
        <line x1="-42" y1="48" x2="42" y2="0"/>
        <line x1="42" y1="48" x2="126" y2="0"/>
        <line x1="-42" y1="0" x2="42" y2="48"/>
        <line x1="42" y1="0" x2="126" y2="48"/>
        <line x1="0" y1="24" x2="84" y2="24"/>
      </g>
      <g stroke="#2B7D55" stroke-width="2">
        <line x1="0" y1="0" x2="84" y2="48"/>
        <line x1="0" y1="48" x2="84" y2="0"/>
        <line x1="-42" y1="48" x2="42" y2="0"/>
        <line x1="42" y1="48" x2="126" y2="0"/>
        <line x1="-42" y1="0" x2="42" y2="48"/>
        <line x1="42" y1="0" x2="126" y2="48"/>
        <line x1="0" y1="24" x2="84" y2="24"/>
      </g>
      <!-- 교차점 꽃 -->
      <g>
        <circle cx="42" cy="24" r="6" fill="none" stroke="#E08FA6" stroke-width="6" stroke-dasharray="4.6 3.2"/>
        <circle cx="42" cy="24" r="3" fill="#C23B22"/>
        <circle cx="42" cy="24" r="1.4" fill="#E8C63D"/>
      </g>
      <g>
        <circle cx="0" cy="0" r="6" fill="none" stroke="#E08FA6" stroke-width="6" stroke-dasharray="4.6 3.2"/>
        <circle cx="0" cy="0" r="3" fill="#C23B22"/>
        <circle cx="84" cy="0" r="6" fill="none" stroke="#E08FA6" stroke-width="6" stroke-dasharray="4.6 3.2"/>
        <circle cx="84" cy="0" r="3" fill="#C23B22"/>
        <circle cx="0" cy="48" r="6" fill="none" stroke="#E08FA6" stroke-width="6" stroke-dasharray="4.6 3.2"/>
        <circle cx="0" cy="48" r="3" fill="#C23B22"/>
        <circle cx="84" cy="48" r="6" fill="none" stroke="#E08FA6" stroke-width="6" stroke-dasharray="4.6 3.2"/>
        <circle cx="84" cy="48" r="3" fill="#C23B22"/>
      </g>
    </pattern>
  </defs>

  <!-- 기와 지붕 (곡선 상단 + 직선 하단) -->
  <path d="M0,30 C300,2 900,2 1200,30 L1200,58 L0,58 Z" fill="url(#giwa)"/>
  <!-- 처마 목재선 -->
  <rect x="0" y="58" width="1200" height="8" fill="#6E3A28"/>
  <!-- 서까래 매듭 줄 -->
  <rect x="0" y="66" width="1200" height="36" fill="url(#rafter)"/>
  <!-- 백·적 구분선 -->
  <rect x="0" y="102" width="1200" height="3" fill="#EFE6D0"/>
  <rect x="0" y="105" width="1200" height="2.5" fill="#C23B22"/>
  <!-- 머리초 색동 밴드 -->
  <rect x="0" y="107.5" width="1200" height="74" fill="url(#meoricho)"/>
  <!-- 구분선 -->
  <rect x="0" y="181.5" width="1200" height="2.5" fill="#EFE6D0"/>
  <!-- 꽃살 격자 밴드 -->
  <rect x="0" y="184" width="1200" height="30" fill="url(#lattice)"/>
  <!-- 하단 금선 마감 -->
  <rect x="0" y="214" width="1200" height="8" fill="#C9A85C"/>

       count:"잠시 후 결과를 볼 수 있어요:", go:"운세 결과 보기 →"},
  en: {tt:"Preparing your fortune…", ad:"Advertisement", adDesc:"(A video ad will appear here at launch)",
       count:"Your result will be ready in:", go:"See My Fortune →"}
}[ (function(){
  const s = localStorage.getItem("kf_lang");
  if(s === "kr" || s === "en") return s;
  const ls = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language || "en"];
  return ls.some(l => (l||"").toLowerCase().startsWith("ko")) ? "kr" : "en";
})() ];

document.getElementById("tt").textContent = T.tt;
document.getElementById("adLabel").textContent = T.ad;
document.getElementById("adDesc").textContent = T.adDesc;
document.getElementById("cLabel").textContent = T.count;
document.getElementById("btnGo").textContent = T.go;

const type = new URLSearchParams(location.search).get("type") || localStorage.getItem("kf_selected") || "tojeong";
let n = 5;
const timer = setInterval(()=>{
  n--;
  document.getElementById("cNum").textContent = n;
  if(n <= 0){
    clearInterval(timer);
    document.querySelector(".count").style.display = "none";
    document.getElementById("btnGo").classList.add("on");
  }
}, 1000);
document.getElementById("btnGo").addEventListener("click", ()=>{
  location.href = "result.html?type=" + type;
});
</script>
</body>
</html>
