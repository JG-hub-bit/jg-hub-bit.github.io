<style>
:root{
  color-scheme:light dark;
  --hanji:#F6F0E3;
  --meok:#2B2620;
  --noeurok:#2E6B5E;
  --noeurok-deep:#1E4634;
  --samcheong:#2C4E8A;
  --jinsa:#C23B22;
  --hwang:#E8A93D;
  --bunhong:#D9738C;
  --seokganju:#8A4A34;
  --seokganju-dark:#6E3A28;
  --stone:#B9B2A4;
  --stone-dark:#8F887B;
  --gold-line:#C9A85C;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{
  font-family:'Gowun Batang',serif;
  background:#F6F0E3;
  background:var(--hanji);
  color:var(--meok);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow-x:hidden;
}

/* ── 좌우 기둥 ── */
body::before, body::after{
  content:"";
  position:fixed; top:0; bottom:0;
  width:clamp(10px, 3vw, 34px);
  background:linear-gradient(90deg,
    var(--seokganju-dark) 0%, var(--seokganju) 30%,
    #A05A40 50%, var(--seokganju) 70%, var(--seokganju-dark) 100%);
  box-shadow:inset 0 0 18px rgba(0,0,0,.25);
  z-index:5;
}
body::before{left:0}
body::after{right:0}

/* ── 지붕(단청 처마) ── */
.roof{position:relative; z-index:4;}
.roof svg{display:block; width:100%; height:auto;}

/* ── 호랑이 ── */
.tiger{
  position:absolute;
  top:100px;
  top:8.5vw;
  right:30px;
  right:clamp(14px, 4vw, 52px);
  height:150px;
  height:clamp(64px, 13.5vw, 240px);
  width:auto;
  z-index:6;
  pointer-events:none;
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.3));
  image-rendering:auto;
}
@media (max-width:560px){
  .tiger{top:6vw; height:64px; height:clamp(48px, 15vw, 84px);}
}

/* ── 상단 바 (언어 토글: 좌측 상단) ── */
.topbar{position:absolute; top:10px; left:clamp(20px,5vw,50px); z-index:10;}
.lang-toggle{
  display:inline-flex; border:2px solid var(--gold-line);
  border-radius:999px; overflow:hidden; background:rgba(43,38,32,.55);
  backdrop-filter:blur(2px);
  font-family:'Noto Sans KR',sans-serif; font-size:.8rem; font-weight:700;
}
.lang-toggle button{
  border:none; background:transparent; color:#EFE6D0;
  padding:.35rem .85rem; cursor:pointer; transition:.2s;
}
.lang-toggle button.active{background:var(--gold-line); color:var(--meok);}

/* ── 본문 ── */
main{
  flex:1; width:100%; max-width:920px;
  margin:0 auto;
  padding:2.2rem clamp(28px,7vw,60px) 3rem;
  text-align:center;
}
.eyebrow{
  font-family:'Noto Sans KR',sans-serif;
  letter-spacing:.35em; font-size:.72rem; font-weight:500;
  color:var(--seokganju); text-transform:uppercase;
  margin-bottom:.7rem;
}
h1{
  font-family:'Song Myung',serif;
  font-size:clamp(1.9rem, 6vw, 3.1rem);
  line-height:1.25; color:var(--meok);
}
h1 .accent{color:var(--jinsa);}
.subtitle{
  margin-top:.9rem;
  font-size:clamp(.95rem, 2.6vw, 1.08rem);
  color:#5A5245; line-height:1.7;
}
.visitor{
  margin:1.6rem auto 0; display:inline-block;
  font-family:'Noto Sans KR',sans-serif;
  font-size:.85rem; color:#6B6353;
  border-top:1px solid var(--gold-line);
  border-bottom:1px solid var(--gold-line);
  padding:.5rem 1.4rem;
}
.visitor b{color:var(--jinsa); font-weight:700;}

/* ── 운세 메뉴: PC 3열 고정 ── */
.menu-title{
  margin:2.6rem 0 1.3rem;
  font-family:'Song Myung',serif;
  font-size:clamp(.95rem, 3.4vw, 1.15rem);
  color:var(--noeurok);
  display:flex; align-items:center; gap:10px; justify-content:center;
  white-space:nowrap;
}
.menu-title::before, .menu-title::after{
  content:""; height:1px; background:var(--gold-line);
  flex:0 1 56px; min-width:10px;
}
.menu-grid{
  display:flex; flex-direction:column;
  gap:12px; max-width:540px; margin:0 auto;
}
.menu-btn{
  border:1.5px solid #E4D9BF; background:#FFFDF7;
  border-radius:16px; padding:.95rem 1.15rem;
  cursor:pointer;
  display:flex; align-items:center; justify-content:space-between; gap:1rem;
  transition:transform .15s, box-shadow .15s, border-color .15s;
  font-family:'Gowun Batang',serif;
  text-align:left;
}
.menu-btn:hover, .menu-btn:focus-visible{
  transform:translateY(-2px);
  border-color:var(--hwang);
  box-shadow:0 6px 16px rgba(138,74,52,.15);
  outline:none;
}
.menu-btn .mtext{display:flex; flex-direction:column; gap:.28rem; flex:1; min-width:0;}
.menu-btn .emblem{width:54px; height:54px; flex:0 0 54px;}
.menu-btn .name{font-size:1.08rem; font-weight:700; color:var(--meok); line-height:1.3;}
.menu-btn .desc{
  font-family:'Noto Sans KR',sans-serif;
  font-size:.82rem; color:#6E6656; line-height:1.45;
}

/* ── 토스트 ── */
.toast{
  position:fixed; left:50%; bottom:90px;
  transform:translateX(-50%) translateY(20px);
  background:var(--meok); color:#F3EBD9;
  font-family:'Noto Sans KR',sans-serif; font-size:.85rem;
  padding:.65rem 1.3rem; border-radius:999px;
  opacity:0; pointer-events:none; transition:.3s; z-index:50;
  white-space:nowrap;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ── 하단 돌기단 ── */
footer{
  position:relative; z-index:4;
  background:linear-gradient(180deg, var(--stone) 0%, var(--stone-dark) 100%);
  padding:1.1rem 0 .9rem; text-align:center;
}
footer::before{
  content:""; display:block;
  position:absolute; top:-8px; left:0; right:0; height:8px;
  background:repeating-linear-gradient(90deg,
    var(--stone-dark) 0 46px, #A39C8E 46px 48px);
}
footer p{
  font-family:'Noto Sans KR',sans-serif;
  font-size:.72rem; color:#3E3A32; letter-spacing:.05em;
}

/* ── 모바일 보정 ── */
@media (max-width:560px){
  .menu-btn{padding:.85rem 1rem;}
  .menu-btn .emblem{width:48px; height:48px; flex-basis:48px;}
  .menu-btn .name{font-size:1.08rem;}
  .menu-btn .desc{font-size:.86rem;}
}
@media (prefers-reduced-motion: reduce){
  *{transition:none !important;}
}

<script>
const DOC_KR = '<h1>한국 운세, 1분 안에 이해하기</h1>\n<p class="lead">토정비결? 사주팔자? 일진?<br>500년을 이어온 한국 점술의 세계를 짧게 안내합니다.</p>\n\n<div class="card">\n  <h2>큰 줄기는 두 가지입니다</h2>\n  <p>한국 사람들이 "운세 본다", "사주 본다"고 말할 때, 사실 그 안에는 <b>뿌리가 전혀 다른 두 전통</b>이 섞여 있습니다. 대부분은 구분 없이 보지만, 알고 보면 훨씬 재미있습니다.</p>\n  <div class="vs">\n    <div><div class="t">명리학 (命理學)</div><div class="b">태어난 연·월·일·시를 여덟 글자로 바꿔 그 사람의 구조를 읽는 학문. 사주팔자·신년운세·궁합·일진이 모두 여기서 나옵니다.</div></div>\n    <div><div class="t">점서 (占書)</div><div class="b">주역의 원리로 괘를 뽑아 그 해의 풀이를 읽는 방식. 토정비결이 대표적이며, 새해에 한 번 뽑아보는 세시풍속입니다.</div></div>\n  </div>\n</div>\n\n<div class="card">\n  <h2>사주팔자 (四柱八字)</h2>\n  <p>태어난 <b>연·월·일·시</b> 네 기둥(四柱)을 각각 두 글자씩, 모두 <b>여덟 글자(八字)</b>로 바꾼 것입니다. 서양의 출생 천궁도와 비슷하지만, 별자리 대신 <b>천간(天干) 열 글자와 지지(地支) 열두 글자</b>의 조합을 씁니다.</p>\n  <p>이 여덟 글자는 각각 나무·불·흙·쇠·물이라는 <b>다섯 기운(오행)</b>에 속합니다. 어떤 기운이 넘치고 어떤 기운이 모자라는지를 보고, 그 사람의 성품과 평생의 흐름을 읽습니다. 태어난 시간이 반드시 필요한 이유가 여기 있습니다 — 시간이 바뀌면 여덟 글자 중 두 글자가 통째로 달라집니다.</p>\n  <h3>이럴 때 봅니다</h3>\n  <p>"나는 어떤 사람인가", "내 적성은 무엇인가", "언제가 내 시기인가"</p>\n</div>\n\n<div class="card">\n  <h2>신년운세 · 세운 (歲運)</h2>\n  <p>내 사주 여덟 글자에 <b>올해의 기운</b>이 들어와 만나는 자리를 풀이합니다. 사주가 평생의 지도라면, 세운은 그 지도 위를 지나는 올해의 날씨입니다.</p>\n  <p>한국에서 가장 많이 보는 운세이며, 보통 새해가 시작될 무렵 한 번 봅니다. 총평부터 애정·직업·금전·건강, 그리고 월별 흐름까지 한 번에 나오는 것이 일반적입니다.</p>\n</div>\n\n<div class="card">\n  <h2>토정비결 (土亭祕訣)</h2>\n  <p>조선 후기부터 전해 내려온 <b>새해 세시풍속</b>입니다. 토정 이지함(李之菡, 1517~1578) 선생이 지었다고 전해지지만, 실제로는 조선 후기에 만들어져 그의 이름을 빌린 것으로 보는 견해가 우세합니다.</p>\n  <p>음력 생년·생월·생일을 각각 숫자로 바꾸어 <b>상괘·중괘·하괘</b>를 만들고, 그 셋을 조합해 <b>144개의 괘</b> 중 하나를 뽑습니다. 태어난 시간은 쓰지 않습니다.</p>\n  <p>결과는 분석 보고서가 아니라 <b>한 편의 한시(漢詩)</b>입니다. 예를 들면 이렇습니다 — <b>東風解凍(동풍해동)</b>, 봄바람에 얼음이 녹으니 막혔던 일이 스스로 풀린다. 명리가 산문이라면 토정비결은 시입니다.</p>\n  <h3>왜 결과가 사주와 다를까요?</h3>\n  <p>계산법이 완전히 다르기 때문입니다. 예로부터 <b>명리는 평생의 뼈대를, 토정비결은 그 해의 분위기를</b> 보는 것으로 여겨 왔습니다. 둘이 어긋나도 이상한 일이 아닙니다.</p>\n</div>\n\n<div class="card">\n  <h2>일진 (日辰) · 오늘의 운세</h2>\n  <p>하루하루에도 고유한 두 글자가 있습니다. 이것을 <b>일진</b>이라 하며, <b>60갑자</b>가 끊이지 않고 60일마다 되풀이됩니다. 오늘의 일진이 내 사주와 어떤 관계를 맺는지를 보는 것이 오늘의 운세입니다.</p>\n  <p>관계는 다섯 가지로 나뉩니다.</p>\n  <ul>\n    <li><b>인성(印星)</b> — 나를 살려주는 기운. 도움과 배움이 들어오는 날</li>\n    <li><b>식상(食傷)</b> — 내 기운이 뻗어나가는 날. 표현과 활동에 유리</li>\n    <li><b>재성(財星)</b> — 내가 다스리는 재물의 기운. 실속을 챙기기 좋은 날</li>\n    <li><b>비화(比和)</b> — 나와 같은 기운. 무난하게 흘러가는 날</li>\n    <li><b>관성(官星)</b> — 나를 누르는 기운. 한 박자 늦추면 무사한 날</li>\n  </ul>\n</div>\n\n<div class="card">\n  <h2>궁합 (宮合)</h2>\n  <p>두 사람의 사주를 나란히 놓고 서로의 기운이 어떻게 만나는지를 봅니다. 전통적으로 가장 중요하게 보는 것이 <b>지지(地支)의 관계</b>입니다.</p>\n  <ul>\n    <li><b>육합(六合)</b> — 서로의 부족함을 채우는 하늘이 맺은 짝</li>\n    <li><b>삼합(三合)</b> — 같은 방향을 바라보는 동지 같은 인연</li>\n    <li><b>충(沖)</b> — 정반대의 기질. 끌리지만 부딪히기도 하는 관계</li>\n  </ul>\n  <p>여기에 오행의 <b>상생(相生)</b>과 <b>상극(相剋)</b>을 더해 두 사람의 결을 읽습니다.</p>\n</div>\n\n<div class="card">\n  <h2>꿈해몽 (解夢)</h2>\n  <p>한국의 해몽은 서양의 심리 해석과 결이 다릅니다. 상징 하나하나에 <b>전해 내려오는 고정된 뜻</b>이 있고, 그중 상당수가 <b>역몽(逆夢)</b> — 즉 반대로 풀리는 꿈입니다.</p>\n  <ul>\n    <li><b>돼지</b> — 재물이 들어옵니다</li>\n    <li><b>똥</b> — 뜻밖의 횡재 (대표적인 길몽입니다)</li>\n    <li><b>불</b> — 사업과 집안이 크게 일어납니다</li>\n    <li><b>죽음</b> — 끝이 아니라 새로운 시작</li>\n    <li><b>돈을 줍는 꿈</b> — 오히려 지출을 조심하라는 뜻</li>\n  </ul>\n  <p>특히 <b>태몽(胎夢)</b>은 한국 문화에서 각별합니다. 아이를 갖기 전후에 꾸는 꿈으로, 용·호랑이·해·별이 나오면 큰 인물이 될 아이라 여겨 평생 이야기로 남습니다.</p>\n</div>\n\n<div class="card">\n  <h2>알아두실 점</h2>\n  <p>본 서비스의 운세는 한국 전통 명리와 비결을 바탕으로 구성한 <b>오락·문화 콘텐츠</b>입니다. 의학·법률·재무상 조언이 아니며, 중요한 결정은 반드시 전문가와 상의하시기 바랍니다.</p>\n</div>\n<p class="upd">최종 수정일: 2026년 7월 16일</p>';
const DOC_EN = '<h1>Korean Fortune Telling, Explained in a Minute</h1>\n<p class="lead">Tojeong Bigyeol? Saju? Iljin?<br>A short guide to 500 years of Korean divination.</p>\n\n<div class="card">\n  <h2>Two Great Roots</h2>\n  <p>When Koreans say "let\'s read my fortune," they are usually mixing <b>two traditions with entirely different origins</b>. Most people never distinguish them — but knowing the difference makes it far more interesting.</p>\n  <div class="vs">\n    <div><div class="t">Myeongni (命理)</div><div class="b">A system that converts your birth year, month, day and hour into eight characters and reads your structure from them. Saju, yearly fortune, compatibility and daily fortune all come from here.</div></div>\n    <div><div class="t">Divination Texts (占書)</div><div class="b">Drawing a hexagram by the principles of the I Ching and reading its verse for the year. Tojeong Bigyeol is the great example — a New Year custom, drawn once a year.</div></div>\n  </div>\n</div>\n\n<div class="card">\n  <h2>Saju (四柱八字) — Four Pillars, Eight Characters</h2>\n  <p>Your birth <b>year, month, day and hour</b> become four pillars, each written with two characters — <b>eight characters</b> in total. It resembles a Western natal chart, but instead of planets and signs it uses <b>ten Heavenly Stems and twelve Earthly Branches</b>.</p>\n  <p>Each of those eight characters belongs to one of <b>five elements</b>: Wood, Fire, Earth, Metal, Water. A reader looks at which elements overflow and which are missing, and from that balance reads your character and the flow of your whole life. This is why the birth <b>hour</b> matters so much — change the hour and two of your eight characters change completely.</p>\n  <h3>Read it when you ask</h3>\n  <p>"Who am I?" · "What am I built for?" · "When is my season?"</p>\n</div>\n\n<div class="card">\n  <h2>Yearly Fortune · Seun (歲運)</h2>\n  <p>This reads the meeting point where <b>this year\'s energy</b> enters your eight characters. If Saju is the map of your whole life, Seun is this year\'s weather crossing that map.</p>\n  <p>It is by far the most-read fortune in Korea, usually consulted once as the new year begins. A typical reading runs from an overview through love, career, wealth and health, all the way to a month-by-month flow.</p>\n</div>\n\n<div class="card">\n  <h2>Tojeong Bigyeol (土亭祕訣)</h2>\n  <p>A <b>New Year custom</b> passed down since the late Joseon dynasty. It is traditionally attributed to the scholar Tojeong Yi Ji-ham (1517–1578), though most scholars now believe it was composed later and borrowed his name.</p>\n  <p>Your lunar birth year, month and day each become a number, forming an <b>upper, middle and lower trigram</b>. Combined, they select one of <b>144 hexagrams</b>. Notably, the birth hour is never used.</p>\n  <p>The result is not an analytical report but <b>a poem in classical Chinese</b>. For example: <b>東風解凍</b> — "Spring wind melts the ice; what was blocked unbinds itself." If Myeongni is prose, Tojeong is verse.</p>\n  <h3>Why does it disagree with my Saju?</h3>\n  <p>Because the two calculate in completely different ways. By long custom, <b>Myeongni describes the frame of a whole life, while Tojeong reads the mood of a single year</b>. Disagreement between them is expected, not strange.</p>\n</div>\n\n<div class="card">\n  <h2>Iljin (日辰) — Today\'s Fortune</h2>\n  <p>Every single day carries its own two characters, called the <b>Iljin</b>. The <b>sixty-year cycle</b> runs unbroken, repeating every sixty days. Today\'s fortune reads how today\'s Iljin meets your own chart.</p>\n  <p>That meeting takes five forms.</p>\n  <ul>\n    <li><b>Inseong (印星)</b> — the energy that revives you. Help and learning arrive</li>\n    <li><b>Siksang (食傷)</b> — your energy reaching outward. Good for expression and action</li>\n    <li><b>Jaeseong (財星)</b> — the wealth you can govern. Good for securing real gains</li>\n    <li><b>Bihwa (比和)</b> — your own element. A day that simply flows</li>\n    <li><b>Gwanseong (官星)</b> — the energy pressing on you. Slow by one beat and it passes</li>\n  </ul>\n</div>\n\n<div class="card">\n  <h2>Gunghap (宮合) — Compatibility</h2>\n  <p>Two charts are placed side by side to see how their energies meet. Traditionally the most important thing to look at is the relationship between the <b>Earthly Branches</b>.</p>\n  <ul>\n    <li><b>Yukhap (六合)</b> — a heaven-tied pair, each completing the other\'s lack</li>\n    <li><b>Samhap (三合)</b> — comrades gazing in the same direction</li>\n    <li><b>Chung (沖)</b> — opposite temperaments. Powerfully drawn, easily clashing</li>\n  </ul>\n  <p>To this is added whether the five elements <b>nourish (相生)</b> or <b>restrain (相剋)</b> each other.</p>\n</div>\n\n<div class="card">\n  <h2>Dream Reading (解夢)</h2>\n  <p>Korean dream reading differs in grain from Western psychological interpretation. Each symbol carries a <b>fixed, inherited meaning</b>, and a great many are <b>reversed dreams</b> — they mean the opposite of what they show.</p>\n  <ul>\n    <li><b>Pig</b> — wealth is coming</li>\n    <li><b>Excrement</b> — an unexpected windfall (a classic auspicious dream)</li>\n    <li><b>Fire</b> — your business and household rise high</li>\n    <li><b>Death</b> — not an ending but a beginning</li>\n    <li><b>Finding money</b> — a warning to watch your spending instead</li>\n  </ul>\n  <p>The <b>taemong (胎夢)</b>, or conception dream, holds a special place in Korean culture. Dreamt around the time a child is conceived, a dragon, tiger, sun or star foretells a remarkable child — and the story is retold for that person\'s entire life.</p>\n</div>\n\n<div class="card">\n  <h2>Please Note</h2>\n  <p>The readings on this site are <b>entertainment and cultural content</b> based on Korean traditional fortune-telling. They are not medical, legal, or financial advice. For important decisions, please consult a qualified professional.</p>\n</div>\n<p class="upd">Last updated: July 16, 2026</p>';
</script>
