<style>
:root{
  color-scheme:light dark;
  --hanji:#F6F0E3;
  --meok:#2B2620;
  --noeurok:#2E6B5E;
  --noeurok-deep:#1E4634;
  --samcheong:#2C4E8A;
  --jinsa:#C23B22;
  --hwang:#E8A93D;
  --bunhong:#D9738C;
  --seokganju:#8A4A34;
  --seokganju-dark:#6E3A28;
  --stone:#B9B2A4;
  --stone-dark:#8F887B;
  --gold-line:#C9A85C;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{
  font-family:'Gowun Batang',serif;
  background:#F6F0E3;
  background:var(--hanji);
  color:var(--meok);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow-x:hidden;
}

/* ── 좌우 기둥 ── */
body::before, body::after{
  content:"";
  position:fixed; top:0; bottom:0;
  width:clamp(10px, 3vw, 34px);
  background:linear-gradient(90deg,
    var(--seokganju-dark) 0%, var(--seokganju) 30%,
    #A05A40 50%, var(--seokganju) 70%, var(--seokganju-dark) 100%);
  box-shadow:inset 0 0 18px rgba(0,0,0,.25);
  z-index:5;
}
body::before{left:0}
body::after{right:0}

/* ── 지붕(단청 처마) ── */
.roof{position:relative; z-index:4;}
.roof svg{display:block; width:100%; height:auto;}

/* ── 호랑이 ── */
.tiger{
  position:absolute;
  top:100px;
  top:8.5vw;
  right:30px;
  right:clamp(14px, 4vw, 52px);
  height:150px;
  height:clamp(64px, 13.5vw, 240px);
  width:auto;
  z-index:6;
  pointer-events:none;
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.3));
  image-rendering:auto;
}
@media (max-width:560px){
  .tiger{top:6vw; height:64px; height:clamp(48px, 15vw, 84px);}
}

/* ── 상단 바 (언어 토글: 좌측 상단) ── */
.topbar{position:absolute; top:10px; left:clamp(20px,5vw,50px); z-index:10;}
.lang-toggle{
  display:inline-flex; border:2px solid var(--gold-line);
  border-radius:999px; overflow:hidden; background:rgba(43,38,32,.55);
  backdrop-filter:blur(2px);
  font-family:'Noto Sans KR',sans-serif; font-size:.8rem; font-weight:700;
}
.lang-toggle button{
  border:none; background:transparent; color:#EFE6D0;
  padding:.35rem .85rem; cursor:pointer; transition:.2s;
}
.lang-toggle button.active{background:var(--gold-line); color:var(--meok);}

/* ── 본문 ── */
main{
  flex:1; width:100%; max-width:920px;
  margin:0 auto;
  padding:2.2rem clamp(28px,7vw,60px) 3rem;
  text-align:center;
}
.eyebrow{
  font-family:'Noto Sans KR',sans-serif;
  letter-spacing:.35em; font-size:.72rem; font-weight:500;
  color:var(--seokganju); text-transform:uppercase;
  margin-bottom:.7rem;
}
h1{
  font-family:'Song Myung',serif;
  font-size:clamp(1.9rem, 6vw, 3.1rem);
  line-height:1.25; color:var(--meok);
}
h1 .accent{color:var(--jinsa);}
.subtitle{
  margin-top:.9rem;
  font-size:clamp(.95rem, 2.6vw, 1.08rem);
  color:#5A5245; line-height:1.7;
}
.visitor{
  margin:1.6rem auto 0; display:inline-block;
  font-family:'Noto Sans KR',sans-serif;
  font-size:.85rem; color:#6B6353;
  border-top:1px solid var(--gold-line);
  border-bottom:1px solid var(--gold-line);
  padding:.5rem 1.4rem;
}
.visitor b{color:var(--jinsa); font-weight:700;}

/* ── 운세 메뉴: PC 3열 고정 ── */
.menu-title{
  margin:2.6rem 0 1.3rem;
  font-family:'Song Myung',serif;
  font-size:clamp(.95rem, 3.4vw, 1.15rem);
  color:var(--noeurok);
  display:flex; align-items:center; gap:10px; justify-content:center;
  white-space:nowrap;
}
.menu-title::before, .menu-title::after{
  content:""; height:1px; background:var(--gold-line);
  flex:0 1 56px; min-width:10px;
}
.menu-grid{
  display:flex; flex-direction:column;
  gap:12px; max-width:540px; margin:0 auto;
}
.menu-btn{
  border:1.5px solid #E4D9BF; background:#FFFDF7;
  border-radius:16px; padding:.95rem 1.15rem;
  cursor:pointer;
  display:flex; align-items:center; justify-content:space-between; gap:1rem;
  transition:transform .15s, box-shadow .15s, border-color .15s;
  font-family:'Gowun Batang',serif;
  text-align:left;
}
.menu-btn:hover, .menu-btn:focus-visible{
  transform:translateY(-2px);
  border-color:var(--hwang);
  box-shadow:0 6px 16px rgba(138,74,52,.15);
  outline:none;
}
.menu-btn .mtext{display:flex; flex-direction:column; gap:.28rem; flex:1; min-width:0;}
.menu-btn .emblem{width:54px; height:54px; flex:0 0 54px;}
.menu-btn .name{font-size:1.08rem; font-weight:700; color:var(--meok); line-height:1.3;}
.menu-btn .desc{
  font-family:'Noto Sans KR',sans-serif;
  font-size:.82rem; color:#6E6656; line-height:1.45;
}



.menu-btn--featured{
  border-color:var(--hwang); border-width:2px;
  background:linear-gradient(135deg,#FFFDF7,#FFF6E4);
  box-shadow:0 3px 10px rgba(232,169,61,.18);
  position:relative;
}
.menu-btn--featured:hover{ box-shadow:0 8px 20px rgba(232,169,61,.28); }
.menu-btn--featured .name{ color:var(--jinsa); }
.mbadge{
  position:absolute; top:-9px; left:14px;
  background:var(--jinsa); color:#FFF7EA;
  font-family:'Noto Sans KR',sans-serif; font-size:.68rem; font-weight:700;
  padding:.15rem .55rem; border-radius:10px;
  letter-spacing:.02em;
}
/* ── 사이트 공유 바 ── */
.share-bar{display:flex; align-items:center; gap:.55rem; margin:.2rem 0 1.3rem; flex-wrap:wrap;}
.share-bar .sb-label{font-family:'Gowun Batang',serif; font-size:.86rem; font-weight:700; color:var(--noeurok); white-space:nowrap;}
.share-bar .sb-div{width:1px; height:15px; background:var(--gold-line);}
.sb-icons{display:flex; align-items:center; gap:.4rem; flex-wrap:wrap;}
.sb-btn{width:34px; height:34px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; transition:transform .12s, box-shadow .12s; background:#FFFDF7; box-shadow:0 1px 4px rgba(138,74,52,.14);}
.sb-btn:hover{transform:translateY(-2px); box-shadow:0 4px 10px rgba(138,74,52,.22);}
.sb-btn svg{width:19px; height:19px; display:block;}
/* ── 오늘의 일진 바 ── */
.today-bar{
  max-width:540px; margin:1.4rem auto 0; padding:.8rem 1.1rem;
  background:#FFFDF7; border:1.5px solid var(--gold-line); border-radius:12px;
  font-family:'Noto Sans KR',sans-serif;
}
.today-bar .tb-line{display:flex; align-items:center; justify-content:center; gap:.5rem; flex-wrap:wrap; font-size:.86rem; color:#6E6656;}
.today-bar .tb-mean{margin-top:.5rem; padding-top:.5rem; border-top:1px dashed #E4D9BF; font-size:.8rem; line-height:1.6; color:#7A7263; text-align:center;}
.today-bar .ji{font-family:'Song Myung',serif; color:var(--samcheong); font-size:1rem;}
.today-bar .dot{color:#C9A85C;}
.today-bar .term{color:var(--jinsa); font-weight:700;}
/* ── 오늘의 나 ── */
.myday{
  display:none; max-width:540px; margin:.7rem auto 0; padding:1rem 1.15rem;
  background:linear-gradient(135deg,#FFFDF7,#F6EEDD); border:2px solid var(--gold-line);
  border-radius:14px; text-align:left; align-items:center; gap:.9rem;
}
.myday.on{display:flex;}
.myday .lv{flex:0 0 auto; font-family:'Noto Sans KR',sans-serif; font-size:.72rem; font-weight:700;
  color:#FFF7EA; background:var(--jinsa); border-radius:999px; padding:.3rem .7rem;}
.myday .txt{flex:1; min-width:0;}
.myday .t1{font-family:'Gowun Batang',serif; font-size:.78rem; color:#8A7A4E;}
.myday .t2{font-family:'Song Myung',serif; font-size:1.02rem; color:var(--meok); line-height:1.4; margin-top:.15rem;}
.myday .go{flex:0 0 auto; background:var(--jinsa); color:#FFF7EA; border-radius:9px;
  padding:.5rem .8rem; font-family:'Gowun Batang',serif; font-size:.85rem; font-weight:700; text-decoration:none; white-space:nowrap;}
/* ── 띠별 운세 ── */
.zodiac-sec{max-width:600px; margin:2.4rem auto 0;}
.zodiac-title{font-family:'Song Myung',serif; font-size:clamp(.95rem,3.4vw,1.15rem); color:var(--noeurok);
  display:flex; align-items:center; gap:10px; justify-content:center; white-space:nowrap; margin-bottom:1.1rem;}
.zodiac-title::before,.zodiac-title::after{content:""; height:1px; background:var(--gold-line); flex:0 1 46px; min-width:10px;}
.zodiac-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:.5rem;}
.zbtn{background:#FFFDF7; border:1.5px solid #E4D9BF; border-radius:12px; padding:.6rem .3rem;
  text-align:center; cursor:pointer; transition:border-color .15s;}
.zbtn:hover,.zbtn.sel{border-color:var(--jinsa);}
.zbtn .emo{font-size:1.5rem; line-height:1;}
.zbtn .zn{font-family:'Noto Sans KR',sans-serif; font-size:.72rem; color:#6E6656; margin-top:.2rem;}
.zbtn .zg{display:inline-block; width:7px; height:7px; border-radius:50%; margin-top:.25rem;}
.zdetail{display:none; margin-top:.9rem; background:#FFFDF7; border:1.5px solid var(--gold-line);
  border-radius:14px; padding:1.1rem 1.2rem;}
.zdetail.on{display:block;}
.zdetail .zh{font-family:'Song Myung',serif; font-size:1.1rem; color:var(--jinsa); margin-bottom:.5rem;}
.zdetail .zt{font-family:'Gowun Batang',serif; font-size:.96rem; line-height:1.7; color:#3E382E;}
.zdetail .zyears{font-family:'Noto Sans KR',sans-serif; font-size:.76rem; color:#8A7A4E; margin-bottom:.6rem; padding-bottom:.5rem; border-bottom:1px dashed #E4D9BF;}
.zdetail .zmore{display:block; text-align:center; margin-top:.9rem; background:var(--jinsa); color:#FFF7EA; border-radius:10px; padding:.7rem; font-family:'Gowun Batang',serif; font-size:.92rem; font-weight:700; text-decoration:none;}
.zdetail .zsaju{margin-top:.9rem; padding-top:.8rem; border-top:1px solid #EFE8D6; font-family:'Noto Sans KR',sans-serif; font-size:.8rem; line-height:1.6; color:#6E6656; text-align:center;}
.zdetail .zsaju b{color:var(--jinsa);}
.zdetail .zsaju a{display:inline-block; margin-top:.4rem; color:var(--seokganju); font-weight:700; text-decoration:none; border-bottom:1.5px solid var(--gold-line);}
/* ── 설치 배너 ── */
.install{
  display:none; max-width:540px; margin:1.6rem auto 0;
  background:#FFFDF7; border:1.5px solid var(--gold-line); border-radius:14px;
  padding:.85rem 1rem; align-items:center; gap:.8rem; text-align:left;
}
.install.on{display:flex;}
.install img{width:42px; height:42px; border-radius:9px; flex:0 0 42px;}
.install .txt{flex:1; min-width:0;}
.install .t1{font-family:'Gowun Batang',serif; font-size:.95rem; font-weight:700; color:var(--meok);}
.install .t2{font-family:'Noto Sans KR',sans-serif; font-size:.74rem; color:#8A8171; line-height:1.5; margin-top:.15rem;}
.install button{
  border:none; background:var(--jinsa); color:#FFF7EA; border-radius:9px;
  padding:.5rem .9rem; font-family:'Gowun Batang',serif; font-size:.88rem; font-weight:700; cursor:pointer; white-space:nowrap;
}
.install .x{background:transparent; color:#B0A896; padding:.3rem .4rem; font-size:1rem;}
/* ── 설치 안내 모달 ── */
.ins-modal{
  display:none; position:fixed; inset:0; z-index:100;
  background:rgba(30,26,20,.62); backdrop-filter:blur(3px);
  align-items:center; justify-content:center; padding:1.2rem;
}
.ins-modal.on{display:flex;}
.ins-card{
  background:#FFFDF7; border:2px solid var(--gold-line); border-radius:20px;
  padding:1.6rem 1.4rem 1.3rem; max-width:380px; width:100%; text-align:center;
  box-shadow:0 18px 44px rgba(0,0,0,.3);
}
.ins-card .ic-big{width:64px; height:64px; border-radius:14px; margin-bottom:.7rem;}
.ins-card h3{font-family:'Song Myung',serif; font-size:1.25rem; color:var(--meok); margin-bottom:.3rem;}
.ins-card > p{font-family:'Noto Sans KR',sans-serif; font-size:.82rem; color:#8A8171; margin-bottom:1.1rem;}
.mstep{
  display:flex; align-items:center; gap:.7rem; text-align:left;
  background:#F6F0E3; border-radius:12px; padding:.7rem .8rem; margin-bottom:.55rem;
}
.mstep .num{
  flex:0 0 22px; height:22px; border-radius:50%; background:var(--jinsa); color:#FFF7EA;
  font-family:'Noto Sans KR',sans-serif; font-size:.72rem; font-weight:700;
  display:flex; align-items:center; justify-content:center;
}
.mstep .ic{flex:0 0 26px; display:flex; align-items:center; justify-content:center;}
.mstep .tx{font-family:'Noto Sans KR',sans-serif; font-size:.85rem; line-height:1.55; color:#3E382E;}
.mstep .tx b{color:var(--jinsa); font-weight:700;}
.ins-card #mClose{
  margin-top:.7rem; width:100%; border:1.5px solid #D8CCAE; background:#FFFDF7;
  border-radius:11px; padding:.7rem; font-family:'Gowun Batang',serif; font-size:.95rem;
  color:#6E6656; cursor:pointer;
}
/* ── 토스트 ── */
.toast{
  position:fixed; left:50%; bottom:90px;
  transform:translateX(-50%) translateY(20px);
  background:var(--meok); color:#F3EBD9;
  font-family:'Noto Sans KR',sans-serif; font-size:.85rem;
  padding:.65rem 1.3rem; border-radius:999px;
  opacity:0; pointer-events:none; transition:.3s; z-index:50;
  white-space:nowrap;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ── 하단 돌기단 ── */
footer{
  position:relative; z-index:4;
  background:linear-gradient(180deg, var(--stone) 0%, var(--stone-dark) 100%);
  padding:1.1rem 0 .9rem; text-align:center;
}
footer::before{
  content:""; display:block;
  position:absolute; top:-8px; left:0; right:0; height:8px;
  background:repeating-linear-gradient(90deg,
    var(--stone-dark) 0 46px, #A39C8E 46px 48px);
}
footer p{
  font-family:'Noto Sans KR',sans-serif;
  font-size:.72rem; color:#3E3A32; letter-spacing:.05em;
}

/* ── 모바일 보정 ── */
@media (max-width:560px){
  .menu-btn{padding:.85rem 1rem;}
  .menu-btn .emblem{width:48px; height:48px; flex-basis:48px;}
  .menu-btn .name{font-size:1.08rem;}
  .menu-btn .desc{font-size:.86rem;}
}
@media (prefers-reduced-motion: reduce){
  *{transition:none !important;}
}
</style>

function detectLang(){
  const saved = localStorage.getItem("kf_lang");
  if(saved === "kr" || saved === "en") return saved;
  const langs = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language || "en"];
  return langs.some(l => (l||"").toLowerCase().startsWith("ko")) ? "kr" : "en";
}
let currentLang = detectLang();

function setLang(lang){
  currentLang = lang;
  localStorage.setItem("kf_lang", lang);
  document.documentElement.lang = (lang === "kr" ? "ko" : "en");
  document.getElementById("btnKR").classList.toggle("active", lang==="kr");
  document.getElementById("btnEN").classList.toggle("active", lang==="en");
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key = el.getAttribute("data-i18n");
    if(I18N[lang][key] !== undefined) el.innerHTML = I18N[lang][key];
  });
  if(typeof renderVisitor === "function") renderVisitor();
  if(typeof window._insRefresh === "function") window._insRefresh();
  if(typeof renderToday === "function") renderToday();
  if(typeof renderShare === "function") renderShare();
}

let _counts = null;
function renderVisitor(){
  const box = document.getElementById("visitorBox");
  if(!_counts){ box.textContent = "…"; return; }
  const c = _counts;
  box.innerHTML = (currentLang === "kr")
    ? "당신은 오늘 <b>" + c.d.toLocaleString() + "</b>번째 · 이번 달 <b>" + c.m.toLocaleString() + "</b>번째 · 올해 <b>" + c.y.toLocaleString() + "</b>번째 방문자입니다"
    : "Visitor No. <b>" + c.d.toLocaleString() + "</b> today · <b>" + c.m.toLocaleString() + "</b> this month · <b>" + c.y.toLocaleString() + "</b> this year";
}
async function updateVisitor(){
  const NS = "kfortune_story_v1";
  const now = new Date();
  const y = now.getFullYear(), mo = String(now.getMonth()+1).padStart(2,"0"), d = String(now.getDate()).padStart(2,"0");
  try{
    const urls = ["y"+y, "m"+y+mo, "d"+y+mo+d].map(k => "https://abacus.jasoncameron.dev/hit/" + NS + "/" + k);
    const rs = await Promise.all(urls.map(u => fetch(u).then(r => r.json())));
    _counts = { y: rs[0].value, m: rs[1].value, d: rs[2].value };
  }catch(e){
    /* 오프라인/차단 시 임시 숫자 */
    const demo = 128 + now.getHours() * 9;
    _counts = { y: demo * 37, m: demo * 6, d: demo };
  }
  renderVisitor();
}

function goFortune(type){
  localStorage.setItem("kf_selected", type);
  location.href = "input.html?type=" + type;
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove("show"), 2200);
}

function _termMin(y,i){ if(y<1900||y>2060) return null; const off=((y-1900)*12+i)*4; return parseInt(_TT.substr(off,4),36); }
function _jdn(y,m,d){ const a=Math.floor((14-m)/12),yy=y+4800-a,mm=m+12*a-3; return d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045; }
function _iljin(dt){ const i=((_jdn(dt.getFullYear(),dt.getMonth()+1,dt.getDate())+49)%60+60)%60; return {si:i%10, bi:i%12, elem:_SE[i%10]}; }
function _dayElem(bdate){ const y=+bdate.slice(0,4),m=+bdate.slice(5,7),d=+bdate.slice(8,10); const i=((_jdn(y,m,d)+49)%60+60)%60; return _SE[i%10]; }

function renderToday(){
  const K = currentLang === "kr";

  const ij = _iljin(now);
  const y = now.getFullYear();
  const nowMin = Math.round((Date.UTC(y,now.getMonth(),now.getDate()) - Date.UTC(y,0,1))/60000);

    return ys.filter(y=>y>=1948 && y<=2008);

        +(K?"오늘 하늘의 기운은 "+_EL.kr[ij.elem]+"이며, "+nm+"과 만나 이런 하루를 만듭니다.":"Today's energy is "+_EL.en[ij.elem]+", meeting the "+nm+" to shape the day.")+'</div>'
        +'<a class="zmore" href="ad.html?type=today&z='+z+'">'+(K?"이 띠의 오늘 운세 자세히 보기 →":"See today in detail →")+'</a>'
        +'<div class="zsaju">'+(K?"띠로 보면 이런데, <b>사주팔자</b>로 오늘 내 일진은 어떨까요?":"This is by sign — but what does your <b>Saju</b> say about today?")
        +'<a href="input.html?type=today">'+(K?"내 사주로 오늘 보기 →":"Read today by my Saju →")+'</a></div>';
      dt.classList.add("on");
    });
  });
}

function blessToast(){
  const T = I18N[currentLang];
  showToast(T.shareDone);
}
function renderShare(){
  const box = document.getElementById("sbIcons");
  if(!box) return;
  const T = I18N[currentLang];
  const txt = T.shareText, url = SHARE_URL;
  const enc = encodeURIComponent, full = enc(txt + " " + url);
  box.innerHTML = "";
  const add = (svg, label, fn) => {
    const b = document.createElement("button");
    b.className = "sb-btn"; b.innerHTML = svg; b.title = label; b.setAttribute("aria-label", label);
    b.addEventListener("click", fn); box.appendChild(b);
  };
  /* 네이티브 공유 (모바일 - 카톡·인스타·라인 다 뜸) */
  if(navigator.share){
    add(SVG_MORE, "Share", ()=>{
      navigator.share({title:T.shareTitle, text:txt, url:url}).then(blessToast).catch(()=>{});
    });
  }
  /* 카카오톡 (SDK) */
  add(SVG_KAKAO, "KakaoTalk", ()=>{
    if(window.Kakao && Kakao.isInitialized && Kakao.isInitialized() && Kakao.Share){
      try{
        Kakao.Share.sendDefault({
          objectType: "feed",
          content: {
            title: T.shareTitle,
            description: T.shareText,
            imageUrl: "https://kfortunestory.com/og-image.png",
            link: { mobileWebUrl: url, webUrl: url }
          },
          buttons: [{ title: (currentLang==="kr"?"운세 보러 가기":"See my fortune"), link: { mobileWebUrl: url, webUrl: url } }]
        });
        blessToast();
      }catch(e){
        window.open("https://accounts.kakao.com", "_blank");
      }
    }else{
      /* SDK 미로드 시 폴백: 링크 복사 */
      (navigator.clipboard ? navigator.clipboard.writeText(url) : Promise.reject())
        .then(()=>showToast(currentLang==="kr"?"카톡 앱에 붙여넣어 공유하세요 (링크 복사됨)":"Link copied — paste into KakaoTalk"))
        .catch(()=>prompt(currentLang==="kr"?"이 링크를 복사하세요":"Copy this link", url));
    }
  });
  /* WhatsApp */
  add(SVG_WA, "WhatsApp", ()=>{ window.open("https://wa.me/?text=" + full, "_blank"); blessToast(); });
  /* X */
  add(SVG_X, "X", ()=>{ window.open("https://twitter.com/intent/tweet?text=" + enc(txt) + "&url=" + enc(url), "_blank"); blessToast(); });
  /* Facebook */
  add(SVG_FB, "Facebook", ()=>{ window.open("https://www.facebook.com/sharer/sharer.php?u=" + enc(url), "_blank"); blessToast(); });
  /* 링크 복사 */
  add(SVG_LINK, "Copy link", ()=>{
    (navigator.clipboard ? navigator.clipboard.writeText(url) : Promise.reject())
      .then(()=>showToast(currentLang==="kr"?"링크 복사됨 ✨ 아무 데나 붙여넣기":"Link copied ✨"))
      .catch(()=>{ prompt(currentLang==="kr"?"이 링크를 복사하세요":"Copy this link", url); });
  });
}

/* ══ 홈 화면 추가 — 플랫폼 자동 감지 ══ */
(function(){
  const bar = document.getElementById("installBar");
  const btn = document.getElementById("insBtn");
  const modal = document.getElementById("insModal");
  const standalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone === true;
  if(standalone){ return; }

  const ua = navigator.userAgent || "";
  const isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  const iosSafari = isIOS && !/CriOS|FxiOS|EdgiOS|OPiOS|Whale/.test(ua);
  const isMac = /Macintosh/.test(ua) && !isIOS;
  const macSafari = isMac && /Safari/.test(ua) && !/Chrome|Chromium|Edg/.test(ua);
  let deferred = null, mode = "manual";

  function T(){ return I18N[currentLang]; }
  function setBar(){
    document.getElementById("insT1").textContent = T().insT1;
    document.getElementById("insT2").textContent = (mode === "auto") ? T().insT2auto : T().insT2man;
    btn.textContent = (mode === "auto") ? T().insBtn : T().insBtnMan;
  }
  function showBar(){ setBar(); bar.classList.add("on"); }
  /* 언어 토글 시 배너·모달 문구 즉시 갱신 */
  window._insRefresh = function(){
    if(bar.classList.contains("on")) setBar();
    if(modal.classList.contains("on")) openModal();
  };

  /* 안드로이드·PC 크롬/엣지 → 원클릭 설치 */
  window.addEventListener("beforeinstallprompt", e => {
    e.preventDefault(); deferred = e; mode = "auto"; showBar();
  });
  /* 그 외(아이폰 등) → 안내 모드 */
  setTimeout(()=>{ if(!deferred){ mode = "manual"; showBar(); } }, 1500);

  /* ── 안내 모달 ── */
  const ICON_SHARE = '<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#2C6FE0" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3"/><path d="M8 7l4-4 4 4"/><path d="M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"/></svg>';
  const ICON_PLUS = '<svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#2B2620" stroke-width="1.9" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="4"/><path d="M12 8v8M8 12h8"/></svg>';
  const ICON_SAFARI = '<svg viewBox="0 0 24 24" width="26" height="26"><circle cx="12" cy="12" r="10" fill="#1A8CFF"/><circle cx="12" cy="12" r="8" fill="#F2F6FA"/><path d="M16 8l-2.2 5.8L8 16l2.2-5.8z" fill="#FF4B4B"/><circle cx="12" cy="12" r="1.2" fill="#FFF"/></svg>';

  function steps(){
    const t = T();
    if(isIOS && iosSafari) return [
      {i:ICON_SHARE, s:t.s_ios1},
      {i:ICON_PLUS,  s:t.s_ios2},
      {i:"", s:t.s_ios3}
    ];
    if(isIOS) return [
      {i:ICON_SAFARI, s:t.s_iosx1},
      {i:ICON_SHARE,  s:t.s_ios1},
      {i:ICON_PLUS,   s:t.s_ios2}
    ];
    if(macSafari) return [{i:ICON_SHARE, s:t.s_mac1},{i:ICON_PLUS, s:t.s_mac2}];
    return [{i:"", s:t.s_gen1},{i:"", s:t.s_gen2}];
  }
  function openModal(){
    const t = T();
    document.getElementById("mTitle").textContent = t.mTitle;
    document.getElementById("mSub").textContent = (isIOS && !iosSafari) ? t.mSubSafari : t.mSub;
    document.getElementById("mSteps").innerHTML = steps().map((x,i)=>
      '<div class="mstep"><span class="num">' + (i+1) + '</span>'
      + (x.i ? '<span class="ic">' + x.i + '</span>' : '')
      + '<span class="tx">' + x.s + '</span></div>').join("");
    document.getElementById("mClose").textContent = t.mClose;
    modal.classList.add("on");
  }
  btn.addEventListener("click", async ()=>{
    if(mode === "auto" && deferred){
      deferred.prompt();
      await deferred.userChoice;
      deferred = null; bar.classList.remove("on");
    }else{
      openModal();
    }
  });
  document.getElementById("insX").addEventListener("click", ()=> bar.classList.remove("on"));
  document.getElementById("mClose").addEventListener("click", ()=> modal.classList.remove("on"));
  modal.addEventListener("click", e => { if(e.target === modal) modal.classList.remove("on"); });
  window.addEventListener("appinstalled", ()=> bar.classList.remove("on"));
})();
</script>
