<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#F6F0E3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Song+Myung&family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<title>K-Fortune Story | 운세 결과</title>
<style>
:root{
  color-scheme:light dark;
  --hanji:#F6F0E3;
  --meok:#2B2620;
  --noeurok:#2E6B5E;
  --noeurok-deep:#1E4634;
  --samcheong:#2C4E8A;
  --jinsa:#C23B22;
  --hwang:#E8A93D;
  --bunhong:#D9738C;
  --seokganju:#8A4A34;
  --seokganju-dark:#6E3A28;
  --stone:#B9B2A4;
  --stone-dark:#8F887B;
  --gold-line:#C9A85C;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{
  font-family:'Gowun Batang',serif;
  background:#F6F0E3;
  background:var(--hanji);
  color:var(--meok);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow-x:hidden;
}

/* ── 좌우 기둥 ── */
body::before, body::after{
  content:"";
  position:fixed; top:0; bottom:0;
  width:clamp(10px, 3vw, 34px);
  background:linear-gradient(90deg,
    var(--seokganju-dark) 0%, var(--seokganju) 30%,
    #A05A40 50%, var(--seokganju) 70%, var(--seokganju-dark) 100%);
  box-shadow:inset 0 0 18px rgba(0,0,0,.25);
  z-index:5;
}
body::before{left:0}
body::after{right:0}

/* ── 지붕(단청 처마) ── */
.roof{position:relative; z-index:4;}
.roof svg{display:block; width:100%; height:auto;}

/* ── 호랑이 ── */
.tiger{
  position:absolute;
  top:100px;
  top:8.5vw;
  right:30px;
  right:clamp(14px, 4vw, 52px);
  height:150px;
  height:clamp(64px, 13.5vw, 240px);
  width:auto;
  z-index:6;
  pointer-events:none;
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.3));
  image-rendering:auto;
}
@media (max-width:560px){
  .tiger{top:6vw; height:64px; height:clamp(48px, 15vw, 84px);}
}

/* ── 상단 바 (언어 토글: 좌측 상단) ── */
.topbar{position:absolute; top:10px; left:clamp(20px,5vw,50px); z-index:10;}
.lang-toggle{
  display:inline-flex; border:2px solid var(--gold-line);
  border-radius:999px; overflow:hidden; background:rgba(43,38,32,.55);
  backdrop-filter:blur(2px);
  font-family:'Noto Sans KR',sans-serif; font-size:.8rem; font-weight:700;
}
.lang-toggle button{
  border:none; background:transparent; color:#EFE6D0;
  padding:.35rem .85rem; cursor:pointer; transition:.2s;
}
.lang-toggle button.active{background:var(--gold-line); color:var(--meok);}

/* ── 본문 ── */
main{
  flex:1; width:100%; max-width:920px;
  margin:0 auto;
  padding:2.2rem clamp(28px,7vw,60px) 3rem;
  text-align:center;
}
.eyebrow{
  font-family:'Noto Sans KR',sans-serif;
  letter-spacing:.35em; font-size:.72rem; font-weight:500;
  color:var(--seokganju); text-transform:uppercase;
  margin-bottom:.7rem;
}
h1{
  font-family:'Song Myung',serif;
  font-size:clamp(1.9rem, 6vw, 3.1rem);
  line-height:1.25; color:var(--meok);
}
h1 .accent{color:var(--jinsa);}
.subtitle{
  margin-top:.9rem;
  font-size:clamp(.95rem, 2.6vw, 1.08rem);
  color:#5A5245; line-height:1.7;
}
.visitor{
  margin:1.6rem auto 0; display:inline-block;
  font-family:'Noto Sans KR',sans-serif;
  font-size:.85rem; color:#6B6353;
  border-top:1px solid var(--gold-line);
  border-bottom:1px solid var(--gold-line);
  padding:.5rem 1.4rem;
}
.visitor b{color:var(--jinsa); font-weight:700;}

/* ── 운세 메뉴: PC 3열 고정 ── */
.menu-title{
  margin:2.6rem 0 1.3rem;
  font-family:'Song Myung',serif;
  font-size:1.15rem; color:var(--noeurok);
  display:flex; align-items:center; gap:14px; justify-content:center;
}
.menu-title::before, .menu-title::after{
  content:""; height:1px; width:56px; background:var(--gold-line);
}
.menu-grid{
  display:flex; flex-direction:column;
  gap:12px; max-width:540px; margin:0 auto;
}
.menu-btn{
  border:1.5px solid #E4D9BF; background:#FFFDF7;
  border-radius:16px; padding:.95rem 1.15rem;
  cursor:pointer;
  display:flex; align-items:center; justify-content:space-between; gap:1rem;
  transition:transform .15s, box-shadow .15s, border-color .15s;
  font-family:'Gowun Batang',serif;
  text-align:left;
}
.menu-btn:hover, .menu-btn:focus-visible{
  transform:translateY(-2px);
  border-color:var(--hwang);
  box-shadow:0 6px 16px rgba(138,74,52,.15);
  outline:none;
}
.menu-btn .mtext{display:flex; flex-direction:column; gap:.28rem; flex:1; min-width:0;}
.menu-btn .emblem{width:54px; height:54px; flex:0 0 54px;}
.menu-btn .name{font-size:1.15rem; font-weight:700; color:var(--meok); line-height:1.3;}
.menu-btn .desc{
  font-family:'Noto Sans KR',sans-serif;
  font-size:.9rem; color:#6E6656; line-height:1.45;
}

/* ── 토스트 ── */
.toast{
  position:fixed; left:50%; bottom:90px;
  transform:translateX(-50%) translateY(20px);
  background:var(--meok); color:#F3EBD9;
  font-family:'Noto Sans KR',sans-serif; font-size:.85rem;
  padding:.65rem 1.3rem; border-radius:999px;
  opacity:0; pointer-events:none; transition:.3s; z-index:50;
  white-space:nowrap;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ── 하단 돌기단 ── */
footer{
  position:relative; z-index:4;
  background:linear-gradient(180deg, var(--stone) 0%, var(--stone-dark) 100%);
  padding:1.1rem 0 .9rem; text-align:center;
}
footer::before{
  content:""; display:block;
  position:absolute; top:-8px; left:0; right:0; height:8px;
  background:repeating-linear-gradient(90deg,
    var(--stone-dark) 0 46px, #A39C8E 46px 48px);
}
footer p{
  font-family:'Noto Sans KR',sans-serif;
  font-size:.72rem; color:#3E3A32; letter-spacing:.05em;
}

/* ── 모바일 보정 ── */
@media (max-width:560px){
  .menu-btn{padding:.85rem 1rem;}
  .menu-btn .emblem{width:48px; height:48px; flex-basis:48px;}
  .menu-btn .name{font-size:1.08rem;}
  .menu-btn .desc{font-size:.86rem;}
}
@media (prefers-reduced-motion: reduce){
  *{transition:none !important;}
}
</style>
<style>
.navrow{display:flex; gap:.6rem; justify-content:flex-start; max-width:620px; margin:0 auto 1.2rem; font-family:'Noto Sans KR',sans-serif;}
.homelink{display:inline-flex; align-items:center; gap:.4rem; color:var(--seokganju); text-decoration:none; font-weight:700; font-size:.88rem; border:1.5px solid var(--gold-line); border-radius:999px; padding:.4rem 1rem; background:#FFFDF7;}
.homelink:hover{border-color:var(--hwang);}
.res-wrap{max-width:620px; margin:0 auto; text-align:left;}
.res-visitor{text-align:center; font-family:'Noto Sans KR',sans-serif; font-size:.82rem; color:#6B6353; margin-bottom:.9rem;}
.res-visitor b{color:var(--jinsa);}
.res-head{text-align:center; margin-bottom:1.3rem;}
.res-head h1{font-size:clamp(1.6rem,5vw,2.2rem);}
.res-head .who{margin-top:.4rem; font-family:'Noto Sans KR',sans-serif; font-size:.92rem; color:#6E6656;}
.sum-card{background:#FFFDF7; border:2px solid var(--gold-line); border-radius:18px; padding:1.5rem 1.3rem; text-align:center; margin-bottom:1.2rem; box-shadow:0 4px 14px rgba(138,74,52,.08);}
.sum-card .lv{display:inline-block; font-family:'Noto Sans KR',sans-serif; font-size:.8rem; font-weight:700; color:#FFF7EA; background:var(--jinsa); border-radius:999px; padding:.28rem 1rem; margin-bottom:.7rem;}
.sum-card .line{font-family:'Song Myung',serif; font-size:clamp(1.12rem,3.6vw,1.4rem); line-height:1.55; color:var(--meok);}
.hanja-table{width:100%; border-collapse:collapse; background:#FFFDF7; border-radius:14px; overflow:hidden; margin-bottom:1.2rem; border:1.5px solid #E4D9BF;}
.hanja-table th{background:#F0E7CF; font-family:'Noto Sans KR',sans-serif; font-size:.8rem; color:#6B5B3E; padding:.55rem; border-bottom:1.5px solid #E4D9BF;}
.hanja-table td{padding:.75rem .6rem; text-align:center; border-bottom:1px solid #EFE8D6; font-size:.95rem;}
.hanja-table .big{font-family:'Song Myung',serif; font-size:1.5rem; letter-spacing:.25em; color:var(--samcheong);}
.score-ring{text-align:center; margin:0 0 1.2rem;}
.score-ring .num{font-family:'Song Myung',serif; font-size:3rem; color:var(--jinsa);}
.score-ring .of{font-family:'Noto Sans KR',sans-serif; color:#8A8171; font-size:.9rem;}
.sec{background:#FFFDF7; border:1.5px solid #E4D9BF; border-radius:16px; padding:1.15rem 1.2rem; margin-bottom:.95rem;}
.sec h3{font-family:'Song Myung',serif; font-size:1.05rem; color:var(--noeurok); border-bottom:1.5px solid var(--gold-line); padding-bottom:.45rem; margin-bottom:.7rem; display:flex; align-items:center; gap:.5rem;}
.sec p{font-size:.98rem; line-height:1.75; color:#3E382E;}
.month-table{width:100%; border-collapse:collapse;}
.month-table td{padding:.5rem .3rem; border-bottom:1px solid #EFE8D6; font-size:.9rem; line-height:1.55; vertical-align:top;}
.month-table td.m{font-family:'Song Myung',serif; color:var(--jinsa); white-space:nowrap; width:3.4em; font-size:.95rem;}
.dream-sym{display:inline-block; font-family:'Noto Sans KR',sans-serif; font-size:.85rem; font-weight:700; background:#F0E7CF; color:#6B5B3E; border-radius:999px; padding:.3rem .9rem; margin:0 .3rem .4rem 0;}
.note{font-family:'Noto Sans KR',sans-serif; font-size:.78rem; color:#8A8171; text-align:center; margin:1.3rem 0 0; line-height:1.6;}
.btnrow{display:flex; gap:12px; max-width:620px; margin:1.4rem auto 0;}
.btn-run{flex:1; background:var(--jinsa); color:#FFF7EA; border:2px solid var(--gold-line); border-radius:12px; padding:.9rem; font-size:1.05rem; font-weight:700; font-family:'Gowun Batang',serif; cursor:pointer; text-align:center; text-decoration:none;}
.btn-reset{flex:1; background:#FFFDF7; color:#6E6656; border:1.5px solid #D8CCAE; border-radius:12px; padding:.9rem; font-size:1rem; font-family:'Gowun Batang',serif; cursor:pointer; text-align:center; text-decoration:none;}
</style>


<style>
/* ══ 다크모드 대응: 강제/자동 다크모드 기기에서 자동 적용 ══ */
@media (prefers-color-scheme: dark){
  :root{ color-scheme:light dark; }
  body{ background:#221D16 !important; color:#EFE6D0; }
  h1, .menu-btn .name, .sum-card .line{ color:#F0E7D4 !important; }
  h1 .accent{ color:#E8785E !important; }
  .eyebrow{ color:#D8A374 !important; }
  .subtitle, .visitor, .count, .res-visitor{ color:#C9BFA9 !important; }
  .visitor b, .res-visitor b, .count b, .score-ring .num{ color:#E8785E !important; }
  .menu-title, .sec h3, .person-block h3{ color:#7FBFA5 !important; }
  .menu-btn, .form-card, .sec, .sum-card, .ad-box, .homelink, .btn-reset, .lang-toggle{
    background:#2A251E !important; border-color:#4A4336 !important;
  }
  .menu-btn .desc{ color:#A99F8C !important; }
  .sec p, .month-table td, .radiorow label{ color:#D8CFBB !important; }
  .field > label{ color:#C9B48A !important; }
  .field input, .field select, .field textarea{
    background:#332D25 !important; border-color:#5A4F3E !important; color:#EFE6D0 !important;
  }
  .radiorow label{ background:#332D25 !important; border-color:#5A4F3E !important; }
  .radiorow label.sel{ background:#4A2A20 !important; border-color:#E8785E !important; color:#F0A28F !important; }
  .hanja-table{ background:#2A251E !important; border-color:#4A4336 !important; }
  .hanja-table th{ background:#3A332A !important; color:#D8C9A4 !important; border-color:#4A4336 !important; }
  .hanja-table td{ border-color:#3A332A !important; color:#D8CFBB !important; }
  .hanja-table .big{ color:#8FB3E8 !important; }
  .month-table td{ border-color:#3A332A !important; }
  .month-table td.m{ color:#E8785E !important; }
  .note{ color:#A99F8C !important; }
  .homelink{ color:#D8A374 !important; }
  .btn-reset{ color:#C9BFA9 !important; }
  .ad-slot{ background:#332D25 !important; border-color:#8A7A4E !important; color:#A99F8C !important; }
  .ad-slot b{ color:#D8C9A4 !important; }
  .ftitle p, #fsub, .res-head .who{ color:#C9BFA9 !important; }
  .dream-sym{ background:#3A332A !important; color:#D8C9A4 !important; }
}
</style>
</head>
<body>
<div class="roof" aria-hidden="true">
<svg viewBox="0 0 1200 222" preserveAspectRatio="none">
  <defs>
    <!-- 기와 -->
    <pattern id="giwa" width="46" height="26" patternUnits="userSpaceOnUse">
      <rect width="46" height="26" fill="#3E4247"/>
      <path d="M0,26 A23,23 0 0 1 46,26" fill="none" stroke="#565B61" stroke-width="3"/>
      <path d="M-23,26 A23,23 0 0 1 23,26" fill="none" stroke="#2A2D31" stroke-width="2"/>
    </pattern>

    <!-- 서까래 연화 매듭 -->
    <pattern id="rafter" width="60" height="36" patternUnits="userSpaceOnUse" patternTransform="translate(0,66)">
      <rect width="60" height="36" fill="#2E6B5E"/>
      <circle cx="30" cy="18" r="15.5" fill="#1E4634"/>
      <circle cx="30" cy="18" r="14" fill="none" stroke="#EFE6D0" stroke-width="2.6" stroke-dasharray="3.6 3.4"/>
      <circle cx="30" cy="18" r="10.5" fill="#C23B22"/>
      <circle cx="30" cy="18" r="7" fill="#E8A93D"/>
      <circle cx="30" cy="18" r="4" fill="#2C4E8A"/>
      <circle cx="30" cy="18" r="1.6" fill="#EFE6D0"/>
      <circle cx="0" cy="18" r="3.2" fill="#D9738C"/>
      <circle cx="60" cy="18" r="3.2" fill="#D9738C"/>
    </pattern>

    <!-- 머리초: 겹겹 색동 반원 (사진2 스타일) -->
    <pattern id="meoricho" width="150" height="74" patternUnits="userSpaceOnUse" patternTransform="translate(0,107.5)">
      <rect width="150" height="74" fill="#2E6B5E"/>
      <!-- 상단에서 내려오는 색동 아치 -->
      <circle cx="75" cy="0" r="64" fill="#1E4634"/>
      <circle cx="75" cy="0" r="61" fill="none" stroke="#EFE6D0" stroke-width="2.4" stroke-dasharray="4.6 4"/>
      <circle cx="75" cy="0" r="57" fill="#3FA57A"/>
      <circle cx="75" cy="0" r="51" fill="#EFE6D0"/>
      <circle cx="75" cy="0" r="46" fill="#E8A93D"/>
      <circle cx="75" cy="0" r="40" fill="#C23B22"/>
      <circle cx="75" cy="0" r="34" fill="none" stroke="#EFE6D0" stroke-width="2" stroke-dasharray="3.4 3"/>
      <circle cx="75" cy="0" r="31" fill="#2C4E8A"/>
      <circle cx="75" cy="0" r="24" fill="#D9738C"/>
      <circle cx="75" cy="0" r="17" fill="#EFE6D0"/>
      <circle cx="75" cy="0" r="11" fill="#C23B22"/>
      <circle cx="75" cy="0" r="5" fill="#E8A93D"/>
      <!-- 아치 사이 하단 연꽃 봉오리 (타일 경계에서 합쳐짐) -->
      <circle cx="0" cy="74" r="26" fill="#1E4634"/>
      <circle cx="0" cy="74" r="22" fill="#3FA57A"/>
      <circle cx="0" cy="74" r="17" fill="#D9738C"/>
      <circle cx="0" cy="74" r="12" fill="#E8A93D"/>
      <circle cx="0" cy="74" r="7" fill="#C23B22"/>
      <circle cx="150" cy="74" r="26" fill="#1E4634"/>
      <circle cx="150" cy="74" r="22" fill="#3FA57A"/>
      <circle cx="150" cy="74" r="17" fill="#D9738C"/>
      <circle cx="150" cy="74" r="12" fill="#E8A93D"/>
      <circle cx="150" cy="74" r="7" fill="#C23B22"/>
      <!-- 점 장식 -->
      <circle cx="37" cy="58" r="2.4" fill="#EFE6D0"/>
      <circle cx="113" cy="58" r="2.4" fill="#EFE6D0"/>
    </pattern>

    <!-- 꽃살 격자 (사진3 스타일) -->
    <pattern id="lattice" width="84" height="48" patternUnits="userSpaceOnUse" patternTransform="translate(0,184)">
      <rect width="84" height="48" fill="#14301F"/>
      <g stroke="#3FA57A" stroke-width="6.5">
        <line x1="0" y1="0" x2="84" y2="48"/>
        <line x1="0" y1="48" x2="84" y2="0"/>
        <line x1="-42" y1="48" x2="42" y2="0"/>
        <line x1="42" y1="48" x2="126" y2="0"/>
        <line x1="-42" y1="0" x2="42" y2="48"/>
        <line x1="42" y1="0" x2="126" y2="48"/>
        <line x1="0" y1="24" x2="84" y2="24"/>
      </g>
      <g stroke="#2B7D55" stroke-width="2">
        <line x1="0" y1="0" x2="84" y2="48"/>
        <line x1="0" y1="48" x2="84" y2="0"/>
        <line x1="-42" y1="48" x2="42" y2="0"/>
        <line x1="42" y1="48" x2="126" y2="0"/>
        <line x1="-42" y1="0" x2="42" y2="48"/>
        <line x1="42" y1="0" x2="126" y2="48"/>
        <line x1="0" y1="24" x2="84" y2="24"/>
      </g>
      <!-- 교차점 꽃 -->
      <g>
        <circle cx="42" cy="24" r="6" fill="none" stroke="#E08FA6" stroke-width="6" stroke-dasharray="4.6 3.2"/>
        <circle cx="42" cy="24" r="3" fill="#C23B22"/>
        <circle cx="42" cy="24" r="1.4" fill="#E8C63D"/>
      </g>
      <g>
        <circle cx="0" cy="0" r="6" fill="none" stroke="#E08FA6" stroke-width="6" stroke-dasharray="4.6 3.2"/>
        <circle cx="0" cy="0" r="3" fill="#C23B22"/>
        <circle cx="84" cy="0" r="6" fill="none" stroke="#E08FA6" stroke-width="6" stroke-dasharray="4.6 3.2"/>
        <circle cx="84" cy="0" r="3" fill="#C23B22"/>
        <circle cx="0" cy="48" r="6" fill="none" stroke="#E08FA6" stroke-width="6" stroke-dasharray="4.6 3.2"/>
        <circle cx="0" cy="48" r="3" fill="#C23B22"/>
        <circle cx="84" cy="48" r="6" fill="none" stroke="#E08FA6" stroke-width="6" stroke-dasharray="4.6 3.2"/>
        <circle cx="84" cy="48" r="3" fill="#C23B22"/>
      </g>
    </pattern>
  </defs>

  <!-- 기와 지붕 (곡선 상단 + 직선 하단) -->
  <path d="M0,30 C300,2 900,2 1200,30 L1200,58 L0,58 Z" fill="url(#giwa)"/>
  <!-- 처마 목재선 -->
  <rect x="0" y="58" width="1200" height="8" fill="#6E3A28"/>
  <!-- 서까래 매듭 줄 -->
  <rect x="0" y="66" width="1200" height="36" fill="url(#rafter)"/>
  <!-- 백·적 구분선 -->
  <rect x="0" y="102" width="1200" height="3" fill="#EFE6D0"/>
  <rect x="0" y="105" width="1200" height="2.5" fill="#C23B22"/>
  <!-- 머리초 색동 밴드 -->
  <rect x="0" y="107.5" width="1200" height="74" fill="url(#meoricho)"/>
  <!-- 구분선 -->
  <rect x="0" y="181.5" width="1200" height="2.5" fill="#EFE6D0"/>
  <!-- 꽃살 격자 밴드 -->
  <rect x="0" y="184" width="1200" height="30" fill="url(#lattice)"/>
  <!-- 하단 금선 마감 -->
  <rect x="0" y="214" width="1200" height="8" fill="#C9A85C"/>

function rng(seed){ return function(){ seed|=0; seed=(seed+0x6D2B79F5)|0; let t=Math.imul(seed^(seed>>>15),1|seed); t=(t+Math.imul(t^(t>>>7),61|t))^t; return ((t^(t>>>14))>>>0)/4294967296; }; }
function pick(r, arr){ return arr[Math.floor(r()*arr.length)]; }

$("lnkBack").textContent = LBL.back;
$("lnkBack").href = "input.html?type=" + type;
$("btnOther").textContent = LBL.other;
$("btnRetry").textContent = LBL.retry;
$("btnRetry").href = "input.html?type=" + type;
$("resNote").textContent = LBL.note;

/* 방문자 카운터 (Abacus 무료 API · 실패 시 임시 숫자) */
(async function(){
  const NS = "kfortune_story_v1";
  const now = new Date();
  const y = now.getFullYear(), mo = String(now.getMonth()+1).padStart(2,"0"), d = String(now.getDate()).padStart(2,"0");
  let n;
  try{
    const res = await fetch("https://abacus.jasoncameron.dev/hit/" + NS + "/t_" + type + "_d" + y + mo + d).then(x => x.json());
    n = res.value;
  }catch(e){
    n = 41 + now.getHours() * 5;
  }
  $("resVisitor").innerHTML = LBL.visitor1 + "<b>" + n.toLocaleString() + "</b>" + LBL.visitor2 + (TYPES[LANG][type]||"") + LBL.visitor3;
})();

function nameOf(p){ return (p && p.name) ? p.name : ""; }
if(P && P.name && type !== "dream") $("resWho").textContent = P.name + LBL.who;

function sec(title, html){ return '<div class="sec"><h3>' + title + '</h3>' + html + '</div>'; }
function para(t){ return '<p>' + t + '</p>'; }
function tx(o){ return K ? o.kr : o.en; }

let out = "";

if(type === "dream"){
  const dreamText = localStorage.getItem("kf_dream") || "";
  const low = dreamText.toLowerCase();
  const hits = DREAMS.filter(d => d.kws.some(k => low.includes(k.toLowerCase())));
  out += sec(LBL.myDream, para(dreamText ? dreamText.replace(/</g,"&lt;") : "—"));
  if(hits.length){
    let chips = hits.map(h => '<span class="dream-sym">' + h.kws[0] + '</span>').join("");
    out += sec(LBL.dSym, chips);
    hits.slice(0,6).forEach((h,i)=>{
      out += sec(LBL.dIntro + " " + (i+1), para(tx(h)));
    });
  }else{
    out += sec(LBL.dIntro, para(LBL.dNone));
  }
}
else if(type === "gunghap" && P && P2){
  const y1 = +P.bdate.slice(0,4), y2 = +P2.bdate.slice(0,4);
  const b1 = (y1-4)%12, b2 = (y2-4)%12;
  const e1 = Math.floor(((y1-4)%10)/2), e2 = Math.floor(((y2-4)%10)/2);
  /* 관계 판정 */
  const yukhap = [[0,1],[2,11],[3,10],[4,9],[5,8],[6,7]].some(p=>(p[0]===b1&&p[1]===b2)||(p[0]===b2&&p[1]===b1));
  const samhap = [[0,4,8],[2,6,10],[1,5,9],[3,7,11]].some(g=>g.includes(b1)&&g.includes(b2)&&b1!==b2);
  const chung = Math.abs(b1-b2)===6;
  const saeng = (e1+1)%5===e2 || (e2+1)%5===e1;   /* 상생 */
  const geuk  = (e1+2)%5===e2 || (e2+2)%5===e1;   /* 상극 */
  let score = 68;
  if(yukhap) score += 20; else if(samhap) score += 16; else if(chung) score -= 22;
  if(saeng) score += 9; else if(geuk) score -= 7;
  const r = rng(hashStr(P.bdate + P2.bdate));
  score += Math.floor(r()*7) - 3;
  score = Math.max(38, Math.min(99, score));

  out += '<table class="hanja-table"><tr><th></th><th>' + LBL.zodiac + '</th><th>' + LBL.elem + '</th></tr>'
    + '<tr><td>' + (nameOf(P)||LBL.me) + '</td><td class="big" style="font-size:1.05rem">' + ZODIAC[LANG][b1] + ' (' + BRANCH_H[b1] + ')</td><td>' + ELEM[LANG][e1] + '</td></tr>'
    + '<tr><td>' + (nameOf(P2)||LBL.partner) + '</td><td class="big" style="font-size:1.05rem">' + ZODIAC[LANG][b2] + ' (' + BRANCH_H[b2] + ')</td><td>' + ELEM[LANG][e2] + '</td></tr></table>';
  out += '<div class="score-ring"><span class="num">' + score + '</span><span class="of"> / 100 · ' + LBL.gScore + '</span></div>';

  let total;
  if(yukhap) total = K?"두 사람은 육합(六合)의 인연으로, 서로의 부족함을 채워 주는 하늘이 맺은 짝입니다. 함께할수록 운이 커지는 상승 궁합입니다.":"You share a Yukhap bond — a heaven-tied pair completing each other's lack. Fortune grows the longer you stand together.";
  else if(samhap) total = K?"두 사람은 삼합(三合)의 인연으로, 같은 방향을 바라보는 동지 같은 궁합입니다. 목표를 함께 세우면 큰일을 이룹니다.":"You share a Samhap bond — comrades gazing the same direction. Set goals together and great things follow.";
  else if(chung) total = K?"두 사람은 충(沖)의 관계로 기질이 정반대라 부딪히기 쉬우나, 서로를 존중하면 오히려 서로에게 없는 것을 배우는 자석 같은 인연이 됩니다.":"Yours is a Chung (clash) pairing — opposite temperaments that spark, yet with respect you become magnets teaching each other what each lacks.";
  else total = K?"두 사람은 무난하고 자연스러운 궁합입니다. 큰 파란 없이 서로에게 스며드는 인연이니, 표현을 아끼지 않는 것이 관계를 깊게 합니다.":"A natural, easy pairing — a bond that seeps in without storms. Generous expression is what deepens it.";
  out += sec(LBL.gTotal, para(total));

  let chem;
  if(saeng) chem = K?"오행이 서로를 살리는 상생(相生) 관계입니다. 한 사람의 기운이 다른 사람을 키워 주니, 곁에 있는 것만으로 서로에게 힘이 됩니다.":"Your elements nourish each other (Sangsaeng) — one's energy grows the other. Simply being near is mutual strength.";
  else if(geuk) chem = K?"오행이 부딪히는 상극(相剋) 기운이 있어 의견 차이가 생길 수 있으나, 다름을 인정하면 서로를 단련시키는 좋은 숫돌이 됩니다.":"Your elements press against each other (Sanggeuk) — differences arise, yet acknowledged, they become whetstones sharpening you both.";
  else chem = K?"오행이 나란히 흐르는 편안한 관계입니다. 비슷한 속도로 걷는 두 사람이니 큰 갈등 없이 오래갑니다.":"Your elements flow side by side — two people walking at a similar pace, lasting long without great conflict.";
  out += sec(LBL.gChem, para(chem));
  out += sec(LBL.gAdvice, para(pick(r, POOL.advice) ? tx(pick(rng(hashStr("adv"+P.bdate+P2.bdate)), POOL.advice)) : ""));
}
else if(type === "saju" && P){
  const y = +P.bdate.slice(0,4);
  const si = (y-4)%10, bi = (y-4)%12, ei = Math.floor(si/2);
  out += '<table class="hanja-table"><tr><th>' + LBL.stem + '</th><th>' + LBL.branch + '</th><th>' + LBL.zodiac + '</th><th>' + LBL.elem + '</th></tr>'
    + '<tr><td class="big">' + STEM_H[si] + '</td><td class="big">' + BRANCH_H[bi] + '</td><td>' + ZODIAC[LANG][bi] + '</td><td>' + ELEM[LANG][ei] + '</td></tr></table>';
  const r = rng(hashStr(P.bdate + (P.btime||"") + "saju"));
  const lvl = Math.floor(r()*5);
  out += '<div class="sum-card"><span class="lv">' + LBL.yearP + ' · ' + ELEM[LANG][ei] + '</span><p class="line">' + (K?ELEM_CHAR.kr[ei]:ELEM_CHAR.en[ei]) + '</p></div>';
  out += sec(LBL.nature, para(K?ELEM_CHAR.kr[ei]:ELEM_CHAR.en[ei]));
  out += sec(LBL.aptitude, para(K?ELEM_JOB.kr[ei]:ELEM_JOB.en[ei]));
  out += sec(LBL.money, para(tx(pick(r, POOL.money[lvl]))));
  out += sec(LBL.health, para(tx(pick(r, POOL.health[lvl]))));
  out += sec(LBL.advice, para(tx(pick(r, POOL.advice))));
  out += '<p class="note" style="margin-top:.6rem">' + LBL.sajuNote + '</p>';
}
else if(P){
  /* tojeong / newyear / today */
  const salt = type === "today" ? new Date().toISOString().slice(0,10) : String(new Date().getFullYear());
  const r = rng(hashStr(P.bdate + "|" + (P.gender||"") + "|" + type + "|" + salt));
  const lvl = Math.floor(r()*5);
  const hj = pick(r, HANJA[lvl]);
  out += '<div class="sum-card"><span class="lv">' + LV[LANG][lvl] + '</span><p class="line">' + tx(hj) + '</p></div>';
  out += '<table class="hanja-table"><tr><th>' + LBL.hanja + '</th><th>' + LBL.reading + '</th><th>' + LBL.meaning + '</th></tr>'
    + '<tr><td class="big">' + hj.h + '</td><td>' + hj.r + '</td><td style="text-align:left">' + tx(hj) + '</td></tr></table>';
  out += sec(LBL.total, para(tx(pick(r, POOL.total[lvl]))));
  out += sec(LBL.love,  para(tx(pick(r, POOL.love[lvl]))));
  out += sec(LBL.work,  para(tx(pick(r, POOL.work[lvl]))));
  out += sec(LBL.money, para(tx(pick(r, POOL.money[lvl]))));
  out += sec(LBL.health,para(tx(pick(r, POOL.health[lvl]))));
  if(type !== "today"){
    let rows = "", used = [];
    for(let m=1; m<=12; m++){
      let idx;
      do{ idx = Math.floor(r()*POOL.months.length); }while(used.includes(idx) && used.length < POOL.months.length);
      used.push(idx);
      rows += '<tr><td class="m">' + (K ? m + "월" : ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][m-1]) + '</td><td>' + tx(POOL.months[idx]) + '</td></tr>';
    }
    out += sec(LBL.monthly, '<table class="month-table">' + rows + '</table>');
  }else{
    out += sec(LBL.advice, para(tx(pick(r, POOL.advice))));
  }
}
else{
  out = '<div class="sec"><p>' + (K ? "입력 정보가 없습니다. 처음 화면에서 다시 시작해 주세요." : "No input found. Please start again from the home screen.") + '</p></div>';
}

$("resBody").innerHTML = out;
</script>
</body>
</html>
