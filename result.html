/* 일진 계산 (JDN 기준, 2000-01-01 무오 / 1901-01-01 기묘로 검증) */
function jdnOf(y,m,d){ const a=Math.floor((14-m)/12), yy=y+4800-a, mm=m+12*a-3;
  return d + Math.floor((153*mm+2)/5) + 365*yy + Math.floor(yy/4) - Math.floor(yy/100) + Math.floor(yy/400) - 32045; }
function iljin(dt){
  const i = ((jdnOf(dt.getFullYear(), dt.getMonth()+1, dt.getDate()) + 49) % 60 + 60) % 60;
  return { i:i, si:i%10, bi:i%12, elem:Math.floor((i%10)/2) };
}
function fmtDate(dt){
  const m = dt.getMonth()+1, d = dt.getDate();
  return K ? (m + "월 " + d + "일") : (["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][m-1] + " " + d);
}
const DB = {"NATURE": [{"kr": "당신은 곧게 자라는 나무의 기운을 타고났습니다. 무엇이든 시작하면 뿌리부터 내리려 하고, 단번에 결과를 보기보다 차근차근 키워 올리는 방식을 택합니다. 남의 부탁을 쉽게 거절하지 못하는 인정 많은 성품이라 주변에 사람이 모이지만, 그만큼 속으로 삭이는 일도 많습니다. 새로운 것을 배우고 만들어내는 데서 살아 있음을 느끼며, 명분 없는 일에는 좀처럼 마음이 움직이지 않습니다.", "en": "You were born with the energy of a growing tree. Whatever you begin, you want to root it deeply — you would rather raise something steadily than seize a quick result. Your warm-heartedness makes it hard to refuse a request, so people gather around you, though you swallow much in silence. You feel most alive when learning and creating, and your heart rarely moves for anything without a cause you believe in."}, {"kr": "당신은 타오르는 불의 기운을 타고났습니다. 감정이 얼굴에 드러나고 표현이 솔직해서 함께 있으면 자리가 환해지는 사람입니다. 좋고 싫음이 분명하고 결정이 빠른데, 그 속도가 기회를 잡게도 하고 가끔은 후회를 남기기도 합니다. 사람을 끌어당기는 힘이 강해 어디서든 중심에 서게 되며, 인정받을 때 가장 크게 타오르는 성품입니다.", "en": "You were born with the energy of blazing fire. Your feelings show on your face and your words are honest — a room brightens when you enter it. Your likes and dislikes are clear and your decisions swift; that speed catches opportunities, though it sometimes leaves regret. You draw people in naturally and end up at the center of any circle, burning brightest when your worth is recognized."}, {"kr": "당신은 만물을 품는 흙의 기운을 타고났습니다. 말보다 행동으로 증명하는 사람이라 한번 맡은 일은 끝을 보고, 그래서 주변의 신뢰가 두텁습니다. 겉으로는 무던해 보여도 속으로는 옳고 그름을 정확히 재고 있으며, 한번 마음을 닫으면 좀처럼 다시 열지 않습니다. 급하게 오르는 운보다 오래 지켜내는 운을 타고나 시간이 지날수록 자리가 단단해집니다.", "en": "You were born with the energy of embracing earth. You prove yourself by doing rather than speaking — once you take something on, you see it through, and trust follows you. You may look easygoing, yet inside you weigh right and wrong precisely, and once you close your heart it rarely reopens. Yours is not the luck of a quick rise but of long endurance; your ground grows firmer with every passing year."}, {"kr": "당신은 단단하게 벼려진 쇠의 기운을 타고났습니다. 원칙이 분명하고 판단이 냉정해서 어수선한 상황에서도 핵심을 정확히 짚어냅니다. 한번 한 약속은 손해를 보더라도 지키는 사람이라 신뢰가 곧 당신의 재산입니다. 다만 자신에게 엄격한 만큼 남에게도 기준이 높아, 그 단호함이 때로 차갑게 비칠 수 있습니다. 결정적인 순간에 흔들리지 않는 것이 당신의 가장 큰 무기입니다.", "en": "You were born with the energy of tempered metal. Your principles are clear and your judgment cool, so you find the core of a matter even amid chaos. You keep a promise even at a loss — trust is your true fortune. Yet you hold others to the same high standard you hold yourself, and that firmness can read as coldness. Not wavering at the decisive moment is your greatest weapon."}, {"kr": "당신은 흐르는 물의 기운을 타고났습니다. 상황을 읽는 눈이 빠르고 사람의 속내를 잘 알아채서, 굳이 부딪히지 않고 돌아가는 지혜가 있습니다. 겉으로는 유연해 보이지만 목표를 향해서는 결국 스며들어 도달하는 끈질김이 있습니다. 혼자 생각하는 시간이 반드시 필요한 사람이며, 그 시간에서 남들이 못 보는 답을 길어 올립니다. 감정의 깊이가 남달라 한번 맺은 인연은 오래 갑니다.", "en": "You were born with the energy of flowing water. You read situations quickly and sense what people leave unsaid, so you have the wisdom to go around rather than collide. You appear yielding, yet toward your goal you possess the persistence of water that seeps through and arrives. You need solitude to think, and from that quiet you draw answers others cannot see. Your emotional depth is unusual — a bond once made lasts long."}], "ZT": [{"kr": "쥐띠의 기질이 더해져 눈치가 빠르고 위기 감각이 뛰어납니다. 없는 살림에서도 방법을 찾아내는 생활력이 있어, 어려운 시기일수록 오히려 진가가 드러나는 사람입니다.", "en": "The Rat's temperament adds quick instincts and a sharp sense for danger. You find a way even from little, so your true worth shows most in hard seasons."}, {"kr": "소띠의 기질이 더해져 우직하고 끈기가 있습니다. 남들이 지쳐 포기할 때 묵묵히 한 걸음 더 가는 사람이라, 결국 끝에 웃는 쪽은 당신입니다.", "en": "The Ox's temperament adds steadfast endurance. You take one more step when others quit, so it is you who smiles at the finish."}, {"kr": "호랑이띠의 기질이 더해져 기개가 있고 불의를 참지 못합니다. 앞장서는 자리가 어울리며, 결단이 필요한 순간에 사람들이 당신을 봅니다.", "en": "The Tiger's temperament adds courage and intolerance of injustice. Leading suits you, and when decisions must be made, people look to you."}, {"kr": "토끼띠의 기질이 더해져 섬세하고 온화합니다. 분위기를 부드럽게 만드는 재주가 있어 어디서든 환영받지만, 정작 자신의 상처는 혼자 감당하는 편입니다.", "en": "The Rabbit's temperament adds delicacy and gentleness. You soften any room and are welcomed everywhere, though you tend to bear your own wounds alone."}, {"kr": "용띠의 기질이 더해져 스케일이 크고 자존심이 강합니다. 작은 자리에 머물기 어려운 사람이라, 꿈을 크게 잡을수록 오히려 운이 따라붙습니다.", "en": "The Dragon's temperament adds grand scale and strong pride. You cannot stay small for long — the larger your dream, the more fortune follows."}, {"kr": "뱀띠의 기질이 더해져 통찰이 깊고 신중합니다. 말수는 적어도 한번 내놓는 판단은 정확해서, 시간이 지나면 사람들이 당신 말이 옳았음을 압니다.", "en": "The Snake's temperament adds deep insight and caution. You speak little, but your judgment lands true — in time, people realize you were right."}, {"kr": "말띠의 기질이 더해져 활동적이고 자유롭습니다. 갇힌 환경을 견디기 어려워하며, 움직일수록 기회가 생기는 사람입니다.", "en": "The Horse's temperament adds energy and freedom. Confinement wears on you — opportunity appears the more you move."}, {"kr": "양띠의 기질이 더해져 정이 많고 배려가 깊습니다. 남을 먼저 챙기다 자신이 뒷전이 되기 쉬우니, 스스로를 아끼는 연습이 곧 개운법입니다.", "en": "The Sheep's temperament adds warmth and deep consideration. You put others first until you fall behind — learning to cherish yourself is itself your luck ritual."}, {"kr": "원숭이띠의 기질이 더해져 재주가 많고 상황 적응이 빠릅니다. 어떤 판에 놓여도 살아남는 영리함이 있지만, 한 우물을 팔 때 가장 크게 됩니다.", "en": "The Monkey's temperament adds many talents and swift adaptation. You survive any board you are placed on, yet you rise highest when you dig one well deep."}, {"kr": "닭띠의 기질이 더해져 부지런하고 꼼꼼합니다. 남들이 놓치는 디테일을 잡아내는 눈이 있어, 그 정확함이 당신의 신용이 됩니다.", "en": "The Rooster's temperament adds diligence and precision. You catch details others miss, and that accuracy becomes your credit."}, {"kr": "개띠의 기질이 더해져 의리가 있고 정직합니다. 한번 내 사람이라 여기면 끝까지 지키는 성품이라, 사람이 곧 당신의 가장 큰 재산입니다.", "en": "The Dog's temperament adds loyalty and honesty. Once you claim someone as yours, you guard them to the end — people are your greatest asset."}, {"kr": "돼지띠의 기질이 더해져 순박하고 복이 많습니다. 욕심을 부리지 않아도 들어올 것은 들어오는 사람이라, 조급함만 버리면 재물이 따릅니다.", "en": "The Pig's temperament adds simplicity and inherent blessing. What is meant for you arrives without grasping — let go of haste and wealth follows."}], "FLOW": [{"kr": "올해 당신의 운은 구름이 걷히고 해가 드러나는 형국입니다. 지난 몇 해 동안 준비하고 참아온 것들이 드디어 형태를 갖추어 세상에 드러나며, 특히 상반기에 문서·계약·발탁과 관련한 좋은 소식이 찾아옵니다. 뜻밖의 자리에서 귀인을 만나 길이 열리는 흐름이니, 초대와 모임을 마다하지 마십시오. 재물과 명예가 함께 따르는 드문 해이므로 큰 결정을 미루지 말고 과감히 움직이는 것이 좋습니다. 다만 그릇이 커지는 만큼 책임도 커지니, 공을 나누고 약속을 지키면 이 운이 내년까지 이어집니다.", "en": "This year your fortune is that of clouds parting to reveal the sun. What you prepared and endured through recent years finally takes shape in the open, and the first half brings good news around documents, contracts, and being chosen. A benefactor appears in an unexpected place, so do not decline invitations and gatherings. Wealth and honor arrive together in this rare year — do not postpone major decisions. Yet as your vessel grows, so does your duty: share the credit and keep your promises, and this fortune carries into next year."}, {"kr": "올해는 순풍에 돛을 단 듯 일이 순조롭게 풀리는 해입니다. 억지로 힘을 쓰지 않아도 흐름이 당신을 밀어주며, 특히 협력과 팀워크에서 좋은 결실이 나옵니다. 그동안의 노력이 하나둘 인정받기 시작하고, 도와주려는 사람이 눈에 띄게 늘어납니다. 큰 횡재보다는 꾸준히 쌓이는 성취의 해이니, 작은 승리를 차곡차곡 모으면 연말에 제법 큰 그림이 완성됩니다. 갑작스러운 투자나 지출 제안에는 하루 이상 생각할 시간을 두면 손해 볼 일이 없습니다.", "en": "This year your sails catch a favorable wind. You need not force anything — the current pushes you, and cooperation especially bears fruit. Past efforts begin to earn recognition one by one, and helpers noticeably multiply. This is a year of accumulation rather than windfall: stack small wins and a sizable picture completes itself by year's end. Give yourself at least a day before agreeing to sudden investments or expenses, and you will lose nothing."}, {"kr": "올해는 먼저는 더디고 뒤에는 빠른, 선곤후태(先困後泰)의 해입니다. 상반기에는 기대만큼 속도가 나지 않아 답답함을 느낄 수 있으나, 이 시기는 실패가 아니라 기초를 다지는 과정입니다. 하반기부터 흐름이 바뀌기 시작하며, 그때 승부수를 던지면 상반기의 더딤이 오히려 밑거름이 됩니다. 오르막과 내리막이 번갈아 오지만 전체 방향은 분명히 위를 향하고 있으니, 중간의 굴곡에 마음을 뺏기지 마십시오. 잘 풀릴 때 저축하고 어려울 때 배우면, 어느 쪽 계절도 손해가 아닙니다.", "en": "This year follows the pattern of hardship first, ease after. The first half may move slower than you hope and frustration may creep in, yet this season is not failure — it is foundation-laying. From the second half the current shifts; make your move then and the earlier slowness becomes fertile soil. Ups and downs alternate, but the overall direction clearly climbs — do not let mid-course dips claim your heart. Save when things go well and learn when they do not, and neither season is a loss."}, {"kr": "올해는 크게 얻는 것도 잃는 것도 없는, 잔잔한 물결 같은 해입니다. 이런 해를 심심하다 여기고 억지로 판을 흔들면 오히려 없던 손실이 생기니, 현상을 지키는 것이 곧 성공임을 기억하십시오. 새 일을 벌이기보다 지금 가진 것을 정돈하고 다듬는 데 시간을 쓰면, 그 정리 속에서 뜻밖의 기회가 눈에 들어옵니다. 건강과 가족, 그리고 배움에 투자하기에 이보다 좋은 해가 없으며, 지금 심어둔 씨앗이 다음 운의 계절에 거두어집니다. 조용한 해라고 해서 아무 일도 일어나지 않는 것이 아니라, 뿌리가 자라는 소리는 원래 들리지 않는 법입니다.", "en": "This year is a calm ripple — neither great gain nor great loss. Do not call it dull and shake the board on purpose, or you invent losses that were never there: maintaining is itself winning. Spend the time organizing and refining what you already hold, and within that tidying an unexpected opportunity comes into view. No year is better for investing in health, family, and learning; the seed planted now is harvested in your next season of fortune. A quiet year is not an empty one — roots simply grow without a sound."}, {"kr": "올해는 돌다리도 두드려 건너야 하는, 신중함이 곧 개운법인 해입니다. 문서·계약·보증·동업에 특히 조심해야 하며, 달콤하게 들리는 제안일수록 반드시 두 번 세 번 확인하십시오. 구설과 시비가 붙기 쉬운 흐름이니 말을 줄이고 듣기를 늘리면, 다가올 화의 절반은 저절로 비켜갑니다. 그러나 이 해가 나쁘기만 한 것은 아닙니다 — 조심하는 사람에게는 아무 일도 일어나지 않고 지나가며, 오히려 이 시기에 걸러낸 사람과 일이 훗날 당신을 지켜줍니다. 무리한 확장을 멈추고 내실을 다지면, 내년의 운이 훨씬 가볍게 열립니다.", "en": "This year asks you to tap even the stone bridge before crossing — caution itself is your luck ritual. Be especially careful with documents, contracts, guarantees, and partnerships, and check the sweetest offers twice, then a third time. Gossip and disputes spark easily, so speak less and listen more; half the trouble heading your way will simply pass by. Yet this is not a year of only misfortune — to the careful, nothing happens at all, and the people and deals you filter out now are what protect you later. Halt overreach and build inner strength, and next year's fortune opens far more lightly."}], "FADV": [{"kr": "이 좋은 흐름을 오래 붙잡는 방법은 단 하나, 겸손입니다. 달도 차면 기우는 법이니 가장 높이 올랐을 때 가장 낮게 고개를 숙이면, 이 운은 한 해로 끝나지 않고 다음 대운까지 이어집니다.", "en": "There is one way to hold this good current long: humility. The full moon must wane, so bow lowest at your highest point, and this fortune will not end with the year but carry into your next great cycle."}, {"kr": "지금의 순조로움에 익숙해져 방심하지만 않으면 됩니다. 오늘 잘 되는 이유를 스스로 알고 있어야 내일도 잘 되니, 잘 풀린 일일수록 왜 잘 풀렸는지 한 번 되짚어 보십시오.", "en": "Simply do not let this smoothness lull you. To succeed tomorrow you must know why you succeed today — the better something goes, the more worth retracing why."}, {"kr": "조급함 하나만 다스리면 결과는 기대 이상입니다. 지금 더디게 느껴지는 것은 길이 막혀서가 아니라 당신이 가려는 곳이 그만큼 멀기 때문이니, 방향이 맞다면 속도는 걱정하지 않아도 됩니다.", "en": "Master impatience alone and the result exceeds expectation. What feels slow now is not a blocked road but a distant destination — if the direction is right, do not worry about the speed."}, {"kr": "고요함을 견디는 힘이 이 해의 과제입니다. 남과 비교하며 조바심 내는 마음만 내려놓으면, 올해 쌓은 것이 몇 해 뒤 당신을 다른 자리에 데려다 놓습니다.", "en": "Enduring the stillness is this year's task. Set down the urge to compare, and what you build this year will place you somewhere else entirely a few years on."}, {"kr": "조심한다는 것은 두려워한다는 뜻이 아닙니다. 한 박자 늦게 결정하고 한 마디 덜 말하는 것만으로 이 해는 무사히 지나가며, 그렇게 지킨 것들이 다음 해의 밑천이 됩니다.", "en": "To be careful is not to be afraid. Decide one beat later, speak one line less, and this year passes without incident — and what you preserved becomes next year's capital."}], "LUCK": [{"dir": {"kr": "동쪽", "en": "East"}, "col": {"kr": "청색(파랑) · 초록", "en": "Blue · Green"}, "num": {"kr": "3, 8", "en": "3, 8"}, "item": {"kr": "원목 소품, 나무 팔찌, 만년필", "en": "Wooden objects, a wood-bead bracelet, a fountain pen"}, "inte": {"kr": "동쪽 창가에 화분이나 작은 나무를 두고, 책상은 원목 재질로. 아침 햇빛이 드는 방향에 앉으면 집중력이 올라갑니다.", "en": "Place a plant or small tree by an east window and choose a wooden desk. Sitting where morning light enters sharpens your focus."}, "avoid": {"kr": "서쪽 방향의 과감한 확장, 금속성 소음이 많은 환경", "en": "Bold expansion toward the west; environments full of metallic noise"}}, {"dir": {"kr": "남쪽", "en": "South"}, "col": {"kr": "빨강 · 자주", "en": "Red · Magenta"}, "num": {"kr": "2, 7", "en": "2, 7"}, "item": {"kr": "붉은 계열 지갑, 향초, 가죽 다이어리", "en": "A red wallet, scented candles, a leather diary"}, "inte": {"kr": "남쪽 벽에 따뜻한 조명이나 그림을 걸고, 어두운 구석에는 스탠드를 하나 두십시오. 밝은 빛이 곧 당신의 기운입니다.", "en": "Hang warm lighting or art on a south wall and add a lamp to every dark corner. Bright light is your energy itself."}, "avoid": {"kr": "북쪽의 습하고 어두운 공간에서 오래 머무는 것", "en": "Lingering long in damp, dark spaces to the north"}}, {"dir": {"kr": "남서쪽 · 중앙", "en": "Southwest · Center"}, "col": {"kr": "황토색 · 베이지 · 노랑", "en": "Ochre · Beige · Yellow"}, "num": {"kr": "5, 10", "en": "5, 10"}, "item": {"kr": "도자기 컵, 흙 화분, 가죽 지갑", "en": "A ceramic cup, an earthen pot, a leather wallet"}, "inte": {"kr": "집 한가운데를 비워 어수선하지 않게 하고, 흙·도자 재질의 소품을 두십시오. 중심이 정돈되면 재물이 머뭅니다.", "en": "Keep the center of your home clear and uncluttered, and place earthen or ceramic pieces there. When the center is ordered, wealth stays."}, "avoid": {"kr": "동쪽으로의 잦은 이동, 정리되지 않은 물건 쌓아두기", "en": "Frequent moves eastward; letting unsorted things pile up"}}, {"dir": {"kr": "서쪽", "en": "West"}, "col": {"kr": "흰색 · 금색", "en": "White · Gold"}, "num": {"kr": "4, 9", "en": "4, 9"}, "item": {"kr": "금속 시계, 은반지, 잘 드는 만년필", "en": "A metal watch, a silver ring, a well-cut pen"}, "inte": {"kr": "서쪽 공간을 밝고 깔끔하게 비우고, 금속 재질의 소품 하나를 두십시오. 군더더기 없는 공간이 당신의 판단을 날카롭게 합니다.", "en": "Keep the western space bright and bare, with one metal object placed there. An uncluttered room sharpens your judgment."}, "avoid": {"kr": "남쪽의 과열된 경쟁, 감정적인 언쟁", "en": "Overheated competition to the south; emotional arguments"}}, {"dir": {"kr": "북쪽", "en": "North"}, "col": {"kr": "검정 · 남색", "en": "Black · Navy"}, "num": {"kr": "1, 6", "en": "1, 6"}, "item": {"kr": "유리병, 수정 · 흑요석, 만년필", "en": "A glass bottle, crystal or obsidian, a fountain pen"}, "inte": {"kr": "북쪽에 작은 어항이나 유리 소품을 두고, 창가에 거울을 하나 걸어 두십시오. 물과 빛이 흐르면 생각도 함께 흐릅니다.", "en": "Set a small aquarium or glass piece to the north and hang a mirror near a window. When water and light flow, so do your thoughts."}, "avoid": {"kr": "중앙의 답답한 공간, 흙먼지 많은 환경", "en": "Stuffy central spaces; dusty environments"}}], "LOVE": [{"kr": "애정운이 한 해 중 가장 크게 열립니다. 미혼이라면 소개나 모임, 혹은 이미 알고 지내던 사람 중에서 인연이 드러나며, 특히 상반기에 만난 사람과의 흐름이 깊습니다. 기혼이라면 부부의 정이 새로워지고, 그동안 미뤄둔 대화가 자연스럽게 풀리는 시기입니다. 이 흐름에서 중요한 것은 표현입니다 — 마음속에 담아만 두면 인연은 스쳐 지나가고, 한마디 먼저 건네면 복이 됩니다. 상대의 조건을 재기보다 함께 있을 때의 편안함을 기준으로 삼으면 후회 없는 선택을 하게 됩니다.", "en": "Your love fortune opens widest this year. If unattached, a bond reveals itself through an introduction, a gathering, or someone already in your circle — a connection made in the first half runs especially deep. If married, affection renews and long-postponed conversations untangle naturally. What matters in this current is expression: kept inside, the bond passes by; offered first, it becomes a blessing. Judge by how at ease you feel together rather than by their conditions, and you will choose without regret."}, {"kr": "애정운이 따뜻하게 흐르는 해입니다. 급격한 변화보다 서서히 데워지는 온기 같은 인연이 찾아오며, 사람을 통해 사람을 만나는 흐름이 좋습니다. 연인이나 부부 사이에는 신뢰가 한 겹 더 쌓이고, 사소한 기념일을 챙기는 정성이 예상 밖의 감동으로 돌아옵니다. 다만 상대에게 기대하는 만큼 표현하고 있는지 한번 돌아보십시오 — 당신이 당연하게 여기는 배려가 상대에게는 확인받고 싶은 마음일 수 있습니다. 서두르지 않으면 이 인연은 오래갑니다.", "en": "Warm currents run through your love life this year. The bond that arrives warms gradually rather than bursting in, and connections made through people you trust are especially good. Trust layers another fold between partners, and small remembrances return as unexpected emotion. Ask yourself whether you express as much as you expect — the care you take for granted may be what they long to hear confirmed. Do not rush, and this bond will last."}, {"kr": "서두르면 어긋나고 기다리면 맺어지는 애정운입니다. 상반기에는 마음만 앞서 오해가 생기기 쉬우니, 결론을 내리기 전에 상대의 속도를 한 번 확인하십시오. 하반기부터는 흐름이 부드러워지며, 그때 나눈 대화가 관계를 한 단계 깊은 곳으로 데려갑니다. 이미 인연이 있다면 권태로움을 위기로 오해하지 마십시오 — 익숙함은 관계가 식은 증거가 아니라 자리를 잡았다는 증거입니다. 혼자만의 시간과 함께하는 시간의 균형을 맞추면 올해 애정운은 무난히 지켜집니다.", "en": "Rushing breaks the thread; waiting ties the knot. In the first half your heart runs ahead and misunderstandings arise — check their pace before you reach conclusions. From the second half the current softens, and the conversations you have then carry the relationship a level deeper. If already bonded, do not mistake familiarity for crisis — it is not proof that love cooled but that it settled. Balance solitude with togetherness and your love fortune holds steady."}, {"kr": "큰 변화 없이 잔잔하게 흐르는 애정운입니다. 새로운 인연을 찾아 나서기보다 지금 곁에 있는 사람과의 관계를 다듬는 데 마음을 쓰는 것이 이 해에는 훨씬 이롭습니다. 미혼이라면 조급하게 찾아 나선 인연보다 자연스럽게 스며든 인연이 좋으니, 취미나 배움의 자리에 나가는 것이 좋습니다. 기혼이라면 익숙함을 지루함으로 착각하지 마십시오 — 함께 보낸 시간 자체가 이미 귀한 인연의 증거입니다. 큰 사건이 없는 것이 곧 평온이며, 이 평온이 다음 해의 기반이 됩니다.", "en": "Calm waters, little change. It serves you far better this year to refine the bond already beside you than to hunt for a new one. If unattached, a connection that seeps in naturally beats one you chase — show up at hobbies and classes. If married, do not mistake the familiar for the tedious: the time already shared is itself proof of a precious bond. The absence of drama is peace, and this peace becomes next year's foundation."}, {"kr": "오해가 생기기 쉬운 애정운이니 소통의 방식부터 바꾸십시오. 문자보다 목소리로, 목소리보다 얼굴을 보고 이야기하면 벌어질 갈등의 절반은 애초에 생기지 않습니다. 제3자를 통해 전해 듣는 말은 절반만 믿는 것이 좋으며, 특히 남의 연애에 끼어드는 일은 올해 반드시 피하십시오. 미혼이라면 급하게 맺는 인연에 주의하고, 기혼이라면 사소한 서운함을 쌓아두지 말고 그때그때 가볍게 풀어내십시오. 이 시기를 조심히 넘기면 관계는 오히려 더 단단해집니다.", "en": "Misunderstandings spark easily — change how you communicate first. Choose voice over text and face over voice, and half the coming conflict never forms. Believe only half of what reaches you through third parties, and above all stay out of other people's romances this year. If unattached, beware bonds formed in haste; if married, do not stockpile small hurts — air them lightly as they come. Pass this season carefully and the relationship emerges sturdier."}], "WORK": [{"kr": "직업운이 크게 트이는 해입니다. 승진·합격·이직·계약 성사 등 기다리던 소식이 실제로 도착하며, 특히 사람들 앞에 서는 자리에서 이름을 알릴 기회가 생깁니다. 새 프로젝트나 새 역할이 주어진다면 망설이지 말고 받으십시오 — 지금의 부담은 내년의 자산이 됩니다. 윗사람의 눈에 드는 흐름이니 성과는 반드시 기록으로 남기고, 공은 팀과 나누면 이 운이 훨씬 오래갑니다. 다만 갑자기 늘어난 제안 중에는 급을 낮추는 것도 섞여 있으니, 이름값보다 실속을 따져보십시오.", "en": "Career fortune opens wide. The news you awaited — promotion, acceptance, a new post, a signed deal — actually arrives, and chances to make your name before an audience appear. If a new project or role is offered, take it without hesitation: today's burden becomes next year's asset. You are in a superior's line of sight, so record every achievement in writing and share credit with your team to make this fortune last. Among the sudden offers, some lower your standing — weigh substance over prestige."}, {"kr": "노력한 만큼 정직하게 돌아오는 직업운입니다. 극적인 도약은 없어도 하는 일마다 결과가 남고, 그 결과가 쌓여 연말에 뚜렷한 평가로 나타납니다. 윗사람의 신임이 두터워지는 시기이니 맡은 일에 책임을 다하면 자연스럽게 자리가 올라갑니다. 협업에서 특히 좋은 성과가 나오니 혼자 끌어안기보다 함께할 사람을 찾으십시오. 다만 남의 몫까지 떠맡다 지치는 흐름도 있으니, 거절해야 할 일은 초반에 분명히 선을 그으면 후반이 편합니다.", "en": "Your work returns honestly what you invest. There may be no dramatic leap, yet every task leaves a result, and those results become a clear evaluation by year's end. Superiors' trust deepens — fulfill your duties and your position rises of itself. Collaboration bears the best fruit, so seek partners rather than carrying it alone. Watch for the pattern of taking on others' loads until you are drained: draw the line early on what you must decline, and the latter half runs easy."}, {"kr": "경쟁은 있으나 결국 실력으로 이기는 직업운입니다. 상반기에는 인정받지 못하는 듯한 답답함이 있고, 나보다 못하다 여겼던 사람이 앞서 나가는 것을 볼 수도 있습니다. 그러나 화려한 말은 오래가지 못하고, 하반기부터는 꾸준한 결과물이 당신을 대신 증명하기 시작합니다. 이직이나 전업을 고민 중이라면 상반기에는 준비만 하고 하반기에 실행하는 것이 훨씬 유리합니다. 지금 자리에서 배울 것을 다 배워두면, 다음 자리에서 당신의 몸값이 달라집니다.", "en": "Competition exists, yet skill prevails in the end. The first half brings the frustration of going unrecognized, and you may watch someone you rated lower move ahead. But eloquence does not endure; from the second half, steady output begins to speak for you. If weighing a job change, prepare in the first half and execute in the second — far more favorable. Learn everything your current seat can teach, and your value differs in the next one."}, {"kr": "직업운에 큰 변동이 없는 해입니다. 이직·창업·전업 같은 큰 결정은 시기상조이니, 마음이 들썩여도 올해는 자리를 지키는 편이 훨씬 이롭습니다. 대신 지금 하는 일의 빈틈을 메우고 부족한 기술을 채우는 데 시간을 쓰면, 그 준비가 다음 기회에 그대로 힘이 됩니다. 조직 안에서는 튀지 않으면서도 필요한 사람이 되는 것이 이 해의 전략입니다. 눈에 띄는 성과가 없어도 조용히 신뢰를 쌓아두면, 결정적인 순간에 당신의 이름이 불립니다.", "en": "Little shifts in your career this year. Big decisions — changing jobs, founding, switching fields — are premature; however restless you feel, holding your seat serves you better. Spend the time closing gaps in your current work and filling in missing skills; that preparation becomes force at the next opening. Your strategy this year is to be indispensable without standing out. Even without visible wins, quietly banked trust means your name is the one called at the decisive moment."}, {"kr": "직장 내 구설과 문서 실수를 각별히 조심해야 하는 해입니다. 중요한 결재·서명·보고서는 반드시 한 번 더 검토하고, 확인하지 않은 정보를 옮기는 일은 절대 하지 마십시오. 남의 뒷말이 오가는 자리에는 아예 앉지 않는 것이 상책이며, 당신이 하지 않은 말도 당신의 말로 전해질 수 있는 흐름입니다. 이직 제안이 와도 조건을 문서로 확인하기 전에는 마음을 정하지 마십시오. 이 해를 무사히 넘기는 것 자체가 성공이며, 조심한 사람에게는 아무 일도 일어나지 않습니다.", "en": "Guard hard against workplace gossip and paperwork errors. Review every important approval, signature, and report once more, and never pass along information you have not verified. Best not to sit where talk-behind-backs circulates — in this current, words you never said may be attributed to you. If a job offer comes, do not decide until the terms are in writing. Passing this year without incident is itself success; to the careful, nothing happens at all."}], "MONEY": [{"kr": "재물이 사방에서 들어오는 해입니다. 본업 외의 수입이 생기거나, 받지 못할 거라 여겼던 묵은 돈을 되찾을 수도 있습니다. 부동산·계약·투자와 관련해 좋은 소식이 있는 흐름이며, 특히 오래 들고 있던 것을 정리할 때 제값을 받습니다. 다만 들어오는 문이 넓어지면 나가는 문도 함께 넓어지니, 수입이 생길 때마다 일정 비율을 먼저 떼어 묶어두는 습관이 이 운을 지킵니다. 씀씀이가 커지는 것을 성공으로 착각하지만 않으면, 올해 모은 것이 앞으로 몇 년의 기반이 됩니다.", "en": "Wealth flows in from all directions. Income beyond your main work appears, or old money you had written off returns. Good news arrives around property, contracts, and investments — and what you have held a long time fetches its true price when you let it go. Yet as the inflow widens so does the outflow: set aside a fixed share the moment money arrives, and this fortune is preserved. Simply do not mistake rising spending for success, and what you gather this year becomes the base of several to come."}, {"kr": "금전운이 안정적으로 상승하는 해입니다. 벼락 같은 횡재는 없지만 들어오는 돈이 나가는 돈보다 꾸준히 많아지는 흐름이라, 저축과 장기 계획에 유리합니다. 급하게 굴리기보다 원금을 지키며 시간을 태우는 방식이 이 해에는 훨씬 유리합니다. 작은 부수입의 기회가 눈에 들어오는데, 본업에 지장이 없는 선이라면 시도해볼 만합니다. 다만 지인의 소개로 들어오는 투자 제안은 관계와 돈을 함께 잃을 수 있으니 반드시 문서로 확인하십시오.", "en": "Your money fortune rises steadily. No thunderclap windfall, but income consistently outpaces outgo — favorable for saving and long plans. Preserving principal and letting time work beats churning capital this year. Chances for small side income come into view; worth trying if they do not disturb your main work. But investment offers arriving through acquaintances can cost you both the money and the relationship — insist on documents."}, {"kr": "들어오는 돈과 나가는 돈이 비슷해 통장이 늘 제자리처럼 느껴지는 해입니다. 상반기에는 예상치 못한 지출이 겹쳐 답답할 수 있으나, 하반기부터 숨통이 트이기 시작합니다. 이 해에 가장 확실한 재테크는 새는 구멍을 찾는 것입니다 — 가계부를 한 달만 써도 어디서 돈이 빠져나가는지 눈에 보이고, 그것만으로 운이 달라집니다. 큰 수익을 좇다 원금을 다치는 일만 피하면 손해 없이 지나갑니다. 목돈이 필요한 일이 있다면 하반기로 미루는 것이 유리합니다.", "en": "Income and outgo run even, and your balance feels stuck in place. The first half may stack unexpected expenses and frustration, but the second half opens breathing room. The surest investment this year is finding the leaks — one month of keeping a ledger reveals where money escapes, and that alone shifts your luck. Simply avoid wounding your principal while chasing high returns, and you pass through without loss. If a large expense is coming, postpone it to the second half."}, {"kr": "재물운에 큰 파도가 없는 해입니다. 버는 것보다 지키는 것이 곧 버는 것이라는 말이 올해만큼 맞는 해가 없으니, 원금 보장이 없는 제안은 이번 시기에는 흘려보내십시오. 무리한 확장이나 대출을 끼는 결정은 미루고, 대신 고정 지출을 점검해 줄일 수 있는 것을 줄이면 그것이 그대로 수익입니다. 큰 돈이 들어오지 않는 대신 큰 돈이 나갈 일도 없으니, 이 평온함을 지루해하지 마십시오. 지금 지켜낸 종잣돈이 다음 기회의 열쇠가 됩니다.", "en": "No great waves in your wealth this year. Never is it truer that protecting is earning — let offers without guaranteed principal pass you by. Postpone aggressive expansion and leveraged decisions; instead audit fixed costs and cut what you can, which is profit itself. No large sum enters, but none leaves either — do not find this calm boring. The seed money you preserve now is the key to your next opportunity."}, {"kr": "금전 문제에 각별한 주의가 필요한 해입니다. 보증·대여·동업 세 가지는 올해 반드시 피하십시오 — 특히 가까운 사이일수록 돈이 오가면 관계까지 함께 잃습니다. 큰 수익을 약속하는 제안일수록 위험하며, 급하게 결정하라고 재촉하는 자리에서는 일단 일어나는 것이 상책입니다. 지출은 계획한 것만 하고, 충동구매는 밤보다 아침에 다시 생각해 보십시오. 이 해에 돈을 못 버는 것은 손해가 아니지만 돈을 잃는 것은 회복에 몇 해가 걸리니, 지키는 것을 목표로 삼으십시오.", "en": "Money demands special vigilance this year. Avoid three things absolutely: guarantees, lending, and partnerships — the closer the tie, the more money costs you the relationship too. The higher the promised return, the higher the danger, and when someone presses you to decide fast, the wise move is to stand up and leave. Spend only what you planned, and reconsider impulse purchases in the morning rather than at night. Failing to earn costs you nothing this year, but losing takes years to recover — make preservation your goal."}], "HEALTH": [{"kr": "기력이 가장 충만한 해입니다. 몸이 가벼우니 마음도 밝아지고, 새 운동이나 습관을 시작하기에 이보다 좋은 시기가 없습니다. 지금 만든 습관은 몇 해를 갈 만큼 자리를 잘 잡으니, 미뤄왔던 운동을 이 해에 시작하십시오. 다만 컨디션이 좋다고 무리한 일정을 몰아 넣으면 연말에 한꺼번에 탈이 날 수 있습니다. 잘 될 때 쉬어두는 것이 진짜 고수의 건강관리이며, 좋은 기운일수록 규칙적으로 써야 오래갑니다.", "en": "Your vitality runs fullest this year. A light body brightens the mind, and no season is better for starting new exercise or habits. What you build now sets deeply enough to last years — begin the training you kept postponing. Yet do not pack an overloaded schedule just because you feel strong, or it all catches up at year's end. Resting while things go well is the mark of real mastery; good energy lasts only when spent on a rhythm."}, {"kr": "건강운이 대체로 양호한 해입니다. 큰 병치레는 없으나 좋은 기운을 유지하는 열쇠는 수면에 있습니다 — 자정 전에 잠드는 습관 하나가 어떤 보약보다 낫습니다. 환절기의 호흡기와 소화기를 챙기고, 규칙적인 식사만 지켜도 올해는 무탈합니다. 가벼운 운동을 꾸준히 하면 체력이 눈에 띄게 붙는 시기이니, 하루 30분 걷기부터 시작해 보십시오. 몸이 보내는 작은 신호를 무시하지 않는 것, 그것이 올해의 건강 비결입니다.", "en": "Health holds well this year. No serious illness, but the key to keeping this energy is sleep — one habit of lights-out before midnight beats any tonic. Mind your lungs and stomach at the change of seasons, and regular meals alone carry you through unharmed. Light, consistent exercise builds noticeable stamina now — start with thirty minutes of walking. Not ignoring the body's small signals is this year's whole secret."}, {"kr": "피로가 쌓이기 쉬운 흐름이니 관리가 필요한 해입니다. 상반기에는 바쁜 일정에 밀려 몸을 돌보지 못하다가 하반기에 한꺼번에 신호가 올 수 있습니다. 미뤄둔 건강검진이 있다면 올해 안에 받으십시오 — 미리 확인하는 것만으로 큰 걱정을 덜게 됩니다. 특히 어깨·목·허리 같은 자세에서 오는 통증과 만성적인 소화 문제를 조심하고, 스트레스를 몸으로 받는 편이라면 운동으로 풀어내는 것이 약보다 낫습니다. 무리한 다이어트나 극단적인 식단은 올해 특히 몸을 상하게 하니 피하십시오.", "en": "Fatigue accumulates easily — this year asks for management. In the first half a busy schedule crowds out self-care, and the signals arrive all at once in the second. Take that postponed check-up before the year ends; simply knowing lifts a large worry. Beware posture-related pain in shoulders, neck, and back, and chronic digestive trouble; if you carry stress in the body, movement heals better than medicine. Avoid crash diets and extreme regimens — they injure you especially this year."}, {"kr": "건강에 큰 이상은 없으나 활력이 떨어지기 쉬운 해입니다. 아프지는 않은데 자꾸 처지는 느낌이 든다면 몸보다 마음이 지친 경우가 많으니, 쉬는 것도 일처럼 계획에 넣으십시오. 햇빛을 보는 시간과 몸을 움직이는 시간이 부족하면 기운이 가라앉으니, 점심시간 산책 같은 작은 습관이 큰 차이를 만듭니다. 술자리와 야식을 줄이는 것만으로 컨디션이 눈에 띄게 달라지는 시기입니다. 큰 병은 없는 해이니 오히려 지금 몸의 기초 체력을 쌓아두면 다음 해가 가볍습니다.", "en": "No major trouble, but vitality dips easily. If you are not ill yet keep sagging, it is usually the heart tired rather than the body — schedule rest as deliberately as work. Too little sunlight and too little movement sink your energy; a small habit like a lunchtime walk makes a large difference. Cutting back on drinking and late-night meals alone visibly changes how you feel. With no serious illness this year, building baseline fitness now makes next year light."}, {"kr": "과로와 밤샘이 화근이 되기 쉬운 해이니 몸을 아끼십시오. 특히 술자리와 불규칙한 식사가 겹치면 위장과 간에 무리가 가는 흐름이며, 스트레스가 몸으로 바로 나타나는 시기입니다. 작은 증상이라도 미루지 말고 초기에 확인하는 것이 이 해의 원칙입니다 — 큰 병은 대부분 작은 신호를 무시한 데서 옵니다. 운전이나 기계 다루는 일에서 부주의로 인한 사고를 조심하고, 무리한 운동이나 갑작스러운 격한 활동도 피하십시오. 몸을 지키는 것이 재물을 지키는 것이며, 이 둘은 늘 함께 움직입니다.", "en": "Overwork and sleepless nights breed trouble — spare your body. Drinking layered on irregular meals strains the stomach and liver, and stress surfaces physically in this season. The rule this year: check even small symptoms early rather than postponing — most serious illness begins with an ignored signal. Guard against careless accidents while driving or handling machinery, and avoid sudden strenuous activity. Protecting the body is protecting your wealth; the two always move together."}], "MONTHS": [{"kr": "새 계획을 세우기에 더없이 좋은 달입니다. 머릿속에만 있던 목표를 글로 적어 눈에 보이는 곳에 붙여두면 실제로 이루어질 확률이 크게 올라갑니다. 이 달에 시작한 일은 연말까지 흐름이 이어지니 첫 단추를 신중히 끼우십시오.", "en": "An excellent month for new plans. Write down the goals living only in your head and post them where you see them — the odds of achieving them rise sharply. What you begin now carries its current to year's end, so fasten the first button carefully."}, {"kr": "귀인이 나타나는 달입니다. 모임과 초대를 마다하지 말고, 오래 연락하지 않은 사람에게 먼저 안부를 전해 보십시오. 뜻밖의 자리에서 앞으로 몇 해를 함께할 사람을 만나게 됩니다.", "en": "A benefactor appears. Do not decline gatherings and invitations, and reach out first to someone you have long neglected. In an unexpected place you meet a person who will walk with you for years."}, {"kr": "재물이 들어오지만 나가는 구멍도 함께 열리는 달입니다. 수입이 생기기 전에 먼저 지출 계획을 세워두면 손에 남는 것이 달라집니다. 충동적인 큰 구매는 이 달만큼은 미루십시오.", "en": "Money comes in, but an outflow opens with it. Plan your spending before the income arrives and what remains in hand changes entirely. Postpone impulsive large purchases this month."}, {"kr": "문서운이 좋은 달입니다. 계약·시험·신청·면접 등 종이가 오가는 일에서 좋은 결과가 나오니, 미뤄둔 서류가 있다면 이 달에 처리하십시오. 다만 서명 전 조건을 두 번 확인하는 습관은 잊지 마십시오.", "en": "A month of document luck. Contracts, exams, applications, interviews — anything on paper goes well, so handle postponed paperwork now. Just never skip reading the terms twice before signing."}, {"kr": "말조심이 필요한 달입니다. 가볍게 던진 농담이 오해가 되고, 좋은 뜻으로 한 조언이 참견으로 받아들여지기 쉽습니다. 이 달에는 듣는 사람이 되면 구설이 저절로 비켜갑니다.", "en": "A month to watch your words. A casual joke turns into a misunderstanding and well-meant advice reads as meddling. Become the listener this month and gossip passes you by on its own."}, {"kr": "이동수가 있는 달입니다. 여행이나 출장, 혹은 평소 가지 않던 장소에서 좋은 기회를 물어옵니다. 몸을 움직이면 운도 함께 움직이니 초대가 오면 응하는 편이 좋습니다.", "en": "A month of movement. Travel, a business trip, or simply a place you never visit brings opportunity. Move the body and fortune moves too — accept the invitations that come."}, {"kr": "건강을 먼저 챙겨야 하는 달입니다. 무리한 일정을 몰아 넣으면 반드시 탈이 나니, 이 달만큼은 쉬는 시간을 일정표에 먼저 적어두십시오. 미뤄둔 검진이 있다면 지금이 적기입니다.", "en": "Put health first this month. Packing the schedule tight guarantees trouble — write your rest into the calendar before anything else. If a check-up is overdue, now is the time."}, {"kr": "오랜 노력의 결실이 드러나기 시작하는 달입니다. 그동안 눈에 띄지 않던 성과가 인정받고, 포기하지 않은 자신에게 스스로 박수를 보내도 좋습니다. 이 흐름은 다음 달까지 이어집니다.", "en": "The fruit of long effort begins to show. Work that went unnoticed earns recognition — you may applaud yourself for not quitting. This current carries into next month."}, {"kr": "가족과의 시간이 복을 부르는 달입니다. 집안의 대소사에 정성을 다하고, 부모님이나 오래된 가족에게 연락 한 통 드리십시오. 뿌리가 튼튼해야 가지가 뻗는 법입니다.", "en": "Family time invites blessing. Give your best to household matters and make a call to a parent or long-distant relative. Branches reach only as far as roots hold."}, {"kr": "금전 거래를 조심해야 하는 달입니다. 특히 빌려주는 돈은 처음부터 없다고 생각하는 편이 마음도 관계도 지킵니다. 보증이나 동업 제안은 이 달에 결정하지 마십시오.", "en": "A month to guard money exchanges. Assume lent money will not return — it protects both your peace and the relationship. Do not decide on guarantees or partnerships this month."}, {"kr": "배움에 투자하면 몇 배로 돌아오는 달입니다. 책 한 권, 강의 하나가 앞으로의 길을 바꿀 수 있으니 관심 있던 분야에 발을 담가 보십시오. 지금 배운 것은 반년 안에 쓰이게 됩니다.", "en": "Investment in learning returns manyfold. One book, one course may change your path — dip into the field you were curious about. What you learn now is used within half a year."}, {"kr": "주변 정리가 운을 부르는 달입니다. 오래 쓰지 않은 물건과 끝난 관계를 정리하면 새것이 들어올 자리가 생깁니다. 특히 집안의 묵은 짐을 비우면 마음까지 가벼워집니다.", "en": "Tidying invites luck. Clear out long-unused things and finished relationships, and room opens for the new. Emptying old clutter at home lightens the mind as well."}, {"kr": "경쟁에서 유리한 위치에 서는 달입니다. 준비해둔 것을 보여줄 기회가 오니 망설이지 말고 손을 드십시오. 이 달의 한 걸음이 올해의 자리를 결정합니다.", "en": "You stand advantaged in competition. A chance to show what you prepared arrives — raise your hand without hesitating. One step this month decides your standing for the year."}, {"kr": "뜻밖의 소식이 찾아오는 달입니다. 놀랄 만한 연락이나 변화가 있으나 차분히 대응하면 길하게 풀립니다. 첫 반응을 하루만 미루면 훨씬 나은 결정을 하게 됩니다.", "en": "Unexpected news arrives. A startling call or change comes, yet a calm response resolves it favorably. Delay your first reaction by a single day and you decide far better."}, {"kr": "인간관계의 매듭을 푸는 달입니다. 마음에 걸리던 사람에게 먼저 건네는 한마디가 예상보다 큰 복이 되어 돌아옵니다. 자존심보다 관계가 남는 것이 결국 이득입니다.", "en": "A month to untie knots in relationships. The first word you offer to someone who weighed on you returns as a larger blessing than expected. Keeping the bond over pride pays in the end."}, {"kr": "작은 행운이 이어지는 달입니다. 대단한 사건은 없어도 사소한 일들이 술술 풀리니, 이 흐름에 감사를 표현할수록 행운이 오래 머뭅니다. 주변에 베푸는 작은 호의가 배로 돌아옵니다.", "en": "Small lucks follow one another. Nothing grand, yet little things go smoothly — the more gratitude you voice, the longer the luck lingers. Small kindnesses you extend return doubled."}], "AGES": [["10대 · 청소년기", "Teens"], ["20대 · 청년기", "Twenties"], ["30대 · 성장기", "Thirties"], ["40대 · 절정기", "Forties"], ["50대 · 완숙기", "Fifties"], ["60대 이후 · 결실기", "Sixties and Beyond"]], "AGE_TXT": [[{"kr": "배움의 기운이 강해 공부나 예체능 중 하나에서 재능이 일찍 드러납니다. 다만 부모의 기대와 본인의 성향이 어긋나 속앓이를 하는 시기이기도 하니, 이때 하고 싶었던 일이 훗날 다시 찾아옵니다.", "en": "The energy of learning runs strong, and talent surfaces early in study or the arts. Yet parental expectation and your own nature may not align, causing quiet suffering — what you wanted then returns to you later in life."}, {"kr": "또래보다 생각이 깊고 어른스러워 일찍 자기 세계를 만듭니다. 친구 관계에서 상처를 받기도 하지만, 그 경험이 사람 보는 눈을 길러 평생의 자산이 됩니다.", "en": "You think deeper than your peers and build your own world early. Friendships may wound you, yet that experience trains your eye for people — an asset for life."}, {"kr": "활동적이고 호기심이 많아 여러 가지에 손을 대는 시기입니다. 한 가지에 집중하지 못해 아쉬움이 남을 수 있으나, 이때 넓혀둔 경험이 훗날 남들에게 없는 무기가 됩니다.", "en": "Active and curious, you try many things. You may regret not focusing on one, yet the breadth you gather becomes a weapon others lack later."}], [{"kr": "진로를 두고 크게 방황하는 시기가 한 번 옵니다. 남들보다 늦은 것 같아 조급하겠지만, 이 방황이 없으면 평생 남의 길을 걷게 되니 오히려 필요한 시간입니다. 20대 후반부터 방향이 잡히기 시작합니다.", "en": "A season of real wandering over your path arrives once. You will feel behind and rush, yet without this wandering you would walk someone else's road for life — it is necessary time. Direction begins to settle in your late twenties."}, {"kr": "일찍 자리를 잡거나 좋은 사람을 만나 안정을 얻는 흐름입니다. 다만 그 안정이 너무 이른 나머지 도전할 기회를 놓칠 수 있으니, 20대에는 실패해도 되는 나이임을 기억하십시오.", "en": "You settle early or meet a good person and find stability. Yet stability this soon may cost you the chance to risk — remember that your twenties are the age where failing is allowed."}, {"kr": "고생이 많지만 그만큼 배우는 시기입니다. 이때의 노력이 곧바로 보상받지는 않아 억울할 수 있으나, 30대에 그 값이 한꺼번에 돌아오는 사주입니다.", "en": "A hard-working decade that teaches in equal measure. The effort is not repaid at once and may feel unjust, yet your chart returns the value all at once in your thirties."}], [{"kr": "본격적으로 자리가 잡히는 시기입니다. 직업적으로 인정받기 시작하고 재물의 기반이 만들어지는데, 이때 무리한 확장보다 기초를 다지면 40대의 절정이 훨씬 높아집니다. 결혼이나 큰 이동수가 있다면 이 시기입니다.", "en": "Your ground truly settles now. Recognition begins at work and the base of wealth forms — build foundations rather than overexpanding, and your forties peak far higher. Marriage or a major move, if any, belongs to this decade."}, {"kr": "일과 가정 사이에서 균형을 잡느라 가장 바쁜 시기입니다. 몸이 두 개라도 모자란 느낌이 들겠지만, 이 시기에 지킨 관계가 훗날 가장 큰 재산이 됩니다. 건강 관리를 시작해야 하는 나이이기도 합니다.", "en": "The busiest decade, balancing work and home. Two bodies would not be enough, yet the relationships you protect now become your greatest wealth later. It is also the age to begin caring for your health."}, {"kr": "한 번의 큰 전환이 있는 시기입니다. 이직·독립·이사 등으로 판이 바뀌는데, 두렵더라도 이 변화를 받아들이는 편이 사주 흐름에 맞습니다. 변화를 피하면 40대에 더 큰 형태로 다시 옵니다.", "en": "One great turning arrives. A job change, going independent, or relocation shifts your board — frightening as it is, accepting it matches your chart's flow. Avoided now, the change returns larger in your forties."}], [{"kr": "인생의 절정에 해당하는 시기입니다. 그동안 쌓아온 것이 형태를 갖추어 드러나며, 사회적 위치와 재물이 함께 올라갑니다. 다만 이 시기에 가장 조심할 것은 자만과 건강이며, 이 둘만 다스리면 50대까지 흐름이 이어집니다.", "en": "The peak of your life. What you accumulated takes visible form, and standing and wealth rise together. The two things to guard now are pride and health — master both, and the current carries into your fifties."}, {"kr": "책임이 가장 무거워지는 시기입니다. 위와 아래를 모두 챙겨야 하는 자리에 서게 되며, 그 무게가 버겁지만 이때 사람을 얻으면 평생의 자산이 됩니다. 재물은 크게 들어오나 나가는 곳도 많습니다.", "en": "Your heaviest decade of responsibility. You stand where both those above and below depend on you — the weight is real, yet the people you win now are a lifelong asset. Wealth arrives large but leaves through many doors."}, {"kr": "한 번의 시련을 통해 크게 성장하는 시기입니다. 뜻대로 되지 않는 일이 생기지만, 그것이 방향을 바로잡아 주는 계기가 됩니다. 이 시기를 잘 넘기면 50대 이후가 매우 편안합니다.", "en": "You grow greatly through one trial. Something refuses to go your way, yet it becomes the correction that sets your direction right. Pass this well and your fifties onward are remarkably at ease."}], [{"kr": "쌓아온 것을 거두는 시기입니다. 큰 욕심을 내지 않아도 자리와 재물이 유지되며, 후배나 자녀를 통해 보람을 느끼게 됩니다. 이 시기에는 새로 벌이기보다 물려주고 나누는 데서 복이 나옵니다.", "en": "A decade of harvest. Position and wealth hold without grasping, and fulfillment comes through juniors or children. Blessing now flows from passing on and sharing rather than starting anew."}, {"kr": "제2의 인생을 고민하게 되는 시기입니다. 그동안의 자리를 내려놓고 하고 싶었던 일로 방향을 트는 흐름이 있으며, 이때의 선택이 노년의 행복을 결정합니다. 건강 관리가 가장 중요한 나이입니다.", "en": "You begin weighing a second life. There is a current toward setting down your old post and turning to what you always wanted; this choice decides the happiness of your later years. Health care matters most now."}, {"kr": "인간관계가 정리되는 시기입니다. 멀어지는 사람이 있는 대신 진짜 남을 사람이 분명해지며, 그것이 서운함이 아니라 정돈임을 알게 됩니다. 재물은 안정적이나 자녀 문제로 지출이 늘 수 있습니다.", "en": "Relationships sort themselves. Some drift away while those who truly remain become clear — and you come to see this as ordering rather than loss. Wealth is stable, though children's matters may increase outgo."}], [{"kr": "가장 편안한 시기가 열립니다. 젊어서 고생한 만큼 노년이 안정되는 사주이며, 건강만 지키면 하고 싶은 것을 하며 지낼 수 있습니다. 손아래 사람들에게 베푸는 데서 큰 즐거움을 얻습니다.", "en": "Your most comfortable season opens. Your chart repays youthful hardship with a settled old age — guard your health and you may live doing what you wish. Great joy comes from giving to those younger than you."}, {"kr": "배움과 취미에서 새로운 세계를 여는 시기입니다. 나이가 들어 시작한 일에서 뜻밖의 재능이 드러나며, 그것이 노년의 활력이 됩니다. 사람과의 교류를 놓지 않는 것이 건강 비결입니다.", "en": "A season of new worlds through learning and hobbies. Talent surfaces unexpectedly in what you begin late, and it becomes the vitality of your later years. Not letting go of human contact is your health secret."}, {"kr": "가족과 뿌리를 돌아보는 시기입니다. 그동안 못했던 것을 가족과 함께하며 매듭을 푸는 흐름이며, 이 시기의 화해가 큰 복이 됩니다. 무리하지 않는 규칙적인 생활이 곧 장수의 비결입니다.", "en": "A season of turning back toward family and roots. You do together what you never could and untie old knots — the reconciliation of this time is a great blessing. A regular life without strain is the secret of longevity."}]], "JOB": [{"kr": "키우고 만들어내는 분야에서 재능이 빛납니다. 교육·기획·출판·디자인·의료처럼 사람이나 아이디어를 성장시키는 일이 잘 맞으며, 특히 오랜 시간에 걸쳐 쌓아가는 직종에서 두각을 나타냅니다. 반대로 결과가 즉시 나오는 단기 승부의 세계는 당신의 결을 갉아먹으니 피하는 편이 좋습니다.", "en": "Your talent shines in fields that grow and create. Education, planning, publishing, design, and medicine — anything that raises people or ideas — suits you, and you excel especially where value accrues over long time. Conversely, worlds of instant short-term outcomes wear against your grain; better avoided."}, {"kr": "사람 앞에 서고 알리는 분야가 잘 맞습니다. 방송·영업·마케팅·예술·요식업처럼 표현하고 드러내는 일에서 능력이 발휘되며, 당신의 열정 자체가 상품이 되는 직종에서 크게 됩니다. 다만 혼자 조용히 반복하는 일은 오래 견디기 어려우니 사람이 있는 자리를 택하십시오.", "en": "Fields that stand before people and announce suit you. Media, sales, marketing, the arts, hospitality — work that expresses and reveals draws out your ability, and you rise where your passion itself is the product. Solitary repetitive work is hard for you to endure long — choose seats with people in them."}, {"kr": "지키고 다지는 분야에서 신뢰를 얻습니다. 부동산·행정·금융관리·제조·농업처럼 기반을 다루는 일이 맞으며, 시간이 지날수록 대체 불가능한 사람이 되는 유형입니다. 화려한 직종보다 오래 남는 직종을 택할 때 이 사주의 힘이 온전히 나옵니다.", "en": "You earn trust in fields that guard and consolidate. Real estate, administration, financial management, manufacturing, agriculture — work handling foundations fits, and you become irreplaceable with time. Your chart's full force appears when you choose the enduring profession over the glamorous one."}, {"kr": "정밀함과 원칙이 필요한 분야에서 두각을 나타냅니다. 법률·의료·기술·감사·제조처럼 기준이 분명한 일에서 실력이 드러나며, 당신의 냉정한 판단이 그대로 경쟁력이 됩니다. 사람의 감정을 매일 다루어야 하는 직종은 소모가 크니 신중히 택하십시오.", "en": "You stand out where precision and principle are required. Law, medicine, engineering, audit, manufacturing — work with clear standards reveals your skill, and your cool judgment is competitiveness itself. Professions demanding daily emotional labor drain you — choose them carefully."}, {"kr": "흐름을 읽고 연결하는 분야에서 능력을 발휘합니다. 연구·무역·물류·상담·투자처럼 정보와 사람을 잇는 일이 잘 맞으며, 남들이 못 보는 판을 읽어내는 것이 당신의 무기입니다. 규칙이 지나치게 경직된 조직에서는 답답함을 느끼니 재량이 있는 자리를 택하십시오.", "en": "You excel where flows are read and connected. Research, trade, logistics, counseling, investment — work linking information and people fits, and reading boards others cannot see is your weapon. Rigidly ruled organizations stifle you — choose seats with discretion."}]};

function fieldScores(A, seunStemEl, seunBranchEl){
  const de = A.de;
  /* 오행 길흉: 용신5 희신4 한신3 기신1.5 */
  function elScore(el){
    if(el === A.yong) return 5;
    if(el === A.hui) return 4;
    const gishin = A.strong ? [de, (de+4)%5] : [(de+1)%5, (de+2)%5, (de+3)%5];
    if(gishin.includes(el)) return 1.5;
    return 3;
  }
  /* 십신 오행 매핑 */
  const elOf = { jae:(de+2)%5, gwan:(de+3)%5, sik:(de+1)%5, in:(de+4)%5, bi:de };
  const seunEls = [seunStemEl, seunBranchEl];
  function fieldScore(el){
    const active = seunEls.includes(el) ? 1 : 0;
    return Math.max(1, Math.min(5, Math.round(elScore(el) + active)));
  }
  const scores = {
    jae:  fieldScore(elOf.jae),
    gwan: fieldScore(elOf.gwan),
    sik:  fieldScore(elOf.sik),
    bi:   fieldScore(elOf.bi),
    in:   fieldScore(elOf.in)
  };
  /* 종합 등급: 세운 오행 자체 길흉 평균 → 5단계 */
  const seunAvg = (elScore(seunStemEl) + elScore(seunBranchEl)) / 2;
  let grade;
  if(seunAvg >= 4.5) grade = 5;
  else if(seunAvg >= 3.7) grade = 4;
  else if(seunAvg >= 2.7) grade = 3;
  else if(seunAvg >= 1.9) grade = 2;
  else grade = 1;
  return { scores:scores, grade:grade, seunAvg:seunAvg };
}
/* 레이더 차트 SVG (5각형) */
function radarChart(scores){
  const order = ["jae","sik","gwan","bi","in"];   /* 재물(위)→시계방향: 재물·애정·직업·건강·학업 */
  const labels = { jae:NYV.FIELD.jae, sik:NYV.FIELD.sik, gwan:NYV.FIELD.gwan, bi:NYV.FIELD.bi, in:NYV.FIELD.in };
  const cx = 150, cy = 145, R = 95;
  function pt(i, r){
    const ang = -Math.PI/2 + i * 2*Math.PI/5;
    return [cx + r*Math.cos(ang), cy + r*Math.sin(ang)];
  }
  let g = '<svg viewBox="0 0 300 290" class="radar" xmlns="http://www.w3.org/2000/svg">';
  /* 배경 격자 (5단계) */
  for(let lvl=1; lvl<=5; lvl++){
    const r = R*lvl/5;
    let pts = "";
    for(let i=0;i<5;i++){ const p = pt(i, r); pts += p[0].toFixed(1)+","+p[1].toFixed(1)+" "; }
    g += '<polygon points="'+pts+'" fill="none" stroke="#E4D9BF" stroke-width="1"/>';
  }
  /* 축선 */
  for(let i=0;i<5;i++){ const p = pt(i, R); g += '<line x1="'+cx+'" y1="'+cy+'" x2="'+p[0].toFixed(1)+'" y2="'+p[1].toFixed(1)+'" stroke="#E4D9BF" stroke-width="1"/>'; }
  /* 데이터 폴리곤 */
  let dpts = "";
  order.forEach((k,i)=>{ const p = pt(i, R*scores[k]/5); dpts += p[0].toFixed(1)+","+p[1].toFixed(1)+" "; });
  g += '<polygon points="'+dpts+'" fill="rgba(194,59,34,0.18)" stroke="var(--jinsa)" stroke-width="2.2"/>';
  /* 꼭짓점 점 + 라벨 + 점수 */
  order.forEach((k,i)=>{
    const p = pt(i, R*scores[k]/5);
    g += '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="3.5" fill="var(--jinsa)"/>';
    const lp = pt(i, R+22);
    let anchor = "middle";
    if(lp[0] > cx+10) anchor = "start"; else if(lp[0] < cx-10) anchor = "end";
    g += '<text x="'+lp[0].toFixed(1)+'" y="'+(lp[1]-2).toFixed(1)+'" text-anchor="'+anchor+'" class="rlbl">'+(K?labels[k].kr:labels[k].en)+'</text>';
    g += '<text x="'+lp[0].toFixed(1)+'" y="'+(lp[1]+11).toFixed(1)+'" text-anchor="'+anchor+'" class="rscore">'+"★".repeat(scores[k])+'</text>';
  });
  g += '</svg>';
  return g;
}

  const M = mySaju(P), S = M.S, A = M.A;
  const curAge = TYPE_YEAR - (+P.bdate.slice(0,4)) + 1;
  const Y = seun(TYPE_YEAR);
  const ssY = sipsin(S.dS, S_ELEM[Y.s], Y.s % 2 === 0);
  const lv = luckLevel(A, S_ELEM[Y.s], B_ELEM[Y.b]);

  const FS = fieldScores(A, S_ELEM[Y.s], B_ELEM[Y.b]);
  const G = NYV.GRADE[FS.grade];
  const gcolors = {5:"#D4A017", 4:"#3FA57A", 3:"#8F887B", 2:"#C97A2B", 1:"#C23B22"};
  const gcol = gcolors[FS.grade];

  /* ── 종합 판정 카드 ── */
  out += '<div class="grade-card" style="border-color:'+gcol+'">'
       + '<div class="gc-year">' + TYPE_YEAR + ' · ' + SH[Y.s] + BH[Y.b] + (K ? " " + SK[Y.s] + BK[Y.b] + "년" : "") + '</div>'
       + '<div class="gc-stars" style="color:'+gcol+'">' + "★".repeat(FS.grade) + '<span class="gc-empty">' + "★".repeat(5-FS.grade) + '</span></div>'
       + '<div class="gc-tag" style="background:'+gcol+'">' + tx(G.tag) + '</div>'
       + '<div class="gc-cat">' + tx(G.cat) + '</div>'
       + '<p class="gc-desc">' + tx(G.desc) + '</p></div>';

  /* ── 레이더 차트 + 분야별 별점 ── */
  out += '<div class="radar-wrap">' + radarChart(FS.scores) + '</div>';
  const fieldOrder = ["jae","gwan","sik","bi","in"];
  let frows = '<div class="field-list">';
  fieldOrder.forEach(k=>{
    const sc = FS.scores[k];
    const band = sc >= 4 ? "hi" : (sc === 3 ? "mid" : "lo");
    const scol = sc >= 4 ? "#3FA57A" : (sc === 3 ? "#8F887B" : "#C23B22");
    frows += '<div class="field-row"><div class="fr-head"><span class="fr-name">' + tx(NYV.FIELD[k]) + '</span>'
      + '<span class="fr-stars" style="color:'+scol+'">' + "★".repeat(sc) + '<span class="gc-empty">' + "★".repeat(5-sc) + '</span></span></div>'
      + '<p class="fr-txt">' + tx(NYV.FIELD_TXT[k][band]) + '</p></div>';
  });
  frows += '</div>';
  out += sec(K ? "분야별 운세" : "By Area", frows);

  /* ── 명식 (접기) ── */
  out += mingsikTable(S);
  if(S.hS < 0) out += '<p class="note" style="margin:-.4rem 0 .9rem">' + LBL.noSi + '</p>';

  out += sec(LBL.seunT, para(tx(SJT.SEUN[lv])) + para(tx(SJT.WOL[SS_GROUP[ssY]])));
  out += sec(LBL.overview, para(tx(DB.NATURE[A.de])) + para(tx(DB.ZT[S.yB])) + para(tx(SJT.STRONG[A.strong ? 0 : 1])));
  out += luckCardY(A);

  const DT = daeunTable(S, A, P.gender, curAge);
  if(DT.nowIdx >= 0){
    const d = DT.D.list[DT.nowIdx];
    const gs = SS_GROUP[sipsin(S.dS, S_ELEM[d.s], d.s % 2 === 0)];
    out += sec(LBL.nowDaeun + " · " + SH[d.s] + BH[d.b] + " (" + d.age + LBL.age + "~)", para(tx(SJT.DAEUN[gs])));
  }

  /* 월별 — 절기 구간 기준 */
  function fmtMD(y, mins){
    const dt = new Date(Date.UTC(y, 0, 1) + mins*60000);
    const mo = dt.getUTCMonth()+1, dd = dt.getUTCDate();
    return K ? (mo + "/" + dd) : (mo + "/" + dd);
  }
  let rows = "";
  for(let i=0; i<12; i++){
    const st = termMin(TYPE_YEAR, i);
    if(st === null) continue;
    let en = (i < 11) ? termMin(TYPE_YEAR, i+1) : null;
    let enLabel;
    if(en !== null){ enLabel = fmtMD(TYPE_YEAR, en - 1); }
    else { const n = termMin(TYPE_YEAR+1, 0); enLabel = (n === null) ? "12/31" : fmtMD(TYPE_YEAR+1, n - 1); }
    const mb = (i + 1) % 12;
    const W = wolun(TYPE_YEAR, mb);
    const ss = sipsin(S.dS, S_ELEM[W.s], W.s % 2 === 0);
    const mlv = luckLevel(A, S_ELEM[W.s], B_ELEM[W.b]);
    const tag = mlv === 0 ? "<span class='tagY'>" + LBL.yongsin + "</span>" : (mlv === 1 ? "<span class='tagH'>" + LBL.huisin + "</span>" : "");
    const grp = SS_GROUP[ss];
    const startDt = new Date(Date.UTC(TYPE_YEAR, 0, 1) + st*60000);
    const mNum = startDt.getUTCMonth();                       /* 0~11 */
    const vIdx = (i + grp) % 3;                               /* 같은 십신이라도 달마다 다른 문장 */
    const mStar = mlv === 0 ? 5 : (mlv === 1 ? 4 : (mlv === 2 ? 3 : 2));
    const mCol = mStar >= 4 ? "#3FA57A" : (mStar === 3 ? "#8F887B" : "#C97A2B");
    rows += '<div class="age-row"><div class="ag">' + fmtMD(TYPE_YEAR, st) + '<br><span style="font-size:.78em;opacity:.75">~' + enLabel + '</span>'
          + '<br><span class="mstar" style="color:' + mCol + '">' + "★".repeat(mStar) + '<span class="gc-empty">' + "★".repeat(5-mStar) + '</span></span></div>'
          + '<div class="at"><span class="poem">' + SH[W.s] + BH[W.b] + '</span><span class="poem-r">'
          + (K ? (SK[W.s] + BK[W.b] + "월 · " + ssName(ss)) : ssName(ss)) + '</span>' + tag + '<br>'
          + tx(SJT.WOL_V[grp][vIdx]) + ' ' + tx(SJT.LUCK_V[mlv][i % 2]) + ' ' + tx(SJT.MCTX[mNum])
          + '</div></div>';
  }
  out += sec(LBL.wolT, rows);
  out += '<div class="tj-note">' + LBL.nyNote + ' ' + LBL.engNote + '</div>';
}
else{

  out = '<div class="sec"><p>' + (K ? "입력 정보가 없습니다. 처음 화면에서 다시 시작해 주세요." : "No input found. Please start again from the home screen.") + '</p></div>';
}

$("resBody").innerHTML = out;
</script>
<script>
(function(){
  const s = localStorage.getItem("kf_lang");
  const ls = (navigator.languages && navigator.languages.length) ? navigator.languages : [navigator.language || "en"];
  const k = (s === "kr" || s === "en") ? (s === "kr") : ls.some(l => (l||"").toLowerCase().startsWith("ko"));
  const t = k ? ["서비스 소개","개인정보처리방침","이용약관"] : ["About","Privacy Policy","Terms"];
  ["fA","fP","fT"].forEach((id,i)=>{ const e = document.getElementById(id); if(e) e.textContent = t[i]; });
})();
</script>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
</body>
</html>
