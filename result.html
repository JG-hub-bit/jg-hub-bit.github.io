<style>
:root{
  color-scheme:light dark;
  --hanji:#F6F0E3;
  --meok:#2B2620;
  --noeurok:#2E6B5E;
  --noeurok-deep:#1E4634;
  --samcheong:#2C4E8A;
  --jinsa:#C23B22;
  --hwang:#E8A93D;
  --bunhong:#D9738C;
  --seokganju:#8A4A34;
  --seokganju-dark:#6E3A28;
  --stone:#B9B2A4;
  --stone-dark:#8F887B;
  --gold-line:#C9A85C;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{
  font-family:'Gowun Batang',serif;
  background:#F6F0E3;
  background:var(--hanji);
  color:var(--meok);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  position:relative;
  overflow-x:hidden;
}

/* ── 좌우 기둥 ── */
body::before, body::after{
  content:"";
  position:fixed; top:0; bottom:0;
  width:clamp(10px, 3vw, 34px);
  background:linear-gradient(90deg,
    var(--seokganju-dark) 0%, var(--seokganju) 30%,
    #A05A40 50%, var(--seokganju) 70%, var(--seokganju-dark) 100%);
  box-shadow:inset 0 0 18px rgba(0,0,0,.25);
  z-index:5;
}
body::before{left:0}
body::after{right:0}

/* ── 지붕(단청 처마) ── */
.roof{position:relative; z-index:4;}
.roof svg{display:block; width:100%; height:auto;}

/* ── 호랑이 ── */
.tiger{
  position:absolute;
  top:100px;
  top:8.5vw;
  right:30px;
  right:clamp(14px, 4vw, 52px);
  height:150px;
  height:clamp(64px, 13.5vw, 240px);
  width:auto;
  z-index:6;
  pointer-events:none;
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.3));
  image-rendering:auto;
}
@media (max-width:560px){
  .tiger{top:6vw; height:64px; height:clamp(48px, 15vw, 84px);}
}

/* ── 상단 바 (언어 토글: 좌측 상단) ── */
.topbar{position:absolute; top:10px; left:clamp(20px,5vw,50px); z-index:10;}
.lang-toggle{
  display:inline-flex; border:2px solid var(--gold-line);
  border-radius:999px; overflow:hidden; background:rgba(43,38,32,.55);
  backdrop-filter:blur(2px);
  font-family:'Noto Sans KR',sans-serif; font-size:.8rem; font-weight:700;
}
.lang-toggle button{
  border:none; background:transparent; color:#EFE6D0;
  padding:.35rem .85rem; cursor:pointer; transition:.2s;
}
.lang-toggle button.active{background:var(--gold-line); color:var(--meok);}

/* ── 본문 ── */
main{
  flex:1; width:100%; max-width:920px;
  margin:0 auto;
  padding:2.2rem clamp(28px,7vw,60px) 3rem;
  text-align:center;
}
.eyebrow{
  font-family:'Noto Sans KR',sans-serif;
  letter-spacing:.35em; font-size:.72rem; font-weight:500;
  color:var(--seokganju); text-transform:uppercase;
  margin-bottom:.7rem;
}
h1{
  font-family:'Song Myung',serif;
  font-size:clamp(1.9rem, 6vw, 3.1rem);
  line-height:1.25; color:var(--meok);
}
h1 .accent{color:var(--jinsa);}
.subtitle{
  margin-top:.9rem;
  font-size:clamp(.95rem, 2.6vw, 1.08rem);
  color:#5A5245; line-height:1.7;
}

  font-family:'Noto Sans KR',sans-serif;
  font-size:.85rem; color:#6B6353;
  border-top:1px solid var(--gold-line);
  border-bottom:1px solid var(--gold-line);
  padding:.5rem 1.4rem;
}
.visitor b{color:var(--jinsa); font-weight:700;}

/* ── 운세 메뉴: PC 3열 고정 ── */
.menu-title{
  margin:2.6rem 0 1.3rem;
  font-family:'Song Myung',serif;
  font-size:1.15rem; color:var(--noeurok);
  display:flex; align-items:center; gap:14px; justify-content:center;
}
.menu-title::before, .menu-title::after{
  content:""; height:1px; width:56px; background:var(--gold-line);
}
.menu-grid{
  display:flex; flex-direction:column;
  gap:12px; max-width:540px; margin:0 auto;
}
.menu-btn{
  border:1.5px solid #E4D9BF; background:#FFFDF7;
  border-radius:16px; padding:.95rem 1.15rem;
  cursor:pointer;
  display:flex; align-items:center; justify-content:space-between; gap:1rem;
  transition:transform .15s, box-shadow .15s, border-color .15s;
  font-family:'Gowun Batang',serif;
  text-align:left;
}
.menu-btn:hover, .menu-btn:focus-visible{
  transform:translateY(-2px);
  border-color:var(--hwang);
  box-shadow:0 6px 16px rgba(138,74,52,.15);
  outline:none;
}
.menu-btn .mtext{display:flex; flex-direction:column; gap:.28rem; flex:1; min-width:0;}
.menu-btn .emblem{width:54px; height:54px; flex:0 0 54px;}
.menu-btn .name{font-size:1.15rem; font-weight:700; color:var(--meok); line-height:1.3;}
.menu-btn .desc{
  font-family:'Noto Sans KR',sans-serif;
  font-size:.9rem; color:#6E6656; line-height:1.45;
}

/* ── 토스트 ── */
.toast{
  position:fixed; left:50%; bottom:90px;
  transform:translateX(-50%) translateY(20px);
  background:var(--meok); color:#F3EBD9;
  font-family:'Noto Sans KR',sans-serif; font-size:.85rem;
  padding:.65rem 1.3rem; border-radius:999px;
  opacity:0; pointer-events:none; transition:.3s; z-index:50;
  white-space:nowrap;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* ── 하단 돌기단 ── */
footer{
  position:relative; z-index:4;
  background:linear-gradient(180deg, var(--stone) 0%, var(--stone-dark) 100%);
  padding:1.1rem 0 .9rem; text-align:center;
}
footer::before{
  content:""; display:block;
  position:absolute; top:-8px; left:0; right:0; height:8px;
  background:repeating-linear-gradient(90deg,
    var(--stone-dark) 0 46px, #A39C8E 46px 48px);
}
footer p{
  font-family:'Noto Sans KR',sans-serif;
  font-size:.72rem; color:#3E3A32; letter-spacing:.05em;
}

/* ── 모바일 보정 ── */
@media (max-width:560px){
  .menu-btn{padding:.85rem 1rem;}
  .menu-btn .emblem{width:48px; height:48px; flex-basis:48px;}
  .menu-btn .name{font-size:1.08rem;}
  .menu-btn .desc{font-size:.86rem;}
}
@media (prefers-reduced-motion: reduce){
  *{transition:none !important;}
}

  .homelink{ color:#D8A374 !important; }

@media (prefers-color-scheme: dark){

  .radar .rlbl{fill:#E8DFC8 !important;} .radar polygon[stroke="#E4D9BF"]{stroke:#4A4336 !important;} .radar line{stroke:#4A4336 !important;}

  return {sajuY:sajuY, yS:yS, yB:yB, mS:mS, mB:mB, dS:D.s, dB:D.b, hS:hS, hB:hB,
          bm:bm, bY:bY, bM:bM, bD:bD, ti:ti, hourIdx:hIdx, corr:corr, solarHH:hh, solarMM:mi};
}

/* ══ 오행 강약 · 신강/신약 · 용신 ══ */
function analyze(S){
  const cnt = [0,0,0,0,0];
  const add = (e,w)=>{ if(e>=0) cnt[e] += w; };
  /* 천간 (일간 제외) */
  add(S_ELEM[S.yS],1); add(S_ELEM[S.mS],1.5); if(S.hS>=0) add(S_ELEM[S.hS],1);
  /* 지지 → 지장간 비율 분배 */
  const addBranch = (b, w)=>{
    if(b < 0) return;
    JJG[b].forEach(p => add(S_ELEM[p[0]], w * p[1] / 30));
  };
  addBranch(S.yB, 1.2); addBranch(S.mB, 3.0); addBranch(S.dB, 2.0); addBranch(S.hB, 1.2);

  const de = S_ELEM[S.dS];
  const help = cnt[de] + cnt[(de+4)%5];
  const drain = cnt[(de+1)%5] + cnt[(de+2)%5] + cnt[(de+3)%5];
  const strong = help >= drain;
  let yong;
  if(strong){
    yong = (cnt[de] >= cnt[(de+4)%5]) ? (de+3)%5 : (de+2)%5;
  }else{
    const gwan = cnt[(de+3)%5] + cnt[(de+1)%5], jae = cnt[(de+2)%5];
    yong = (gwan >= jae) ? (de+4)%5 : de;
  }
  const hui = ((yong - 1) % 5 + 5) % 5;
  return {cnt:cnt, de:de, help:help, drain:drain, strong:strong, yong:yong, hui:hui};
}

/* ══ 대운 ══ */
function daeun(S, gender){
  const yangY = (S.yS % 2 === 0);
  const forward = (yangY && gender === "M") || (!yangY && gender === "F");
  /* 대운수 */
  let dist;
  if(forward){
    let nt = null;
    for(let i=0;i<12;i++){ const t = termMin(S.bY,i); if(t !== null && t > S.bm){ nt = t; break; } }
    if(nt === null){ const t2 = termMin(S.bY+1,0); nt = (t2===null? S.bm : t2 + minsOfYear(S.bY,12,31,24,0)); }
    dist = nt - S.bm;
  }else{
    let pt = null;
    for(let i=11;i>=0;i--){ const t = termMin(S.bY,i); if(t !== null && t <= S.bm){ pt = t; break; } }
    if(pt === null){ const t2 = termMin(S.bY-1,11); pt = (t2===null? S.bm : t2 - minsOfYear(S.bY-1,12,31,24,0)); }
    dist = S.bm - pt;
  }
  const num = Math.max(1, Math.round(dist / 1440 / 3));
  const list = [];
  for(let i=1;i<=8;i++){
    const s = ((S.mS + (forward ? i : -i)) % 10 + 10) % 10;
    const b = ((S.mB + (forward ? i : -i)) % 12 + 12) % 12;
    list.push({age:num + (i-1)*10, s:s, b:b});
  }
  return {forward:forward, num:num, list:list};
}

/* ══ 세운 / 월운 ══ */
function seun(year){ const i = ((year - 4) % 60 + 60) % 60; return {s:i%10, b:i%12}; }
function wolun(year, monthBranch){
  const yS = seun(year).s;
  const inHead = ((yS % 5) * 2 + 2) % 10;
  const s = (inHead + ((monthBranch - 2) % 12 + 12) % 12) % 10;
  return {s:s, b:monthBranch};
}

/* IANA 기준 UTC 오프셋(분) — 현지 시각(분, epoch 기준 가정치)으로 조회 */
function tzOffsetAt(utcMin){
  let o = TZT[0][1];
  for(let i=0;i<TZT.length;i++){ if(utcMin >= TZT[i][0]) o = TZT[i][1]; else break; }
  return o;
}
/* 균시차 (NOAA 공식, 분) */
function eqTime(y, m, d, hourFrac){
  const start = Date.UTC(y,0,1), cur = Date.UTC(y,m-1,d);
  const n = Math.round((cur-start)/86400000) + 1;
  const g = 2*Math.PI/365 * (n - 1 + (hourFrac-12)/24);
  return 229.18*(0.000075 + 0.001868*Math.cos(g) - 0.032077*Math.sin(g)
       - 0.014615*Math.cos(2*g) - 0.040849*Math.sin(2*g));
}
/* 시계시각 → 진태양시(분, 0~1440 기준 + 날짜 이동량) */
function trueSolar(y, m, d, hh, mi, lon){
  const localEpochMin = Math.round(Date.UTC(y,m-1,d,hh,mi)/60000);
  /* 오프셋은 현지시각 기준 근사 조회 후 1회 보정 */
  let ofs = tzOffsetAt(localEpochMin - 540);
  ofs = tzOffsetAt(localEpochMin - ofs);
  const utcMin = localEpochMin - ofs;
  const eot = eqTime(y, m, d, hh + mi/60);
  const tsMin = utcMin + lon*4 + eot;        /* 진태양시 (epoch 분) */
  return {tsMin: tsMin, shiftMin: tsMin - localEpochMin, ofs: ofs, eot: eot};
}

  return out;
}

const SJT = {"WOL": [{"kr": "비겁의 달입니다. 나와 같은 기운이 들어와 경쟁자도 동료도 함께 늘어납니다. 사람을 얻으면 크게 얻고 잃으면 크게 잃는 달이니, 협업은 좋으나 돈이 오가는 동업은 신중해야 합니다.", "en": "A month of peers. Your own element enters — both rivals and allies multiply. You gain much by winning people and lose much by losing them; collaborate freely, but be careful with money-sharing partnerships."}, {"kr": "식상의 달입니다. 내 기운이 밖으로 뻗어 나가 표현·발표·창작·영업처럼 나를 드러내는 일에서 좋은 반응을 얻습니다. 아이디어를 꺼내 놓기 좋은 때이나, 말이 앞서 약속을 크게 하지 않도록 한 박자 늦추십시오.", "en": "A month of output. Your energy reaches outward — expression, presentation, creation, and sales all draw good responses. A fine time to put ideas on the table, though slow by a beat so words do not outrun what you can deliver."}, {"kr": "재성의 달입니다. 재물의 기운이 도는 때라 협상·정산·계약처럼 돈이 오가는 실무에서 유리한 조건을 얻습니다. 다만 재물이 도는 달은 지출도 함께 커지니, 들어오는 것과 나가는 것을 같은 무게로 살피십시오.", "en": "A month of wealth. Money energy circulates — negotiations, settlements, and contracts land on favourable terms. But spending swells alongside income; weigh what comes in and what goes out on the same scale."}, {"kr": "관성의 달입니다. 직위·책임·평가처럼 나를 규정하는 것들이 전면에 나옵니다. 인정받고 자리가 오를 수 있는 달이지만, 동시에 압박과 마감이 무겁게 느껴지는 때이니 윗사람과 정면으로 부딪히는 일만 피하십시오.", "en": "A month of authority. Position, responsibility, and evaluation come to the front. Recognition and advancement are possible, yet pressure and deadlines weigh heavily — simply avoid colliding head-on with those above you."}, {"kr": "인성의 달입니다. 문서·계약·시험·자격처럼 도장이 오가는 일과 배움에서 성과가 나옵니다. 어른이나 선배의 도움이 들어오는 때이니 부탁할 일이 있으면 이 달에 꺼내십시오. 이른바 문서운이 열리는 달입니다.", "en": "A month of the scholar. Documents, contracts, exams, and qualifications go well, and study bears fruit. Help arrives from elders and seniors — if you have an ask, raise it now. This is the month document luck opens."}], "LUCKLV": [{"kr": "게다가 이 달의 기운이 곧 당신의 용신(用神)입니다. 사주의 넘치는 부분을 정확히 눌러 주는 달이니, 한 해 중 손꼽히게 기운이 좋습니다. 중요한 일을 이 달에 배치하십시오.", "en": "Moreover this month's energy is your Yongsin — the very element your chart needs. It presses exactly where your chart overflows, making it one of the strongest months of your year. Place what matters here."}, {"kr": "이 달의 기운은 당신의 희신(喜神)으로, 용신을 도와 흐름을 부드럽게 만듭니다. 큰 파란 없이 일이 풀리는 달입니다.", "en": "This month carries your Huisin — the element that supports your Yongsin and smooths the current. Matters resolve without storms."}, {"kr": "이 달의 기운은 당신의 사주에 크게 이롭지도 해롭지도 않습니다. 무리하지 않으면 무난히 지나갑니다.", "en": "This month's energy neither greatly helps nor harms your chart. Without overreaching, it passes uneventfully."}, {"kr": "다만 이 달의 기운은 이미 넘치는 부분을 더 보태는 쪽이라, 평소보다 조급해지거나 고집이 세지기 쉽습니다. 결정을 하루 미루는 습관이 이 달의 개운법입니다.", "en": "However this month adds to what already overflows in your chart, so impatience and stubbornness come easily. Postponing decisions by a day is this month's remedy."}], "DAEUN": [{"kr": "비겁의 대운입니다. 이 십 년은 나와 같은 기운이 세상에 가득한 시기로, 사람이 곧 재산이자 곧 변수가 됩니다. 동료와 형제, 동업자가 인생에 크게 관여하며, 독립이나 창업을 꿈꾸게 되는 흐름입니다. 다만 재물이 나뉘기 쉬운 대운이니 금전이 얽힌 관계는 반드시 문서로 남기십시오.", "en": "A decade of peers. For these ten years your own element fills the world — people become both your fortune and your variable. Colleagues, siblings, and partners engage deeply with your life, and dreams of independence or founding stir. Yet wealth divides easily in this cycle: always put money-entangled relationships in writing."}, {"kr": "식상의 대운입니다. 이 십 년은 안에 있던 것이 밖으로 터져 나오는 시기입니다. 표현하고 만들고 가르치고 파는 일에서 두각을 나타내며, 이름을 알리게 되는 흐름입니다. 자식이나 후배와의 인연이 깊어지는 때이기도 합니다. 다만 하고 싶은 말이 많아지는 대운이라 윗사람과 부딪히기 쉬우니 그 점만 조심하십시오.", "en": "A decade of output. What lay inside bursts outward for these ten years. You excel at expressing, making, teaching, and selling, and your name becomes known. Bonds with children and juniors deepen. But this cycle fills you with things to say — take care not to collide with those above you."}, {"kr": "재성의 대운입니다. 이 십 년은 재물과 현실이 인생의 중심에 놓이는 시기입니다. 실제 돈이 움직이고, 부동산이나 사업, 결혼처럼 삶의 기반을 정하는 일이 이 대운에 일어납니다. 바쁘게 벌고 바쁘게 쓰는 흐름이니, 이 시기에 붙잡아 둔 것이 노년의 밑천이 됩니다.", "en": "A decade of wealth. For these ten years money and material reality sit at the centre of your life. Real money moves; property, business, or marriage — the things that set your foundation — happen in this cycle. You earn busily and spend busily, and what you hold onto now becomes the capital of your later years."}, {"kr": "관성의 대운입니다. 이 십 년은 세상이 나에게 자리와 책임을 주는 시기입니다. 승진하고 조직에서 인정받으며, 남을 이끄는 위치에 서게 됩니다. 그만큼 어깨가 무겁고 마음대로 할 수 없는 것도 늘어나지만, 이 압박을 견뎌낸 사람만이 다음 대운에서 진짜 자유를 얻습니다.", "en": "A decade of authority. For these ten years the world hands you position and responsibility. You rise, you are recognised within an organisation, and you stand where others follow. Your shoulders grow heavy and freedom narrows — yet only those who bear this pressure win real freedom in the cycle that follows."}, {"kr": "인성의 대운입니다. 이 십 년은 배우고 정리하고 안으로 채우는 시기입니다. 공부·자격·문서·부동산처럼 도장이 오가는 일에서 성과가 나며, 어른과 스승의 도움이 들어옵니다. 밖으로 화려하지 않아 답답하게 느껴질 수 있으나, 이때 채운 것이 다음 십 년을 통째로 바꿉니다.", "en": "A decade of the scholar. For these ten years you learn, organise, and fill yourself inwardly. Study, qualifications, documents, and property bear fruit, and help arrives from elders and teachers. It may feel dull for lacking outward glamour — yet what you gather now transforms the entire decade that follows."}], "SEUN": [{"kr": "올해의 기운이 당신의 용신과 정확히 맞아떨어집니다. 사주에서 넘치던 부분이 눌리고 모자라던 부분이 채워지는 해이니, 십 년에 몇 번 오지 않는 흐름입니다. 미뤄두었던 큰 결정을 올해 하십시오.", "en": "This year's energy lands exactly on your Yongsin. What overflowed in your chart is pressed down and what was lacking is filled — a current that comes only a few times in a decade. Make the big decision you postponed."}, {"kr": "올해의 기운은 당신의 희신에 해당합니다. 용신을 뒤에서 밀어 주는 해이니 큰 무리 없이 일이 풀리고, 준비한 만큼 결과가 따라옵니다.", "en": "This year carries your Huisin, pushing your Yongsin from behind. Matters resolve without strain and results follow your preparation."}, {"kr": "올해의 기운은 당신의 사주와 무난하게 맞물립니다. 특별히 밀어주지도 막지도 않는 해이니, 스스로 만든 계획이 그대로 결과가 됩니다.", "en": "This year meshes evenly with your chart — neither pushing nor blocking. Whatever plan you make yourself becomes the result."}, {"kr": "올해의 기운은 사주에서 이미 넘치는 부분을 더 보태는 쪽입니다. 자신감이 지나쳐 무리하기 쉬운 해이니, 확장보다 내실을 다지고 결정은 한 박자 늦추십시오. 조심한 사람에게는 아무 일도 일어나지 않고 지나갑니다.", "en": "This year adds to what already overflows in your chart. Confidence runs past its limit and overreach comes easily — build inwardly rather than expanding, and delay decisions by one beat. To the careful, it passes without incident."}], "STRONG": [{"kr": "당신의 사주는 <b>신강(身强)</b>합니다. 나를 돕는 기운이 넉넉해 스스로 밀고 나가는 힘이 강한 구조입니다. 이런 사주는 남에게 의지하기보다 자기 힘으로 길을 여는 편이며, 어려움 앞에서도 쉽게 꺾이지 않습니다. 다만 힘이 넘치는 만큼 그 힘을 쓸 곳이 필요합니다 — 눌러 주고 흘려보낼 자리가 있어야 오히려 크게 됩니다.", "en": "Your chart is <b>strong (Singang)</b>. The forces supporting you are ample, giving you the power to push forward on your own. Such a chart opens its own road rather than leaning on others, and does not break easily before hardship. Yet strength that overflows needs somewhere to go — you rise highest when there is something to press it down and let it flow out."}, {"kr": "당신의 사주는 <b>신약(身弱)</b>합니다. 나를 돕는 기운보다 나를 쓰는 기운이 많은 구조로, 혼자 다 짊어지기보다 사람과 환경의 도움을 받을 때 훨씬 크게 되는 유형입니다. 약하다는 뜻이 아니라 <b>함께 갈 때 강해진다</b>는 뜻이며, 실제로 이런 사주가 귀인을 잘 만납니다.", "en": "Your chart is <b>weak (Sinyak)</b>. The forces drawing on you outweigh those supporting you — meaning you rise far higher with the help of people and environment than by shouldering everything alone. This is not frailty; it means <b>you grow strong in company</b>, and such charts genuinely attract benefactors."}], "YONG_DESC": [{"kr": "당신에게 가장 필요한 기운은 <b>목(木)</b>입니다. 자라나고 뻗어나가는 힘이 당신의 사주를 살립니다. 새로운 것을 배우고 키우는 일, 나무와 초록이 있는 환경, 그리고 동쪽이 당신 편입니다.", "en": "The energy you most need is <b>Wood</b>. The force that grows and reaches out revives your chart. Learning and raising new things, environments with trees and green, and the east are on your side."}, {"kr": "당신에게 가장 필요한 기운은 <b>화(火)</b>입니다. 타오르고 밝히는 힘이 당신의 사주를 살립니다. 사람 앞에 서는 일, 밝고 따뜻한 환경, 그리고 남쪽이 당신 편입니다.", "en": "The energy you most need is <b>Fire</b>. The force that burns and illuminates revives your chart. Standing before people, bright and warm environments, and the south are on your side."}, {"kr": "당신에게 가장 필요한 기운은 <b>토(土)</b>입니다. 품고 다지는 힘이 당신의 사주를 살립니다. 기반을 다루는 일, 안정된 환경, 그리고 중앙과 남서쪽이 당신 편입니다.", "en": "The energy you most need is <b>Earth</b>. The force that embraces and consolidates revives your chart. Work handling foundations, settled environments, and the centre and southwest are on your side."}, {"kr": "당신에게 가장 필요한 기운은 <b>금(金)</b>입니다. 다듬고 결단하는 힘이 당신의 사주를 살립니다. 정밀함이 필요한 일, 정돈된 환경, 그리고 서쪽이 당신 편입니다.", "en": "The energy you most need is <b>Metal</b>. The force that refines and decides revives your chart. Work demanding precision, orderly environments, and the west are on your side."}, {"kr": "당신에게 가장 필요한 기운은 <b>수(水)</b>입니다. 흐르고 스며드는 힘이 당신의 사주를 살립니다. 읽고 연결하는 일, 고요하고 물이 있는 환경, 그리고 북쪽이 당신 편입니다.", "en": "The energy you most need is <b>Water</b>. The force that flows and permeates revives your chart. Work that reads and connects, quiet environments near water, and the north are on your side."}], "GYEOK": [{"kr": "월지의 본기가 나와 같은 기운이니, 스스로의 힘으로 서는 격입니다. 남의 그늘에 있기를 견디지 못하고 결국 자기 이름을 걸고 일하게 되는 구조이며, 독립·전문직·자영업에서 힘을 발휘합니다. 조직에 있어도 자기 영역이 분명해야 오래 갑니다. 다만 사람과 재물이 함께 얽히면 잃기 쉬우니, 동업만큼은 신중하십시오.", "en": "The primary energy of your month branch matches your own — a chart that stands on its own strength. You cannot endure life in another's shade and end up working under your own name; independence, professional practice, and self-employment draw out your power. Even inside an organisation you last only where your territory is clear. Yet people and money entangled together bring loss — be careful above all with partnerships."}, {"kr": "월지의 본기가 내가 낳는 기운이니, 안에 있는 것을 밖으로 꺼내는 격입니다. 표현하고 만들고 가르치는 데서 인정받으며, 남이 시키는 대로 하기보다 자기 방식으로 풀어낼 때 결과가 좋습니다. 재능이 곧 밥이 되는 구조라 기술·창작·교육·영업이 잘 맞습니다. 다만 하고 싶은 말을 참지 못해 윗사람과 부딪히는 것이 평생의 숙제입니다.", "en": "The primary energy of your month branch is what you give birth to — a chart that brings the inside out. You earn recognition by expressing, making, and teaching, and results come when you solve things your own way rather than as told. Talent itself becomes your living: craft, creation, education, and sales fit you. Your lifelong task is holding your tongue with those above you."}, {"kr": "월지의 본기가 내가 다스리는 재물이니, 현실을 손에 쥐는 격입니다. 숫자와 실속에 밝고 기회를 알아보는 눈이 있어 사업·금융·유통·영업에서 두각을 나타냅니다. 명분보다 결과로 말하는 유형이며, 실제로 결과를 만들어냅니다. 다만 재물을 좇다 사람을 놓치기 쉬우니, 벌어들인 것을 나누는 데서 진짜 그릇이 커집니다.", "en": "The primary energy of your month branch is the wealth you govern — a chart that grasps the material world. Sharp with numbers and substance, with an eye for opportunity, you excel in business, finance, distribution, and sales. You speak in results rather than principles, and you deliver them. Yet chasing wealth costs you people — your true measure grows only when you share what you earn."}, {"kr": "월지의 본기가 나를 다스리는 기운이니, 세상의 질서 안에서 자리를 얻는 격입니다. 규칙과 책임을 감당하는 힘이 있어 조직·공직·법률·관리 분야에서 인정받고, 남을 이끄는 위치까지 올라갑니다. 남의 눈을 의식하는 만큼 처신이 반듯해 신뢰를 얻습니다. 다만 어깨의 무게를 혼자 지려다 지치기 쉬우니, 내려놓는 법을 배우는 것이 과제입니다.", "en": "The primary energy of your month branch is what governs you — a chart that earns its place within the world's order. Able to bear rules and responsibility, you gain recognition in organisations, public service, law, and management, and rise to lead. Conscious of how you are seen, you carry yourself uprightly and win trust. Yet you exhaust yourself shouldering the weight alone — learning to set it down is your task."}, {"kr": "월지의 본기가 나를 낳아 주는 기운이니, 배움과 문서로 서는 격입니다. 머리로 이해하고 정리하는 힘이 뛰어나 학문·연구·교육·의료·부동산처럼 자격과 문서가 필요한 분야에서 오래갑니다. 어른과 스승의 도움이 자연스럽게 들어오는 구조이며, 나이가 들수록 자리가 단단해집니다. 다만 생각이 실행보다 앞서기 쉬우니, 완벽해지기 전에 한 발 내딛는 연습이 필요합니다.", "en": "The primary energy of your month branch is what gives birth to you — a chart that stands on learning and documents. Strong at understanding and organising, you endure in scholarship, research, education, medicine, and property — fields built on qualifications and paperwork. Help from elders and teachers arrives naturally, and your ground firms with age. Yet thought outruns action: practise taking one step before you feel ready."}], "WOL_V": [[{"kr": "비겁의 달입니다. 나와 같은 기운이 들어와 경쟁자도 동료도 함께 늘어납니다. 사람을 얻으면 크게 얻고 잃으면 크게 잃으니, 협업은 좋으나 돈이 오가는 동업은 신중해야 합니다.", "en": "A month of peers. Your own element enters and both rivals and allies multiply. You gain much by winning people and lose much by losing them — collaborate freely, but be careful where money is shared."}, {"kr": "비겁의 달입니다. 내 편과 경쟁자가 같은 얼굴로 다가오는 때라 사람 보는 눈이 시험받습니다. 고집을 세울수록 손해이니, 한 발 물러서서 듣는 쪽이 결국 이깁니다.", "en": "A month of peers. Allies and rivals wear the same face, and your read on people is tested. Digging in costs you — the one who steps back and listens wins in the end."}, {"kr": "비겁의 달입니다. 혼자 다 하려는 마음이 커지지만, 정작 이 달의 성과는 함께한 사람에게서 나옵니다. 내 몫을 지키되 남의 몫을 탐하지 않으면 관계도 재물도 지켜집니다.", "en": "A month of peers. The urge to do it all alone swells, yet this month's results come through the people beside you. Guard your share without coveting theirs and you keep both the bond and the money."}], [{"kr": "식상의 달입니다. 내 기운이 밖으로 뻗어 나가 표현·발표·창작·영업처럼 나를 드러내는 일에서 좋은 반응을 얻습니다. 아이디어를 꺼내 놓기 좋은 때이나, 말이 앞서 약속을 크게 하지 않도록 한 박자 늦추십시오.", "en": "A month of output. Your energy reaches outward — expression, presentation, creation, and sales draw good responses. A fine time to put ideas on the table, though slow by a beat so words do not outrun what you can deliver."}, {"kr": "식상의 달입니다. 머릿속에만 있던 것이 형태를 갖추는 때라, 만들고 쓰고 가르치는 일에서 결과가 나옵니다. 다만 하고 싶은 말이 많아지는 달이니 윗사람 앞에서는 한 마디를 덜어내십시오.", "en": "A month of output. What lived only in your head takes form — making, writing, and teaching bear results. But this month fills you with things to say; leave one line out in front of those above you."}, {"kr": "식상의 달입니다. 재능이 눈에 띄는 때이니 숨기지 말고 드러내십시오. 남이 시키는 대로 하기보다 내 방식으로 풀어낼 때 훨씬 좋은 결과가 나옵니다.", "en": "A month of output. Your talent is visible now — do not hide it. Results come far better when you solve things your own way rather than as instructed."}], [{"kr": "재성의 달입니다. 재물의 기운이 도는 때라 협상·정산·계약처럼 돈이 오가는 실무에서 유리한 조건을 얻습니다. 다만 재물이 도는 달은 지출도 함께 커지니, 들어오는 것과 나가는 것을 같은 무게로 살피십시오.", "en": "A month of wealth. Money energy circulates — negotiations, settlements, and contracts land on favourable terms. But spending swells alongside income; weigh what comes in and what goes out on the same scale."}, {"kr": "재성의 달입니다. 기회를 알아보는 눈이 밝아지는 때라 미뤄둔 금전 업무를 처리하기 좋습니다. 숫자를 직접 확인하는 습관 하나가 이 달의 손익을 가릅니다.", "en": "A month of wealth. Your eye for opportunity sharpens — a good time to clear postponed financial matters. One habit, checking the numbers yourself, decides this month's profit and loss."}, {"kr": "재성의 달입니다. 실속을 챙기기 좋은 흐름이나, 재물을 좇다 사람을 놓치기 쉬운 때이기도 합니다. 벌어들인 것을 조금 나누면 그것이 다음 기회로 되돌아옵니다.", "en": "A month of wealth. A fine current for securing real gains, yet chasing wealth easily costs you people. Share a little of what you earn and it returns as your next opportunity."}], [{"kr": "관성의 달입니다. 직위·책임·평가처럼 나를 규정하는 것들이 전면에 나옵니다. 인정받고 자리가 오를 수 있는 달이지만, 동시에 압박과 마감이 무겁게 느껴지는 때이니 윗사람과 정면으로 부딪히는 일만 피하십시오.", "en": "A month of authority. Position, responsibility, and evaluation come to the front. Recognition and advancement are possible, yet pressure and deadlines weigh heavily — simply avoid colliding head-on with those above you."}, {"kr": "관성의 달입니다. 규칙과 마감이 나를 조이는 듯하지만, 이 압박이 실은 나를 다듬는 힘입니다. 이 달에 받은 지적은 훗날 도움이 되는 경우가 많으니 감정으로 받지 마십시오.", "en": "A month of authority. Rules and deadlines seem to tighten around you, yet this pressure is what shapes you. Corrections received now often help you later — do not take them as personal."}, {"kr": "관성의 달입니다. 남의 눈이 나를 향하는 때라 처신 하나가 평판을 만듭니다. 서류와 절차를 한 번 더 확인하면, 이 달의 무게가 곧 다음 자리의 발판이 됩니다.", "en": "A month of authority. Eyes are on you, and a single act of conduct makes your reputation. Check documents and procedure once more, and this month's weight becomes the step to your next seat."}], [{"kr": "인성의 달입니다. 문서·계약·시험·자격처럼 도장이 오가는 일과 배움에서 성과가 나옵니다. 어른이나 선배의 도움이 들어오는 때이니 부탁할 일이 있으면 이 달에 꺼내십시오. 이른바 문서운이 열리는 달입니다.", "en": "A month of the scholar. Documents, contracts, exams, and qualifications go well, and study bears fruit. Help arrives from elders and seniors — if you have an ask, raise it now. This is the month document luck opens."}, {"kr": "인성의 달입니다. 머리가 맑아지고 흡수가 빨라지는 때라 공부·자격·면접처럼 머리를 쓰는 일을 이 달로 잡으십시오. 밖으로 화려하진 않아도 안에 쌓이는 것이 많은 달입니다.", "en": "A month of the scholar. Your mind clears and absorbs quickly — schedule study, certification, and interviews now. It lacks outward glamour, yet much accumulates within."}, {"kr": "인성의 달입니다. 마음이 안정되어 판단이 흐려지지 않는 때이니 중요한 결정을 이 달에 내리면 후회가 적습니다. 다만 생각이 실행보다 앞서기 쉬우니, 완벽해지기 전에 한 발 내딛으십시오.", "en": "A month of the scholar. Your mind settles and judgment stays clear — decisions made now bring little regret. Yet thought outruns action: take one step before you feel ready."}]], "LUCK_V": [[{"kr": "게다가 이 달의 기운이 곧 당신의 용신(用神)입니다. 사주에서 넘치던 부분을 정확히 눌러 주는 달이니, 한 해 중 손꼽히게 기운이 좋습니다.", "en": "Moreover this month's energy is your Yongsin — pressing exactly where your chart overflows. It is one of the strongest months of your year."}, {"kr": "무엇보다 이 달은 당신의 용신이 들어오는 달입니다. 사주의 균형이 맞아떨어지니 같은 노력으로도 결과가 다르게 나옵니다.", "en": "Above all, your Yongsin enters this month. Your chart falls into balance, so the same effort yields a different result."}], [{"kr": "이 달의 기운은 당신의 희신(喜神)으로, 용신을 도와 흐름을 부드럽게 만듭니다. 큰 파란 없이 일이 풀립니다.", "en": "This month carries your Huisin, supporting your Yongsin and smoothing the current. Matters resolve without storms."}, {"kr": "이 달은 희신이 받쳐 주는 달이라 억지로 밀지 않아도 일이 제 속도로 굴러갑니다.", "en": "Your Huisin braces this month — things roll at their own pace without forcing."}], [{"kr": "이 달의 기운은 당신의 사주에 크게 이롭지도 해롭지도 않습니다. 무리하지 않으면 무난히 지나갑니다.", "en": "This month's energy neither greatly helps nor harms your chart. Without overreaching it passes uneventfully."}, {"kr": "이 달은 사주와 특별히 부딪히지도 밀어주지도 않는 평범한 달입니다. 계획한 만큼만 하시면 됩니다.", "en": "An even month that neither clashes with nor pushes your chart. Do simply what you planned."}], [{"kr": "다만 이 달의 기운은 이미 넘치는 부분을 더 보태는 쪽이라, 평소보다 조급해지거나 고집이 세지기 쉽습니다. 결정을 하루 미루는 습관이 이 달의 개운법입니다.", "en": "However this month adds to what already overflows, so impatience and stubbornness come easily. Postponing decisions by a day is this month's remedy."}, {"kr": "다만 이 달은 기신(忌神)이 힘을 얻는 달입니다. 자신감이 지나쳐 무리하기 쉬우니, 새로 벌이기보다 지키는 데 힘을 쓰십시오.", "en": "However your Gisin gains strength this month. Confidence runs past its limit — spend your force on protecting rather than starting."}]], "MCTX": [{"kr": "한 해의 첫 달이자 아직 지난해의 기운이 남아 있는 때입니다. 새 계획을 크게 벌이기보다 지난해를 정리하고 마무리하는 데 무게를 두면, 입춘부터 시작될 진짜 새 기운을 가볍게 맞이하게 됩니다.", "en": "The first month of the year, though last year's energy still lingers. Rather than launching grandly, weight this month toward closing out the old year — you will meet the true new energy of Ipchun unburdened."}, {"kr": "입춘이 들어오며 사주에서 말하는 진짜 새해가 시작되는 달입니다. 이 달에 정한 방향이 한 해 전체의 결을 만드니, 첫 단추를 신중히 끼우고 연초의 들뜬 결심보다 지킬 수 있는 약속을 하십시오.", "en": "Ipchun arrives and the true new year of Saju begins. The direction you set now shapes the grain of your whole year — fasten the first button carefully, and make promises you can keep rather than New Year vows."}, {"kr": "새 학기와 새 분기가 함께 열리는 달입니다. 주변이 모두 출발선에 서니 조급해지기 쉬우나, 남의 속도가 아니라 내 속도로 걸어야 이 해를 끝까지 갑니다.", "en": "A month when a new term and a new quarter open together. With everyone at the starting line, impatience comes easily — walk at your own pace, not another's, and you will last the year."}, {"kr": "봄이 무르익어 활동이 본격화되는 달입니다. 미뤄둔 일을 꺼내기 좋은 때이니, 이 달에 움직인 만큼 상반기의 성적표가 달라집니다.", "en": "Spring ripens and activity begins in earnest. A fine time to take up what you postponed — how much you move now decides your first-half report card."}, {"kr": "가정의 달이라 사람과 돈이 함께 오가는 때입니다. 경조사와 모임이 겹쳐 지출이 늘기 쉬우니, 마음은 쓰되 예산은 미리 정해두는 것이 이 달을 지키는 법입니다.", "en": "A month of family occasions where people and money move together. Gatherings pile up and spending swells — give your heart, but set the budget in advance."}, {"kr": "상반기를 마무리하며 중간 점검을 하는 달입니다. 연초에 세운 계획을 다시 꺼내 얼마나 왔는지 확인하면, 하반기에 무엇을 버리고 무엇을 밀지가 선명해집니다.", "en": "A month to close the first half and take stock. Pull out the plan you made in January and measure the distance — it clarifies what to drop and what to push in the second half."}, {"kr": "더위와 휴가가 겹쳐 몸도 일정도 흐트러지기 쉬운 달입니다. 쉴 때 제대로 쉬어두어야 하반기 승부처에서 쓸 체력이 남습니다.", "en": "Heat and holidays scatter both body and schedule. Rest properly while you rest, and you keep the stamina for the second half's decisive moments."}, {"kr": "입추가 들며 기운이 거두는 쪽으로 도는 달입니다. 하반기 승부를 거는 자리이니, 벌여둔 것 중 될 것과 접을 것을 이 달에 가려내면 연말이 훨씬 가벼워집니다.", "en": "Ipchu arrives and the energy turns toward harvest. This is where the second half is decided — sort now what will bear fruit from what must be folded, and year's end grows far lighter."}, {"kr": "추석과 명절이 든 달이라 가족과 오래된 인연이 전면에 나옵니다. 이 달에 챙긴 관계가 연말까지 힘이 되니, 미뤄둔 안부 한 통을 이 달에 넣으십시오.", "en": "Chuseok brings family and long-standing bonds to the front. The relationships you tend now carry you to year's end — make the call you have been postponing."}, {"kr": "결실을 거두고 성과를 평가받는 달입니다. 한 해 동안 해온 것을 정리해 눈에 보이게 만들어 두면, 연말 평가에서 제값을 받습니다.", "en": "A month of harvest and assessment. Organise what you did this year into something visible, and you will be valued properly when reviews come."}, {"kr": "연말을 준비하며 내년을 그리기 시작하는 달입니다. 마음이 바빠지기 쉬우나, 서두르는 대신 내년 계획을 글로 적어두면 그 글이 그대로 다음 해의 지도가 됩니다.", "en": "A month to prepare for year's end and begin sketching the next. Rather than rushing, write next year's plan down — that page becomes the map of the year ahead."}, {"kr": "한 해를 마무리하는 달입니다. 모임과 술자리가 몰리며 지출과 구설이 함께 늘어나니, 누가 돈을 빌려 달라고 하면 세 번 이상 생각하십시오. 연말의 들뜬 분위기에서 한 약속은 반드시 다음 날 맑은 정신으로 다시 확인하는 것이 이 달의 개운법입니다.", "en": "The closing month. Gatherings crowd in and both spending and gossip swell — if someone asks to borrow money, think it over at least three times. Any promise made in year-end high spirits should be reconfirmed the next morning with a clear head; that is this month's remedy."}]};
const _TXT = {"JEOL": {"소한": {"kr": "소한(小寒), 한 해 중 가장 추운 때입니다. 몸을 따뜻이 하고 무리한 일보다 안을 다지기 좋은 시기입니다.", "en": "Sohan, the coldest stretch of the year. A time to keep warm and strengthen your foundations rather than push outward."}, "입춘": {"kr": "입춘(立春), 봄이 시작되고 사주에서 말하는 진짜 새해가 열리는 절기입니다. 새 뜻을 세우기에 가장 좋은 때입니다.", "en": "Ipchun, the start of spring and the true new year in Saju. The finest time to set fresh intentions."}, "경칩": {"kr": "경칩(驚蟄), 겨울잠 자던 벌레도 깨어나는 때입니다. 미뤄둔 일을 다시 꺼내 움직이기 좋은 절기입니다.", "en": "Gyeongchip, when even hibernating creatures stir. A good time to take up what you postponed."}, "청명": {"kr": "청명(淸明), 하늘이 맑고 만물이 자라는 때입니다. 새 일을 벌이고 바깥 활동을 넓히기 좋습니다.", "en": "Cheongmyeong, clear skies and growing things. Good for starting ventures and widening your activity."}, "입하": {"kr": "입하(立夏), 여름이 시작되는 절기입니다. 기운이 왕성해지니 벌여둔 일에 속도를 내기 좋습니다.", "en": "Ipha, the start of summer. Energy runs high — a good time to pick up the pace on what you began."}, "망종": {"kr": "망종(芒種), 씨앗을 뿌리고 거둘 준비를 하는 때입니다. 부지런히 움직인 만큼 하반기에 거둡니다.", "en": "Mangjong, the season of sowing and preparing to reap. What you tend now, you harvest later."}, "소서": {"kr": "소서(小暑), 본격적인 더위가 시작되는 때입니다. 몸을 아끼며 페이스를 조절하기 좋은 절기입니다.", "en": "Soseo, when real heat begins. A time to spare your body and manage your pace."}, "입추": {"kr": "입추(立秋), 더위 속에서도 가을 기운이 처음 드는 절기입니다. 벌여둔 일 중 거둘 것을 가려내기 좋은 때입니다.", "en": "Ipchu, when autumn's first breath enters even amid the heat. A time to sort out what is ready to harvest."}, "백로": {"kr": "백로(白露), 이슬이 맺히기 시작하는 때입니다. 결실이 여물어 가니 마무리에 힘을 쏟기 좋습니다.", "en": "Baengno, when dew begins to form. Fruits ripen — a good time to put force into finishing."}, "한로": {"kr": "한로(寒露), 찬 이슬이 내리는 때입니다. 한 해를 정리하고 거둔 것을 챙기기 좋은 절기입니다.", "en": "Hallo, when cold dew falls. A time to wrap up the year and gather what you have earned."}, "입동": {"kr": "입동(立冬), 겨울이 시작되는 절기입니다. 밖으로 벌이기보다 안으로 갈무리하기 좋은 때입니다.", "en": "Ipdong, the start of winter. Better for storing inward than expanding outward."}, "대설": {"kr": "대설(大雪), 눈이 많이 내리는 때입니다. 한 해를 마무리하고 다음을 준비하기 좋은 절기입니다.", "en": "Daeseol, the season of deep snow. A time to close the year and prepare for the next."}}, "STEM_MEAN": [{"kr": "갑(甲)은 곧게 뻗는 큰 나무의 기운입니다. 시작과 도전에 힘이 실리는 날입니다.", "en": "Gap is the energy of a tall, upright tree — a day that favours beginnings and bold moves."}, {"kr": "을(乙)은 부드럽게 감기는 풀과 넝쿨의 기운입니다. 유연하게 돌아가는 지혜가 통하는 날입니다.", "en": "Eul is the energy of grass and vine — a day when flexible, roundabout wisdom works best."}, {"kr": "병(丙)은 온 세상을 비추는 태양의 기운입니다. 드러내고 표현하는 일에 힘이 실립니다.", "en": "Byeong is the energy of the blazing sun — a day that favours revealing and expressing."}, {"kr": "정(丁)은 은은히 밝히는 등불의 기운입니다. 세심하게 살피고 다듬는 일에 좋습니다.", "en": "Jeong is the energy of a steady lamp — good for careful attention and refinement."}, {"kr": "무(戊)는 든든한 큰 산의 기운입니다. 중심을 잡고 버티는 힘이 실리는 날입니다.", "en": "Mu is the energy of a great mountain — a day for holding your center and standing firm."}, {"kr": "기(己)는 만물을 기르는 기름진 흙의 기운입니다. 품고 다지는 일에 힘이 실립니다.", "en": "Gi is the energy of fertile soil — a day that favours nurturing and consolidating."}, {"kr": "경(庚)은 단단한 무쇠와 바위의 기운입니다. 결단하고 밀어붙이는 힘이 실리는 날입니다.", "en": "Gyeong is the energy of iron and rock — a day for decisiveness and pushing through."}, {"kr": "신(辛)은 잘 다듬은 보석의 기운입니다. 예리하게 가려내고 정리하는 일에 좋습니다.", "en": "Sin is the energy of a polished gem — good for sharp discernment and putting things in order."}, {"kr": "임(壬)은 넓게 흐르는 큰 바다의 기운입니다. 크게 보고 널리 연결하는 힘이 실립니다.", "en": "Im is the energy of the wide ocean — a day for big-picture thinking and broad connection."}, {"kr": "계(癸)는 촉촉이 스며드는 이슬과 비의 기운입니다. 조용히 파고들고 준비하는 일에 좋습니다.", "en": "Gye is the energy of dew and rain — good for quiet depth and preparation."}], "ZODIAC_DAY": [{"kr": "오늘은 당신의 띠와 같은 기운이 흐르는 날입니다. 익숙한 일은 술술 풀리지만, 비슷한 사람과 부딪히기 쉬운 날이기도 합니다. 고집을 세우기보다 한 발 양보하면 오히려 얻는 것이 많습니다. 친구나 동료와의 자리에서 뜻밖의 도움을 얻을 수 있으니 사람을 멀리하지 마십시오. 다만 오늘은 지갑을 여는 자리가 잦을 수 있으니, 큰 지출은 하루 미루는 것이 좋습니다.", "en": "Today runs on the same energy as your sign. Familiar tasks flow easily, but you may clash with people like yourself. Yielding a step rather than digging in wins you more. Unexpected help comes from friends and colleagues, so do not keep people at arm's length. Just watch the wallet — postpone any large spending by a day."}, {"kr": "오늘은 당신의 기운이 밖으로 뻗어나가는 날입니다. 말과 표현에 힘이 실리니 발표, 제안, 오랜만의 연락처럼 나를 드러내는 일에 좋습니다. 막혔던 아이디어가 풀리고 사람들의 반응도 좋은 날입니다. 다만 기분이 좋아 말이 앞서기 쉬우니, 지키지 못할 약속은 입 밖에 내지 마십시오. 오늘 한 말은 오래 기억되니, 한 박자만 늦춰 말하면 실수가 없습니다.", "en": "Today your energy reaches outward. Words carry weight — good for presenting, proposing, or reaching out after a long silence. Blocked ideas loosen and people respond well. But high spirits push words ahead of thought; do not voice a promise you cannot keep. What you say today is remembered — slow by one beat and you make no mistakes."}, {"kr": "오늘은 재물의 기운이 도는 날입니다. 돈과 관련된 협상이나 결정에서 평소보다 유리한 자리에 서고, 미뤄둔 금전 문제를 처리하기에도 좋습니다. 감이 잘 맞는 날이니 사고팔거나 조건을 조율하는 일을 오늘 하십시오. 다만 재물운이 좋은 날은 씀씀이도 함께 커지는 법입니다. 눈에 들어오는 것을 다 사지 말고, 오늘 번 것의 일부는 반드시 남겨두십시오.", "en": "Today wealth energy circulates. You stand better placed in money negotiations and decisions, and it is a good day to clear postponed financial matters. Your instincts land well — buy, sell, or settle terms today. But on strong-wealth days, spending swells too. Do not buy everything that catches your eye; set aside part of what you earn."}, {"kr": "오늘은 당신을 누르는 기운이 있는 날이니, 한 박자 늦추는 것이 상책입니다. 윗사람이나 규칙, 마감이 유난히 무겁게 느껴지고 하려던 일이 한 번씩 막힐 수 있습니다. 이런 날은 정면으로 부딪히지 말고 몸을 낮추면 화가 비껴갑니다. 특히 사람을 조심하십시오 — 오늘 오간 말 한마디가 구설이 될 수 있습니다. 서류나 계약은 반드시 한 번 더 확인하고, 서명은 급하게 하지 마십시오.", "en": "Today an energy presses on you — slowing down is the wise move. Superiors, rules, and deadlines feel unusually heavy, and your plans may stall. Do not collide head-on; keep low and trouble passes you by. Above all, be careful with people — a single word today can become gossip. Check documents and contracts twice, and never sign in a hurry."}, {"kr": "오늘은 당신을 돕는 기운이 드는 날, 하루 중 가장 든든한 날입니다. 어른이나 선배, 오래 알던 사람에게서 도움이 오니 부탁할 일이 있으면 오늘 꺼내십시오. 배우고 익히는 일이 잘 되는 날이라 공부, 시험, 면접, 상담처럼 머리 쓰는 일을 오늘로 잡으면 좋습니다. 문서와 계약도 순조롭게 풀리는 날입니다. 마음이 편안하고 판단이 흐려지지 않으니, 미뤄둔 중요한 결정을 내리기에도 좋은 날입니다.", "en": "Today a supportive energy arrives — the sturdiest day of the cycle. Help comes from elders, seniors, or people you have long known, so raise any request now. Learning goes well: schedule study, exams, interviews, or consultations for today. Documents and contracts resolve smoothly. Your mind is calm and clear — a good day to make the important decision you postponed."}], "ZODIAC_TIP": [{"kr": "오늘의 한마디 — 다툼을 피하고, 큰 지출은 내일로.", "en": "Today's word — avoid quarrels, and leave big spending for tomorrow."}, {"kr": "오늘의 한마디 — 표현은 좋으나, 약속은 신중히.", "en": "Today's word — express freely, but promise carefully."}, {"kr": "오늘의 한마디 — 실속을 챙기되, 씀씀이를 살펴라.", "en": "Today's word — secure real gains, but watch your spending."}, {"kr": "오늘의 한마디 — 사람과 문서를 조심하고, 몸을 낮춰라.", "en": "Today's word — mind people and paperwork, and keep low."}, {"kr": "오늘의 한마디 — 도움을 청하고, 중요한 일을 처리하라.", "en": "Today's word — ask for help, and handle what matters."}]};
const NYV = {"GRADE": {"5": {"tag": {"kr": "대길(大吉)", "en": "Great Fortune"}, "cat": {"kr": "십 년에 한 번 오는 최고의 해", "en": "A peak year that comes once in a decade"}, "desc": {"kr": "올해는 당신에게 가장 필요한 기운이 하늘과 땅에 모두 들어오는 해입니다. 그동안 눌려 있던 힘이 제 쓰임을 만나, 준비한 것이 밖으로 드러나고 인정받습니다. 미룰 이유가 없는 해이니 과감하게 움직이십시오.", "en": "This year the energy you most need enters both heaven and earth. Force long held back meets its use — what you prepared surfaces and earns recognition. There is no reason to wait: move boldly."}}, "4": {"tag": {"kr": "길(吉)", "en": "Fortunate"}, "cat": {"kr": "순풍에 돛을 단 해", "en": "A year with the wind at your back"}, "desc": {"kr": "올해는 흐름이 당신을 밀어주는 해입니다. 억지로 힘쓰지 않아도 일이 제 속도로 풀리고, 도와주는 사람이 늘어납니다. 큰 욕심보다 꾸준함으로 가면 연말에 제법 큰 그림이 완성됩니다.", "en": "The current carries you this year. Things resolve at their own pace without forcing, and helpers multiply. Go with steadiness over greed and a sizable picture completes itself by year's end."}}, "3": {"tag": {"kr": "평(平)", "en": "Steady"}, "cat": {"kr": "지키는 것이 곧 버는 해", "en": "A year where holding is gaining"}, "desc": {"kr": "올해는 크게 얻지도 잃지도 않는 잔잔한 해입니다. 새로 벌이기보다 지금 가진 것을 정돈하고 다듬는 데 힘을 쓰면, 그 안에서 뜻밖의 기회가 눈에 들어옵니다. 조용한 해라고 아무 일도 없는 것이 아니라, 뿌리가 자라는 소리는 원래 들리지 않는 법입니다.", "en": "A calm year of neither great gain nor loss. Spend it ordering and refining what you already hold, and an unexpected chance comes into view within. A quiet year is not an empty one — roots grow without a sound."}}, "2": {"tag": {"kr": "조심(小凶)", "en": "Caution"}, "cat": {"kr": "돌다리도 두드려 건너는 해", "en": "A year to tap even the stone bridge"}, "desc": {"kr": "올해는 신중함이 곧 개운법인 해입니다. 문서·계약·보증·동업에 특히 조심하고, 달콤한 제안일수록 두세 번 확인하십시오. 그러나 조심하는 사람에게는 아무 일도 일어나지 않고 지나가며, 이 시기에 걸러낸 사람과 일이 훗날 당신을 지켜줍니다.", "en": "This year, caution itself is your remedy. Take special care with documents, contracts, guarantees, and partnerships, and check sweet offers twice over. Yet to the careful, nothing happens — and what you filter out now protects you later."}}, "1": {"tag": {"kr": "주의(凶)", "en": "Take Care"}, "cat": {"kr": "지키고 낮추며 지나가는 해", "en": "A year to guard, stay low, and pass through"}, "desc": {"kr": "올해는 나를 누르는 기운이 강한 해입니다. 새로 벌이지 말고 지금을 지키는 데 집중하십시오. 무리한 확장과 큰 결정은 내년으로 미루고, 몸과 사람을 특히 조심하면 이 시기는 반드시 지나갑니다. 겨울이 지나면 봄이 오듯, 이 해를 견디면 다음 대운이 열립니다.", "en": "A year when the pressing energy runs strong. Start nothing new; focus on holding what you have. Postpone expansion and big decisions to next year, guard your body and your circle, and this season will pass. As spring follows winter, endure this year and your next great cycle opens."}}}, "FIELD": {"jae": {"kr": "재물운", "en": "Wealth"}, "gwan": {"kr": "직업운", "en": "Career"}, "sik": {"kr": "애정운", "en": "Love"}, "bi": {"kr": "건강운", "en": "Health"}, "in": {"kr": "학업운", "en": "Learning"}}, "FIELD_TXT": {"jae": {"hi": {"kr": "재물이 사방에서 들어옵니다. 부수입·묵은 돈 회수·투자 결실이 있는 해이니, 들어올 때 일부를 반드시 묶어두십시오.", "en": "Wealth flows in from all sides — side income, old debts returning, investments bearing fruit. Bind a portion the moment it arrives."}, "mid": {"kr": "들어오고 나가는 것이 비슷합니다. 버는 것보다 새는 구멍을 막는 것이 이 해의 재테크입니다.", "en": "Income and outgo run even. Plugging leaks beats earning this year."}, "lo": {"kr": "지출이 커지기 쉬운 해입니다. 보증·대여·충동구매를 피하고, 큰돈은 내년으로 미루십시오.", "en": "Spending swells easily. Avoid guarantees, lending, and impulse buys; postpone large sums to next year."}}, "gwan": {"hi": {"kr": "승진·발탁·이직에 최적기입니다. 사람 앞에 나서는 일에서 이름을 알리게 되니, 기회가 오면 망설이지 마십시오.", "en": "Prime time for promotion, selection, and job change. You make your name in front of people — do not hesitate when the chance comes."}, "mid": {"kr": "맡은 일에 충실하면 무난히 인정받습니다. 큰 이동보다 지금 자리를 다지는 편이 유리합니다.", "en": "Fulfilling your role earns steady recognition. Firming your current seat beats a big move."}, "lo": {"kr": "윗사람·규칙과 부딪히기 쉽습니다. 나서기보다 몸을 낮추고, 이직은 하반기로 미루십시오.", "en": "Friction with superiors and rules comes easily. Stay low rather than stepping forward, and delay any job change to the second half."}}, "sik": {"hi": {"kr": "표현운·애정운이 활짝 열립니다. 미혼은 인연이 드러나고, 표현하고 나서는 일마다 좋은 반응을 얻습니다.", "en": "Expression and love open wide. The unattached see a bond emerge, and expressing yourself draws good responses."}, "mid": {"kr": "서두르면 어긋나고 기다리면 맺어집니다. 상대의 속도를 확인하며 천천히 가십시오.", "en": "Rushing breaks it, waiting ties it. Check their pace and go slow."}, "lo": {"kr": "오해가 생기기 쉽습니다. 문자보다 얼굴을 보고, 남의 연애에 끼어들지 마십시오.", "en": "Misunderstandings spark easily. Choose face over text, and stay out of others' romances."}}, "bi": {"hi": {"kr": "기력이 충만합니다. 새 운동·습관을 시작하기 좋은 해이니, 좋을 때 규칙을 만들어 두십시오.", "en": "Vitality runs full. A fine year to start new exercise and habits — build the rhythm while you feel strong."}, "mid": {"kr": "큰 병은 없으나 수면이 열쇠입니다. 자정 전에 자는 습관 하나가 어떤 보약보다 낫습니다.", "en": "No serious illness, but sleep is the key. Lights-out before midnight beats any tonic."}, "lo": {"kr": "피로가 쌓이기 쉽습니다. 미뤄둔 검진을 받고, 과로·과음·야식을 줄이십시오.", "en": "Fatigue builds. Get that overdue check-up and cut overwork, drinking, and late-night meals."}}, "in": {"hi": {"kr": "배움과 문서운이 좋습니다. 시험·자격·계약에 유리하니, 머리 쓰는 일을 올해로 잡으십시오.", "en": "Learning and document luck are strong. Favorable for exams, licenses, and contracts — schedule mental work for this year."}, "mid": {"kr": "꾸준히 하면 쌓입니다. 화려하진 않아도 안으로 채워지는 해입니다.", "en": "Steady effort accumulates. Not flashy, but a year that fills you within."}, "lo": {"kr": "생각이 많아 실행이 늦기 쉽습니다. 완벽을 기다리지 말고 일단 한 걸음 내딛으십시오.", "en": "Overthinking slows action. Do not wait for perfect — take the first step."}}}};
const DAYDB = {"REL": [{"name": {"kr": "비화(比和) · 나와 같은 기운의 날", "en": "Bihwa · a day of your own element"}, "lvl": 2, "line": {"kr": "무리 없이 흘러가는 평온한 하루", "en": "A calm day that flows without strain"}, "txt": {"kr": "오늘은 나와 같은 기운이 하늘에 뜬 날입니다. 익숙한 방식이 그대로 통하는 날이라 새로운 시도보다 늘 하던 일을 마무리하는 데 유리합니다. 비슷한 성향의 사람과 뜻이 잘 맞아 협업이 수월하지만, 같은 기운끼리는 경쟁이 되기도 하니 공을 다투는 자리는 피하는 편이 좋습니다. 큰 사건 없이 지나가는 날이니 이런 날에 밀린 일을 정리해 두면 다음 날이 가벼워집니다.", "en": "Today the sky carries your own element. Familiar methods work exactly as they always have, so finishing what you already started beats attempting something new. People of similar temperament align with you and collaboration runs easy, yet like energies also compete — avoid arenas where credit is contested. Nothing dramatic happens, so clearing your backlog today makes tomorrow light."}, "avoid": {"kr": "공을 다투는 자리, 비슷한 사람과의 자존심 싸움", "en": "Contests over credit; pride battles with people like you"}}, {"name": {"kr": "식상(食傷) · 내 기운이 뻗어나가는 날", "en": "Siksang · a day your energy expresses"}, "lvl": 1, "line": {"kr": "표현하고 움직일수록 풀리는 하루", "en": "A day that opens the more you express and move"}, "txt": {"kr": "오늘은 내 기운이 밖으로 뻗어나가는 날입니다. 말과 글, 발표와 제안처럼 나를 드러내는 일에서 평소보다 훨씬 좋은 반응을 얻습니다. 미뤄둔 연락을 하거나 아이디어를 꺼내 놓기에 좋은 날이며, 창작이나 기획 업무라면 오늘 나온 결과물이 오래갑니다. 다만 기운이 밖으로 나가는 날이라 말이 앞서기 쉬우니, 하지 못할 약속까지 해버리지 않도록 한 박자만 늦추십시오.", "en": "Today your energy reaches outward. Speaking, writing, presenting, proposing — anything that reveals you draws a far better response than usual. A fine day to make the call you postponed or put an idea on the table; if you create or plan for a living, what you produce today endures. But with energy flowing out, words run ahead of you — slow by one beat so you do not promise what you cannot keep."}, "avoid": {"kr": "지키기 어려운 약속, 즉흥적인 큰소리", "en": "Promises you cannot keep; impulsive big talk"}}, {"name": {"kr": "재성(財星) · 재물의 기운이 도는 날", "en": "Jaeseong · a day wealth energy circulates"}, "lvl": 1, "line": {"kr": "실속을 챙기기 좋은 하루", "en": "A good day to secure real gains"}, "txt": {"kr": "오늘은 내가 다스릴 수 있는 재물의 기운이 도는 날입니다. 돈과 관련된 협상, 정산, 청구, 계약 같은 실무를 처리하기에 유리하며 평소보다 유리한 조건을 얻어낼 수 있습니다. 물건을 사고팔거나 조건을 조율하는 일에서 감이 잘 맞는 날이니 미뤄둔 금전 업무가 있다면 오늘 처리하십시오. 다만 재물의 기운이 강한 날은 씀씀이도 함께 커지니, 벌어들이는 것과 나가는 것을 같은 무게로 살피는 것이 좋습니다.", "en": "Today circulates the wealth energy you are able to govern. Negotiations, settlements, invoices, contracts — money matters go your way and you can secure better terms than usual. Your instincts land well when buying, selling, or adjusting conditions, so handle postponed financial tasks today. Yet on days when wealth energy runs strong, spending swells too — weigh what comes in and what goes out on the same scale."}, "avoid": {"kr": "충동적인 큰 지출, 확인하지 않은 투자 권유", "en": "Impulsive large spending; unverified investment pitches"}}, {"name": {"kr": "관성(官星) · 나를 누르는 기운의 날", "en": "Gwanseong · a day that presses on you"}, "lvl": 4, "line": {"kr": "한 박자 늦추면 무사히 지나가는 하루", "en": "Slow by one beat and the day passes safely"}, "txt": {"kr": "오늘은 나를 누르는 기운이 하늘에 뜬 날입니다. 윗사람이나 규칙, 마감처럼 나를 제어하는 것들이 유난히 무겁게 느껴지고, 하려던 일이 한 번씩 막히는 흐름입니다. 그러나 이 기운은 나쁘기만 한 것이 아니라 나를 다듬는 힘이기도 하니, 오늘 받은 지적이나 제동은 훗날 도움이 되는 경우가 많습니다. 무리하게 밀어붙이거나 정면으로 부딪히지 말고, 서류와 말을 한 번 더 확인하며 하루를 낮게 지나가면 아무 일도 일어나지 않습니다.", "en": "Today the sky carries the energy that presses on you. Superiors, rules, deadlines — whatever governs you feels unusually heavy, and your plans meet resistance at every turn. Yet this force is not merely bad; it is what shapes you, and the correction you receive today often helps you later. Do not push hard or collide head-on: check your documents and your words once more, pass the day low, and nothing happens at all."}, "avoid": {"kr": "윗사람과의 정면 충돌, 서둘러 하는 서명, 과속·과로", "en": "Head-on clashes with superiors; hurried signatures; speeding and overwork"}}, {"name": {"kr": "인성(印星) · 나를 돕는 기운의 날", "en": "Inseong · a day that supports you"}, "lvl": 0, "line": {"kr": "도움과 배움이 들어오는 하루", "en": "A day help and learning arrive"}, "txt": {"kr": "오늘은 나를 살려주는 기운이 하늘에 뜬 날, 하루 중 가장 든든한 날입니다. 어른이나 선배, 혹은 오래 알던 사람에게서 도움이 오며 부탁을 꺼내기에 이보다 좋은 날이 없습니다. 배우고 익히는 일에서 평소의 두 배로 흡수되니 공부·자격·면접·상담처럼 머리를 쓰는 일을 오늘로 잡으십시오. 서류나 계약처럼 도장이 오가는 일도 순조롭게 통과되는 흐름이며, 마음이 안정되어 판단이 흐려지지 않는 날입니다.", "en": "Today the sky carries the energy that revives you — the sturdiest day of the cycle. Help arrives from an elder, a senior, or someone you have long known, and no day is better for making an ask. You absorb at twice your usual rate, so schedule study, certification, interviews, or consultations for today. Matters involving documents and seals pass smoothly, and your mind stays settled enough that judgment does not blur."}, "avoid": {"kr": "혼자 끙끙 앓기, 도움을 청하지 않고 미루기", "en": "Suffering alone; postponing rather than asking for help"}}], "WEEK": [{"kr": "이번 주는 전체적으로 기운이 크게 열리는 한 주입니다. 도움을 주는 사람이 여럿 등장하고 미뤄둔 일들이 하나씩 풀려나가니, 이런 주에는 평소 망설이던 일을 꺼내 놓는 것이 좋습니다. 주 초반부터 흐름을 타면 주말까지 그 기세가 이어지므로, 중요한 일정을 앞쪽에 배치하십시오.", "en": "The week opens wide overall. Several helpers appear and postponed matters resolve one by one — a week to raise the thing you kept hesitating over. Catch the current early and it carries to the weekend, so place your important appointments toward the front."}, {"kr": "이번 주는 대체로 순조로운 한 주입니다. 크게 애쓰지 않아도 일이 제 속도로 굴러가고, 사람과의 관계에서도 마찰이 적습니다. 다만 좋은 날과 조심할 날이 섞여 있으니 아래 일자별 흐름을 참고해 중요한 일정을 좋은 날에 배치하면 효율이 크게 올라갑니다.", "en": "A largely smooth week. Things roll at their own pace without much forcing, and friction with people stays low. Good days and careful days do mix, so check the daily flow below and place key appointments on the strong days — your efficiency rises sharply."}, {"kr": "이번 주는 오르내림이 함께 있는 한 주입니다. 잘 풀리는 날과 막히는 날이 번갈아 오지만 전체적으로는 손해 없이 지나갑니다. 막히는 날에 억지로 밀어붙이기보다 그날은 정리와 준비에 쓰고, 기운이 좋은 날에 실행하면 같은 노력으로 훨씬 나은 결과를 얻습니다.", "en": "A week of ups and downs together. Days that flow and days that block alternate, yet on the whole you pass without loss. Rather than forcing on blocked days, use them for sorting and preparing, then execute on the strong days — the same effort yields far more."}, {"kr": "이번 방식은 조용히 흘러가는 한 주입니다. 특별한 사건도 큰 성과도 없이 지나가지만, 이런 주에 기초를 다져두면 다음 주가 가벼워집니다. 새로 벌이기보다 밀린 것을 정리하고 몸을 회복하는 데 시간을 쓰십시오.", "en": "A quietly passing week. No special event and no great achievement, yet groundwork laid now makes next week light. Rather than starting anew, clear your backlog and let your body recover."}, {"kr": "이번 주는 전반적으로 조심이 필요한 한 주입니다. 나를 누르는 기운이 여러 날에 걸쳐 있어 일이 한 번씩 막히고 사람과의 마찰도 생기기 쉽습니다. 그러나 이런 주는 무사히 지나가는 것 자체가 성공이니, 새 일을 벌이지 말고 서류와 말을 한 번 더 확인하며 낮게 지나가십시오. 아래 일자별 흐름에서 기운이 좋은 날을 골라 중요한 일을 몰아두면 훨씬 수월합니다.", "en": "A week that asks for care overall. The pressing energy spans several days, so plans stall and friction with people comes easily. Yet passing such a week without incident is itself success: start nothing new, check documents and words twice, and travel low. Pick the strong days from the daily flow below and cluster what matters there — it goes far easier."}]};
